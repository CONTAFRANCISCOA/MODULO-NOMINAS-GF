<script>
/* ══════════════════════════════════════════════════
   FIREBASE CONFIG — reemplaza estos valores con los
   de tu proyecto en https://console.firebase.google.com
   ══════════════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCqjGzzn_X6nz17ayTlYZJcl5OV98cm5Ow",
  authDomain:        "modulo-nominas-gf.firebaseapp.com",
  projectId:         "modulo-nominas-gf",
  storageBucket:     "modulo-nominas-gf.firebasestorage.app",
  messagingSenderId: "365638951018",
  appId:             "1:365638951018:web:c3d8dd02fe42df00ee6a13"
};

/* ── GFStore: capa de sincronización Firestore ── */
const GFStore = (() => {
  const GF_KEYS = ['gf2_emp','gf2_inc','gf2_tipos','gf2_quin','gf2_prest',
                   'gf2_rs','gf2_diasdeb','gf2_vacsaldo','gf2_colsref'];
  const COL = 'gf_data';
  let db = null;
  let online = false;
  let timers = {};

  const dkey = k => k.replace('gf2_','');
  const lsGet = k => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } };
  const lsSet = (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

  async function init() {
    try {
      const configured = FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey !== 'TU_API_KEY';
      if (!configured) throw new Error('Firebase no configurado');

      firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.firestore();

      // Descarga todos los documentos en paralelo
      const snaps = await Promise.all(GF_KEYS.map(k => db.collection(COL).doc(dkey(k)).get()));
      const cloudHasData = snaps.some(s => s.exists);

      if (cloudHasData) {
        // Nube tiene datos → sobreescribe localStorage con datos de nube
        snaps.forEach((snap, i) => {
          if (snap.exists) lsSet(GF_KEYS[i], snap.data().data);
        });
      } else {
        // Nube vacía → sube localStorage a nube (primera vez)
        const batch = db.batch();
        GF_KEYS.forEach(k => {
          const val = lsGet(k);
          if (val !== null) batch.set(db.collection(COL).doc(dkey(k)), { data: val });
        });
        await batch.commit();
      }
      online = true;
    } catch (err) {
      console.warn('[GFStore] Modo sin conexión:', err.message);
      online = false;
    }
    return online;
  }

  // Escribe a Firestore con debounce de 800ms (para no saturar en ediciones rápidas)
  function set(k, v) {
    if (!db || !online) return;
    if (timers[k]) clearTimeout(timers[k]);
    timers[k] = setTimeout(() => {
      db.collection(COL).doc(dkey(k)).set({ data: v })
        .catch(err => { console.warn('[GFStore] Error al guardar:', err); online = false; });
    }, 800);
  }

  return { init, set, isOnline: () => online };
})();
</script>

function numLetra(n){
  n=Math.round(n*100)/100;const e=Math.floor(n);const d=Math.round((n-e)*100);
  const U=['','UN','DOS','TRES','CUATRO','CINCO','SEIS','SIETE','OCHO','NUEVE','DIEZ','ONCE','DOCE','TRECE','CATORCE','QUINCE','DIECISÉIS','DIECISIETE','DIECIOCHO','DIECINUEVE'];
  const D=['','DIEZ','VEINTE','TREINTA','CUARENTA','CINCUENTA','SESENTA','SETENTA','OCHENTA','NOVENTA'];
  const C=['','CIENTO','DOSCIENTOS','TRESCIENTOS','CUATROCIENTOS','QUINIENTOS','SEISCIENTOS','SETECIENTOS','OCHOCIENTOS','NOVECIENTOS'];
  function c(x){if(x===0)return'CERO';if(x<20)return U[x];if(x<100)return D[Math.floor(x/10)]+(x%10?' Y '+U[x%10]:'');if(x===100)return'CIEN';if(x<1000)return C[Math.floor(x/100)]+(x%100?' '+c(x%100):'');if(x<2000)return'MIL'+(x%1000?' '+c(x%1000):'');if(x<1000000)return c(Math.floor(x/1000))+' MIL'+(x%1000?' '+c(x%1000):'');return x+''}
  return c(e)+' PESOS '+String(d).padStart(2,'0')+'/100 MXN';
}

const normTxt=v=>String(v||'').trim().toUpperCase();
const findTipo=(tipos,nombre)=>tipos.find(t=>t.nombre===nombre);
const incidenciaTieneFlag=(inc,tipos,flag)=>{
  if(!inc?.tipo)return false;
  return !!findTipo(tipos,inc.tipo)?.[flag];
};
function sortIncidenciasCronologicas(incs){
  return [...incs].map((inc,idx)=>({...inc,__idx:idx})).sort((a,b)=>String(a.fecha||'').localeCompare(String(b.fecha||''))||a.__idx-b.__idx);
}
function drawRokmaBrandBox(doc,{x=0,y=0,w=28,h=42,logoSize=18,textScale=1,bgColor=[30,30,30],fgColor=[255,255,255]}={}){
  doc.setFillColor(...bgColor);doc.rect(x,y,w,h,'F');
  try{
    if(ROKMA_LOGO_DATA_URL&&ROKMA_LOGO_DATA_URL!=='__ROKMA_LOGO_DATA_URL__'){
      const lx=x+(w-logoSize)/2;
      const ly=y+2.5;
      doc.addImage(ROKMA_LOGO_DATA_URL,'PNG',lx,ly,logoSize,logoSize);
    }
  }catch{}
  doc.setFont('times','bold');doc.setFontSize(11.8*textScale);doc.setTextColor(...fgColor);
  doc.text('GRUPO',x+w/2,y+h-11.2*textScale,{align:'center'});
  doc.text('ROKMA',x+w/2,y+h-4.6*textScale,{align:'center'});
}
function revertVacIncidenceEffect(inc,tipos,emps){
  if(!incidenciaTieneFlag(inc,tipos,'afectaVac'))return LS.get(K.vacSaldo,{});
  if(inc?._fx?.vacApplied===false)return LS.get(K.vacSaldo,{});
  const emp=emps.find(e=>e.id===inc.empleadoId);
  if(!emp)return LS.get(K.vacSaldo,{});
  const vs=LS.get(K.vacSaldo,{});
  const cur=Number(vs[emp.id]??emp.diasVacaciones??0);
  vs[emp.id]=cur+1;
  LS.set(K.vacSaldo,vs);
  return vs;
}
function applyVacIncidenceEffect(inc,tipos,emps){
  if(!incidenciaTieneFlag(inc,tipos,'afectaVac'))return {inc,vacSaldo:LS.get(K.vacSaldo,{})};
  const emp=emps.find(e=>e.id===inc.empleadoId);
  if(!emp)return {inc,vacSaldo:LS.get(K.vacSaldo,{})};
  const vs=LS.get(K.vacSaldo,{});
  const cur=Number(vs[emp.id]??emp.diasVacaciones??0);
  const vacApplied=cur>0;
  if(vacApplied){
    vs[emp.id]=cur-1;
    LS.set(K.vacSaldo,vs);
  }
  return {inc:{...inc,_fx:{...(inc._fx||{}),vacApplied}},vacSaldo:vs};
}
function recalcDiasDebFromIncidencias(incs,tipos){
  const regs=LS.get(K.diasDeb,[]);
  const ordered=[...regs].map((r,idx)=>({...r,__idx:idx})).sort((a,b)=>String(a.fechaRegistro||'').localeCompare(String(b.fechaRegistro||''))||a.__idx-b.__idx);
  const map=Object.fromEntries(regs.map(r=>[r.id,{...r,diasUsados:0}]));
  sortIncidenciasCronologicas(incs).forEach(inc=>{
    if(!incidenciaTieneFlag(inc,tipos,'afectaDias'))return;
    const target=ordered.find(r=>{
      const cur=map[r.id];
      return cur.empleadoId===inc.empleadoId&&cur.diasUsados<cur.diasDebidos;
    });
    if(target){
      map[target.id]={...map[target.id],diasUsados:Math.min(map[target.id].diasDebidos,map[target.id].diasUsados+1)};
    }
  });
  const updated=regs.map(r=>map[r.id]||r);
  LS.set(K.diasDeb,updated);
  return updated;
}

  drawRokmaBrandBox(doc,box);

}

  if(!LS.get(K.quin,null))LS.set(K.quin,[]);
  if(!LS.get(K.prest,null))LS.set(K.prest,[]);
  if(!LS.get(K.diasDeb,null))LS.set(K.diasDeb,[]);

function Modal({open,onClose,title,children,lg,xl}){
  if(!open)return null;
  return <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className={`modal ${lg?'modal-lg':''} ${xl?'modal-xl':''}`}>
      <div className="modal-title"><span>{title}</span><button className="modal-close" onClick={onClose}>✕</button></div>
      {children}

  </div>;
}
function Confirm({open,msg,onYes,onNo}){
  if(!open)return null;

    <div className="modal-title"><span>⚠️ Confirmar</span></div>

    <div className="form-actions"><button className="btn btn-secondary" onClick={onNo}>Cancelar</button><button className="btn btn-danger" onClick={onYes}>Sí, confirmar</button></div>

const RS_BADGE={MCFR:'badge-blue',RGC:'badge-purple',GF:'badge-green','N/A':'badge-gold'};

function SortTh({field,label,sf,sd,onSort,className=''}){
  const active=sf===field;
  return <th className={`sortable ${className}`} onClick={()=>onSort(field)}>
    {label} <span style={{color:active?'var(--gold)':'var(--border)',marginLeft:3}}>{active?(sd==='asc'?'↑':'↓'):'↕'}</span>
  </th>;
}

function Dashboard(){
  const emps=LS.get(K.emp,[]);
  const incs=LS.get(K.inc,[]);
  const quins=LS.get(K.quin,[]);
  const prest=LS.get(K.prest,[]);
  const abierta=quins.find(q=>q.status==='abierta');
  const mesActual=today().slice(0,7);
  const faltasMes=incs.filter(i=>i.fecha.startsWith(mesActual));
  const faltasDescuento=faltasMes.filter(i=>i.descuenta).length;
  const faltasTotales=faltasMes.length;
  const prestActivo=prest.filter(p=>p.activo).reduce((s,p)=>s+(p.saldoPendiente||0),0);
  const realBase=emps.filter(e=>e.activo).reduce((s,e)=>s+e.cfdiNomina+e.compeBase+e.sueldo,0);
  const cerradas=quins.filter(q=>q.status==='cerrada');
  const ultimaQna=cerradas.sort((a,b)=>b.fin.localeCompare(a.fin))[0];
  return <div>
    <div className="kpi-grid">
      <div className="kpi"><div className="kpi-label">Empleados Activos</div><div className="kpi-value text-green">{emps.filter(e=>e.activo).length}</div></div>
      <div className="kpi"><div className="kpi-label">Nómina Base Quincenal</div><div className="kpi-value text-gold" style={{fontSize:15}}>{fmt(realBase)}</div><div className="kpi-sub">suma de activos</div></div>
      <div className="kpi"><div className="kpi-label">Quincena Activa</div><div className="kpi-value" style={{fontSize:13}}>{abierta?`${fmtDate(abierta.inicio)} — ${fmtDate(abierta.fin)}`:'—'}</div><div className="kpi-sub">{abierta?'🟢 Abierta':'Sin quincena activa'}</div></div>
      <div className="kpi"><div className="kpi-label">Incidencias este mes</div><div className="kpi-value">{faltasTotales}</div><div className="kpi-sub text-red">{faltasDescuento} con descuento</div></div>
      <div className="kpi"><div className="kpi-label">Préstamos Pendientes</div><div className="kpi-value" style={{fontSize:15}}>{fmt(prestActivo)}</div></div>
      <div className="kpi"><div className="kpi-label">Quincenas Cerradas</div><div className="kpi-value">{cerradas.length}</div>{ultimaQna&&<div className="kpi-sub">Última: {fmtDate(ultimaQna.fin)}</div>}</div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <div className="card">
        <div className="section-title mb-3">👥 Por Sucursal</div>
        {['LAB/NF','ROKMA','PRESTTO','DM'].map(s=>{
          const cnt=emps.filter(e=>e.activo&&e.sucursal===s).length;
          const tot=emps.filter(e=>e.activo).length;
          const pct=tot?Math.round(cnt/tot*100):0;
          return <div key={s} style={{marginBottom:11}}>
            <div className="flex items-center" style={{justifyContent:'space-between',marginBottom:3}}>
              <span style={{fontSize:12}}>{s}</span><span style={{fontSize:11,color:'var(--muted)'}}>{cnt} ({pct}%)</span>
            </div>
            <div className="dias-bar"><div className="dias-fill" style={{width:`${pct}%`,background:'var(--gold)'}}/></div>
          </div>;
        })}
      </div>
      <div className="card">
        <div className="section-title mb-3">📋 Últimas Incidencias</div>
        {incs.slice(0,7).map(i=><div key={i.id} className="flex items-center" style={{justifyContent:'space-between',marginBottom:9}}>
          <div><div style={{fontSize:12,fontWeight:500}}>{i.empleadoNombre.split(' ').slice(0,2).join(' ')}</div><div style={{fontSize:10.5,color:'var(--muted)'}}>{i.tipo} · {fmtDate(i.fecha)}</div></div>
          {i.descuenta?<span className="badge badge-red">Descuenta</span>:<span className="badge badge-gray">Info</span>}
        </div>)}
        {!incs.length&&<p className="text-muted" style={{fontSize:12}}>Sin incidencias</p>}
      </div>
    </div>
  </div>;
}

/* ══════════════════════════════════════════════════════════
   NÓMINA — QUINCENA
══════════════════════════════════════════════════════════ */
function calcFaltas(empId,inicio,fin,incs){
  return incs.filter(i=>i.empleadoId===empId&&i.descuenta===true&&i.fecha>=inicio&&i.fecha<=fin).length;
}
function buildRow(emp,inicio,fin,incs,prest,extraCols){
  const faltas=calcFaltas(emp.id,inicio,fin,incs);
  const compe=Math.max(0,emp.compeBase-(faltas*emp.salarioDiario));
  const realQuincenal=emp.cfdiNomina+emp.compeBase+emp.sueldo;
  const cuotasPrest=prest.filter(p=>p.empleadoId===emp.id&&p.activo&&p.saldoPendiente>0&&p.tipo==='PRÉSTAMO').reduce((s,p)=>s+(p.cuotaQuincenal||0),0);
  const cuotasAdel=prest.filter(p=>p.empleadoId===emp.id&&p.activo&&p.saldoPendiente>0&&p.tipo==='ADELANTO').reduce((s,p)=>s+(p.cuotaQuincenal||0),0);
  const extra=extraCols?extraCols.reduce((s,c)=>({...s,[c.id]:0}),{}):{};
  const total=(emp.cfdiNomina+compe+emp.sueldo)-cuotasPrest-cuotasAdel;
  const efectivoExtra=compe+emp.sueldo;
  return {empId:emp.id,numero:emp.numero,nombre:emp.nombre,rs:emp.rs,rsSueldo:emp.rsSueldo,sucursal:emp.sucursal,salarioDiario:emp.salarioDiario,diasTrabajados:emp.diasQna||15,faltas,cfdiNomina:emp.cfdiNomina,compeBase:emp.compeBase,compe,sueldo:emp.sueldo,prestamos:cuotasPrest,adelantos:cuotasAdel,realQuincenal,totalAPagar:total,pagado:false,facturado:false,extraCols:extra,incluyeEfectivo:true,efectivoExtra};
}
function recalcRow(row,extraCols){
  const compe=Math.max(0,row.compeBase-(row.faltas*row.salarioDiario));
  const realQuincenal=row.cfdiNomina+row.compeBase+row.sueldo;
  let sumaExtra=0,restaExtra=0;
  (extraCols||[]).forEach(c=>{const v=row.extraCols?.[c.id]||0;if(c.efecto==='suma')sumaExtra+=v;else if(c.efecto==='resta')restaExtra+=v;});
  const totalAPagar=(row.cfdiNomina+compe+row.sueldo)+sumaExtra-restaExtra-row.prestamos-row.adelantos;
  let efectivoExtra=0;
  if(row.incluyeEfectivo!==false){
    efectivoExtra=compe+row.sueldo;
    (extraCols||[]).forEach(c=>{if(c.afectaEfectivo)efectivoExtra+=(row.extraCols?.[c.id]||0);});
  }
  return {...row,compe,realQuincenal,totalAPagar,efectivoExtra};
}

// PDF de comprobante — estilo Grupo Rokma
function generarPDF(row,inicio,fin,rsOpts,extraCols){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'letter'});
  const W=216,M=20;
  doc.setFillColor(255,255,255);doc.rect(0,0,W,279,'F');

  // Banda gris superior
  doc.setFillColor(220,220,220);doc.rect(18,17,W-32,14,'F');
  drawRokmaBrandBox(doc,{x:12,y:5,w:26,h:44,logoSize:17,textScale:1.14,bgColor:[30,30,30],fgColor:[255,255,255]});
  // Título COMPENSACIÓN
  doc.setFont('helvetica','bold');doc.setFontSize(31);doc.setTextColor(24,24,24);
  doc.text('COMPENSACIÓN',122,28,{align:'center'});

  // Fecha
  const dateCapitalized=fmtFechaPago(new Date());
  doc.setFontSize(10.5);doc.setFont('helvetica','normal');doc.setTextColor(50,50,50);
  const labelFecha='Fecha: de pago ';
  doc.text(labelFecha,110,43);
  const lw=doc.getStringUnitWidth(labelFecha)*10.5/doc.internal.scaleFactor;
  doc.setFont('helvetica','bold');doc.text(dateCapitalized,110+lw,43);

  // Sección INFORMACIÓN DEL TRABAJADOR
  doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(30,30,30);
  doc.text('INFORMACIÓN DEL TRABAJADOR',M,62);
  doc.setDrawColor(180,180,180);doc.setLineWidth(0.4);doc.line(M,65,W-M,65);

  doc.setFontSize(10.5);
  doc.setFont('helvetica','bold');doc.setTextColor(40,40,40);
  doc.text('Nombre:',M,74);doc.setFont('helvetica','normal');doc.text(row.nombre,M+21,74);
  doc.setFont('helvetica','bold');doc.text('No de empleado:',130,74);doc.setFont('helvetica','normal');doc.text(String(row.numero),168,74);
  doc.setFont('helvetica','bold');doc.text('Sucursal:',M,82);doc.setFont('helvetica','normal');doc.text(row.sucursal,M+21,82);
  doc.setFont('helvetica','bold');doc.text('Faltas Totales:',M,90);doc.setFont('helvetica','normal');doc.text(String(row.faltas),M+34,90);
  doc.setFont('helvetica','bold');doc.text('Faltas a Descontar:',130,90);doc.setFont('helvetica','normal');doc.text(String(row.faltas),171,90);

  // Tabla de conceptos
  const body=[];
  body.push(['COMPENSACIÓN',fmt(row.compeBase),'1',fmt(row.compeBase)]);
  if(row.faltas>0){
    const fDesc=row.faltas*row.salarioDiario;
    body.push(['FALTAS',`-${fmt(row.salarioDiario)}`,String(row.faltas),`-${fmt(fDesc)}`]);
  }
  if(row.cfdiNomina>0)body.push(['CFDI NÓMINA',fmt(row.cfdiNomina),'1',fmt(row.cfdiNomina)]);
  if(row.sueldo>0)body.push([`SUELDO S/T (${row.rsSueldo||'N/A'})`,fmt(row.sueldo),'1',fmt(row.sueldo)]);
  (extraCols||[]).forEach(c=>{
    const v=row.extraCols?.[c.id]||0;
    if(v!==0){const isR=c.efecto==='resta';body.push([c.nombre,isR?`-${fmt(v)}`:fmt(v),'1',isR?`-${fmt(v)}`:fmt(v)]);}
  });
  if(row.prestamos>0)body.push(['PRÉSTAMO(S)',`-${fmt(row.prestamos)}`,'1',`-${fmt(row.prestamos)}`]);
  if(row.adelantos>0)body.push(['ADELANTO(S)',`-${fmt(row.adelantos)}`,'1',`-${fmt(row.adelantos)}`]);

  doc.autoTable({
    startY:97,
    head:[['DESCRIPCIÓN','SUBTOTAL','CANTIDAD','TOTAL']],
    body,
    foot:[['','','TOTAL',fmt(row.totalAPagar)]],
    theme:'grid',
    headStyles:{fillColor:[30,30,30],textColor:[255,255,255],fontStyle:'bold',fontSize:10,halign:'center'},
    footStyles:{fillColor:[215,215,215],textColor:[30,30,30],fontStyle:'bold',fontSize:11},
    bodyStyles:{fontSize:10,textColor:[40,40,40]},
    columnStyles:{0:{cellWidth:80},1:{halign:'right',cellWidth:42},2:{halign:'center',cellWidth:26},3:{halign:'right',cellWidth:32}},
    margin:{left:M,right:M},
    didParseCell:(d)=>{
      if(d.section==='body'){
        const desc=d.row.raw[0];
        if(desc==='FALTAS'||desc==='PRÉSTAMO(S)'||desc==='ADELANTO(S)'){
          if(d.column.index===1||d.column.index===3)d.cell.styles.textColor=[200,30,30];
        }
      }
      if(d.section==='foot'&&d.column.index===3)d.cell.styles.halign='right';
    }
  });

  const finalY=doc.lastAutoTable.finalY+10;
  // Importe en letra (minúsculas, cursiva)
  const letraRaw=numLetra(row.totalAPagar);
  const letraFmt=letraRaw.charAt(0)+letraRaw.slice(1).toLowerCase().replace('mxn','M.N.');
  doc.setFont('helvetica','italic');doc.setFontSize(10);doc.setTextColor(60,60,60);
  doc.text(letraFmt,M,finalY,{maxWidth:W-M*2});

  // Firmas
  const sigY=Math.min(finalY+50,245);
  doc.setDrawColor(80,80,80);doc.setLineWidth(0.4);
  doc.line(M,sigY,M+75,sigY);
  doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.setTextColor(30,30,30);
  doc.text('MARY CARMEN FLORES RIVERA',M,sigY+5);
  doc.setFont('helvetica','italic');doc.setFontSize(8.5);doc.setTextColor(80,80,80);
  doc.text('DIRECTORA ADMINISTRATIVA',M,sigY+10);
  doc.setDrawColor(80,80,80);doc.setLineWidth(0.4);
  doc.line(W-M-75,sigY,W-M,sigY);
  doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.setTextColor(30,30,30);
  doc.text(row.nombre,W-M-75,sigY+5);
  doc.setFont('helvetica','italic');doc.setFontSize(8.5);doc.setTextColor(80,80,80);
  doc.text('COLABORADOR',W-M-75,sigY+10);

  doc.save(`COMPE_${row.nombre.split(' ')[0]}_${row.nombre.split(' ')[1]}_${inicio}.pdf`);
}

// Gestor de columnas extra
function ColManager({cols,setCols,onClose}){
  const blank={id:uuid(),nombre:'',efecto:'suma',afectaEfectivo:false};
  const [f,setF]=useState(blank);
  const add=()=>{if(!f.nombre)return;setCols(p=>[...p,{...f}]);setF({...blank,id:uuid()});};
  const del=(id)=>setCols(p=>p.filter(c=>c.id!==id));
  const toggleEfecto=(id)=>setCols(p=>p.map(c=>c.id===id?{...c,efecto:c.efecto==='suma'?'resta':c.efecto==='resta'?'neutro':'suma'}:c));
  const toggleEfectivo=(id)=>setCols(p=>p.map(c=>c.id===id?{...c,afectaEfectivo:!c.afectaEfectivo}:c));
  const EFECTO_BADGE={suma:'badge-green',resta:'badge-red',neutro:'badge-gray'};
  const EFECTO_LABEL={suma:'+ Suma al total',resta:'− Resta del total',neutro:'sin efecto'};
  return <div>
    <p className="text-muted mb-3" style={{fontSize:12}}>Las columnas extra aparecen en la tabla de nómina. Haz clic en el efecto para cambiarlo. Activa 💵 para incluirla en Efectivo Extra.</p>
    {cols.map(c=><div key={c.id} className="flex items-center gap-2 mb-2" style={{background:'var(--panel2)',padding:'8px 12px',borderRadius:7}}>
      <span style={{flex:1,fontSize:12.5,fontWeight:500}}>{c.nombre}</span>
      <span className={`badge ${EFECTO_BADGE[c.efecto]}`} style={{cursor:'pointer'}} onClick={()=>toggleEfecto(c.id)}>{EFECTO_LABEL[c.efecto]}</span>
      <span className={`badge ${c.afectaEfectivo?'badge-cyan':'badge-gray'}`} style={{cursor:'pointer'}} onClick={()=>toggleEfectivo(c.id)} title="¿Suma a Efectivo Extra?">{c.afectaEfectivo?'💵 Efectivo':'💵 —'}</span>
      <button className="btn btn-danger btn-sm" onClick={()=>del(c.id)}>✕</button>
    </div>)}
    <div className="flex gap-2 mt-3" style={{flexWrap:'wrap'}}>
      <input placeholder="Nombre columna (ej: PV/TIMB)" value={f.nombre} onChange={e=>setF(p=>({...p,nombre:e.target.value.toUpperCase()}))} style={{flex:1,minWidth:160}} />
      <select value={f.efecto} onChange={e=>setF(p=>({...p,efecto:e.target.value}))} style={{width:140}}>
        <option value="suma">+ Suma</option><option value="resta">− Resta</option><option value="neutro">Sin efecto</option>
      </select>
      <label className="check-row" style={{fontSize:12,whiteSpace:'nowrap'}}><input type="checkbox" checked={f.afectaEfectivo} onChange={e=>setF(p=>({...p,afectaEfectivo:e.target.checked}))}/>💵 Efectivo</label>
      <button className="btn btn-primary" onClick={add}>+ Agregar</button>
    </div>
    <div className="form-actions"><button className="btn btn-green" onClick={onClose}>✓ Listo</button></div>
  </div>;
}

function NominaTable({rows,setRows,extraCols}){
  const upd=(idx,k,v)=>setRows(prev=>{
    const c=[...prev];const r={...c[idx],[k]:isNaN(+v)?v:+v};
    c[idx]=recalcRow(r,extraCols);return c;
  });
  const updExtra=(idx,colId,v)=>setRows(prev=>{
    const c=[...prev];const r={...c[idx],extraCols:{...c[idx].extraCols,[colId]:isNaN(+v)?0:+v}};
    c[idx]=recalcRow(r,extraCols);return c;
  });
  const toggleEfectivo=(idx,checked)=>setRows(prev=>{
    const c=[...prev];const r={...c[idx],incluyeEfectivo:checked};
    c[idx]=recalcRow(r,extraCols);return c;
  });
  const tot={cfdi:0,compe:0,sueldo:0,prest:0,adel:0,real:0,total:0,faltas:0,efectivo:0,extra:{}};
  rows.forEach(r=>{tot.cfdi+=r.cfdiNomina;tot.compe+=r.compe;tot.sueldo+=r.sueldo;tot.prest+=r.prestamos;tot.adel+=r.adelantos;tot.real+=r.realQuincenal;tot.total+=r.totalAPagar;tot.faltas+=r.faltas;if(r.incluyeEfectivo!==false)tot.efectivo+=(r.efectivoExtra||0);});
  (extraCols||[]).forEach(c=>{tot.extra[c.id]=rows.reduce((s,r)=>s+(r.extraCols?.[c.id]||0),0);});
  const ni=(idx,k)=>e=>upd(idx,k,e.target.value);
  const SI=(val,idx,k)=><input type="number" step="0.01" value={val} onChange={ni(idx,k)}/>;
  return <div className="nomina-wrap"><table className="nomina-table">
    <thead><tr>
      <th>#</th><th>RS</th><th>Nombre</th><th>Suc.</th><th>Días</th><th>Faltas</th>
      <th>CFDI Nómina</th><th>Compe</th><th>Sueldo S/T</th>
      {(extraCols||[]).map(c=><th key={c.id} className={c.efecto==='suma'?'col-suma':c.efecto==='resta'?'col-resta':''}>{c.nombre}</th>)}
      <th className="col-efec" title="Compe + Sueldo S/T + columnas marcadas como Efectivo. Desactiva por empleado con el checkbox.">💵 Efectivo Extra</th>
      <th className="col-resta">Préstamos</th><th className="col-resta">Adelantos</th>
      <th className="col-real">Real Quincenal</th>
      <th className="col-total">Total a Percibir</th>
      <th>Pagado</th><th>Facturado</th>
    </tr></thead>
    <tbody>
      {rows.map((r,i)=><tr key={r.empId}>
        <td style={{color:'var(--muted)',fontSize:10.5}}>{r.numero}</td>
        <td><RsBadge rs={r.rs}/></td>
        <td style={{fontWeight:500,minWidth:200}}>{r.nombre}</td>
        <td><span className="badge badge-gray">{r.sucursal}</span></td>
        <td>{SI(r.diasTrabajados,i,'diasTrabajados')}</td>
        <td style={{textAlign:'center'}}><span className={r.faltas>0?'badge badge-red':'badge badge-gray'}>{r.faltas}</span></td>
        <td>{fmt(r.cfdiNomina)}</td>
        <td style={{fontWeight:500}}>{fmt(r.compe)}</td>
        <td>{r.sueldo?<span className="text-gold">{fmt(r.sueldo)}</span>:<span className="text-muted">—</span>}</td>
        {(extraCols||[]).map(c=><td key={c.id} className={c.efecto==='suma'?'col-suma':c.efecto==='resta'?'col-resta':''}>
          <input type="number" step="0.01" value={r.extraCols?.[c.id]||0} onChange={e=>updExtra(i,c.id,e.target.value)}/>
        </td>)}
        <td className="col-efec">
          <label style={{display:'flex',alignItems:'center',gap:5,cursor:'pointer'}}>
            <input type="checkbox" checked={r.incluyeEfectivo!==false} onChange={e=>toggleEfectivo(i,e.target.checked)}/>
            {r.incluyeEfectivo!==false?fmt(r.efectivoExtra||0):<span className="text-muted" style={{fontWeight:400}}>—</span>}
          </label>
        </td>
        <td className="col-resta">{SI(r.prestamos,i,'prestamos')}</td>
        <td className="col-resta">{SI(r.adelantos,i,'adelantos')}</td>
        <td className="col-real">{fmt(r.realQuincenal)}</td>
        <td className="col-total">{fmt(r.totalAPagar)}</td>
        <td><input type="checkbox" checked={r.pagado} onChange={e=>upd(i,'pagado',e.target.checked)}/></td>
        <td><input type="checkbox" checked={r.facturado} onChange={e=>upd(i,'facturado',e.target.checked)}/></td>
      </tr>)}
    </tbody>
    <tfoot><tr className="tr-total">
      <td colSpan={6}>{rows.length} empleados — {tot.faltas} faltas</td>
      <td>{fmt(tot.cfdi)}</td><td>{fmt(tot.compe)}</td><td>{fmt(tot.sueldo)}</td>
      {(extraCols||[]).map(c=><td key={c.id}>{fmt(tot.extra[c.id]||0)}</td>)}
      <td className="col-efec">{fmt(tot.efectivo)}</td>
      <td>{fmt(tot.prest)}</td><td>{fmt(tot.adel)}</td>
      <td>{fmt(tot.real)}</td><td>{fmt(tot.total)}</td><td colSpan={2}/>
    </tr></tfoot>
  </table></div>;
}

function Nomina(){
  const [emps]=useState(()=>LS.get(K.emp,[]));
  const [incs]=useState(()=>LS.get(K.inc,[]));
  const [prest,setPrest]=useState(()=>LS.get(K.prest,[]));
  const [quins,setQuins]=useState(()=>LS.get(K.quin,[]));
  const [rs]=useState(()=>LS.get(K.rs,SEED_RS));
  const abierta=useMemo(()=>quins.find(q=>q.status==='abierta'),[quins]);
  const [inicio,setInicio]=useState('2026-04-16');
  const [fin,setFin]=useState('2026-04-30');
  const [rows,setRows]=useState([]);
  const [extraCols,setExtraCols]=useState([]);
  const [modalNew,setModalNew]=useState(false);
  const [modalCols,setModalCols]=useState(false);
  const [confirmCerrar,setConfirmCerrar]=useState(false);
  const [saved,setSaved]=useState(false);

  useEffect(()=>{
    if(abierta){
      setInicio(abierta.inicio);setFin(abierta.fin);
      setExtraCols(abierta.extraCols||[]);
      if(abierta.rows)setRows(abierta.rows);
      else setRows(emps.filter(e=>e.activo).sort((a,b)=>a.numero-b.numero).map(e=>buildRow(e,abierta.inicio,abierta.fin,incs,prest,abierta.extraCols||[])));
    }
  },[abierta]);

  const recalcTodo=()=>{
    if(!abierta)return;
    const freshIncs=LS.get(K.inc,[]);
    const freshPrest=LS.get(K.prest,[]);
    setPrest(freshPrest);
    setRows(prev=>prev.map(r=>{
      const faltas=calcFaltas(r.empId,abierta.inicio,abierta.fin,freshIncs);
      const cuotasPrest=freshPrest.filter(p=>p.empleadoId===r.empId&&p.activo&&p.saldoPendiente>0&&p.tipo==='PRÉSTAMO').reduce((s,p)=>s+(p.cuotaQuincenal||0),0);
      const cuotasAdel=freshPrest.filter(p=>p.empleadoId===r.empId&&p.activo&&p.saldoPendiente>0&&p.tipo==='ADELANTO').reduce((s,p)=>s+(p.cuotaQuincenal||0),0);
      return recalcRow({...r,faltas,prestamos:cuotasPrest,adelantos:cuotasAdel},extraCols);
    }));
  };

  const autoSave=()=>{
    if(!abierta)return;
    const up=quins.map(q=>q.id===abierta.id?{...q,rows,extraCols}:q);
    setQuins(up);LS.set(K.quin,up);setSaved(true);setTimeout(()=>setSaved(false),2000);
  };

  const crearQna=()=>{
    const nueva={id:uuid(),inicio,fin,status:'abierta',rows:null,extraCols:[],fechaCreacion:today()};
    const up=[...quins,nueva];setQuins(up);LS.set(K.quin,up);setModalNew(false);
    setExtraCols([]);
    setRows(emps.filter(e=>e.activo).sort((a,b)=>a.numero-b.numero).map(e=>buildRow(e,inicio,fin,incs,prest,[])));
  };

  const cerrarQna=()=>{
    // Aplicar exactamente lo capturado en la quincena, distribuyéndolo
    // sobre los saldos activos del empleado, del más antiguo al más nuevo.
    let prestUp=[...prest];
    rows.forEach(r=>{
      if(r.prestamos>0||r.adelantos>0){
        const restantes={'PRÉSTAMO':Number(r.prestamos)||0,'ADELANTO':Number(r.adelantos)||0};
        ['PRÉSTAMO','ADELANTO'].forEach(tipo=>{
          let restante=restantes[tipo]||0;
          if(restante<=0)return;
          const ordenados=[...prestUp].map((p,idx)=>({...p,__idx:idx})).filter(p=>p.empleadoId===r.empId&&p.tipo===tipo&&p.activo&&p.saldoPendiente>0).sort((a,b)=>String(a.fechaOtorgado||'').localeCompare(String(b.fechaOtorgado||''))||a.__idx-b.__idx);
          ordenados.forEach(p=>{
            if(restante<=0)return;
            const abono=Math.min(restante,p.saldoPendiente);
            restante=Number((restante-abono).toFixed(2));
            prestUp=prestUp.map(x=>x.id===p.id?{...x,saldoPendiente:Number((x.saldoPendiente-abono).toFixed(2)),activo:Number((x.saldoPendiente-abono).toFixed(2))>0}:x);
          });
        });
      }
    });
    LS.set(K.prest,prestUp);setPrest(prestUp);
    const up=quins.map(q=>q.id===abierta.id?{...q,status:'cerrada',rows,extraCols,fechaCierre:today()}:q);
    setQuins(up);LS.set(K.quin,up);setConfirmCerrar(false);
  };

  if(!abierta)return <div style={{textAlign:'center',paddingTop:80}}>
    <div style={{fontSize:48,marginBottom:14}}>📋</div>
    <p className="text-muted mb-4">No hay quincena abierta.</p>
    <button className="btn btn-primary" onClick={()=>setModalNew(true)}>+ Crear Quincena</button>
    <Modal open={modalNew} onClose={()=>setModalNew(false)} title="Nueva Quincena">
      <div className="form-row">
        <div className="form-group"><label>Inicio</label><input type="date" value={inicio} onChange={e=>setInicio(e.target.value)}/></div>
        <div className="form-group"><label>Fin</label><input type="date" value={fin} onChange={e=>setFin(e.target.value)}/></div>
      </div>
      <div className="form-actions"><button className="btn btn-secondary" onClick={()=>setModalNew(false)}>Cancelar</button><button className="btn btn-primary" onClick={crearQna}>✓ Crear</button></div>
    </Modal>
  </div>;

  const tots={real:rows.reduce((s,r)=>s+r.realQuincenal,0),total:rows.reduce((s,r)=>s+r.totalAPagar,0),cfdi:rows.reduce((s,r)=>s+r.cfdiNomina,0)};

  return <div>
    <div className="kpi-grid">
      <div className="kpi"><div className="kpi-label">Período</div><div className="kpi-value" style={{fontSize:12.5}}>{fmtDate(abierta.inicio)} — {fmtDate(abierta.fin)}</div><div className="kpi-sub text-green">🟢 Abierta</div></div>
      <div className="kpi"><div className="kpi-label">Real Quincenal</div><div className="kpi-value text-blue" style={{fontSize:15}}>{fmt(tots.real)}</div></div>
      <div className="kpi"><div className="kpi-label">Total a Percibir</div><div className="kpi-value text-gold" style={{fontSize:15}}>{fmt(tots.total)}</div></div>
      <div className="kpi"><div className="kpi-label">CFDI Total</div><div className="kpi-value" style={{fontSize:15}}>{fmt(tots.cfdi)}</div></div>
      <div className="kpi"><div className="kpi-label">Empleados</div><div className="kpi-value">{rows.length}</div></div>
    </div>
    <div className="section-header">
      <div className="flex gap-2 items-center flex-wrap">
        <button className="btn btn-secondary" onClick={()=>setModalCols(true)}>⚙️ Columnas Extra</button>
        <span className="text-muted" style={{fontSize:11}}>Columnas activas: {extraCols.length}</span>
      </div>
      <div className="flex gap-2">
        {saved&&<span className="text-green" style={{fontSize:12,alignSelf:'center'}}>✓ Guardado</span>}
        <button className="btn btn-blue" onClick={recalcTodo}>🔄 Recalcular Todo</button>
        <button className="btn btn-secondary" onClick={autoSave}>💾 Guardar</button>
        <button className="btn btn-danger" onClick={()=>setConfirmCerrar(true)}>🔒 Cerrar Quincena</button>
      </div>
    </div>
    <NominaTable rows={rows} setRows={setRows} extraCols={extraCols}/>
    <div style={{marginTop:18}}>
      <div className="section-title mb-2">📄 Generar Comprobantes PDF</div>
      <div className="flex flex-wrap gap-1">
        {rows.map(r=><button key={r.empId} className="btn btn-secondary btn-sm" onClick={()=>generarPDF(r,abierta.inicio,abierta.fin,rs,extraCols)}>
          📄 {r.nombre.split(' ').slice(0,2).join(' ')}
        </button>)}
      </div>
    </div>
    <Modal open={modalCols} onClose={()=>{setModalCols(false);}} title="⚙️ Gestionar Columnas Extra" lg>
      <ColManager cols={extraCols} setCols={c=>{setExtraCols(c);setRows(prev=>prev.map(r=>{const ne=c.reduce((s,col)=>({...s,[col.id]:r.extraCols?.[col.id]||0}),{});return recalcRow({...r,extraCols:ne},c);}));}} onClose={()=>setModalCols(false)}/>
    </Modal>
    <Confirm open={confirmCerrar} msg={`¿Cerrar quincena ${fmtDate(abierta.inicio)} — ${fmtDate(abierta.fin)}? Se guardará el snapshot y se actualizarán los préstamos.`} onYes={cerrarQna} onNo={()=>setConfirmCerrar(false)}/>
  </div>;
}
