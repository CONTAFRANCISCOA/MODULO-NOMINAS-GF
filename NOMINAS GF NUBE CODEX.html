function Empleados(){
  const [emps,setEmps]=useState(()=>LS.get(K.emp,[]));
  const [rs]=useState(()=>LS.get(K.rs,SEED_RS));
  const [modal,setModal]=useState(null);
  const [sel,setSel]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [search,setSearch]=useState('');
  const [showInact,setShowInact]=useState(false);
  const [sf,setSf]=useState('numero');
  const [sd,setSd]=useState('asc');
  const onSort=(f)=>{setSf(f);setSd(p=>sf===f?(p==='asc'?'desc':'asc'):'asc');};

  const filtered=useMemo(()=>{
    let r=emps.filter(e=>showInact?true:e.activo).filter(e=>e.nombre.toLowerCase().includes(search.toLowerCase())||e.sucursal.toLowerCase().includes(search.toLowerCase()));
    r.sort((a,b)=>{const va=a[sf],vb=b[sf],m=sd==='asc'?1:-1;return typeof va==='number'?(va-vb)*m:String(va||'').localeCompare(String(vb||''))*m;});
    return r;
  },[emps,search,showInact,sf,sd]);

  const handleSave=(f)=>{
    const up=sel?emps.map(e=>e.id===sel.id?{...f,id:sel.id}:e):[...emps,{...f,id:uuid()}];
    setEmps(up);LS.set(K.emp,up);setModal(null);setSel(null);
  };
  const handleSaveVac=(f)=>{
    const up=emps.map(e=>e.id===sel.id?{...f,id:sel.id}:e);
    setEmps(up);LS.set(K.emp,up);
    // Reset vacation saldo
    const vs=LS.get(K.vacSaldo,{});
    vs[sel.id]=f.diasVacaciones;LS.set(K.vacSaldo,vs);
    setModal(null);setSel(null);
  };
  const handleBaja=(e)=>{const up=emps.map(x=>x.id===e.id?{...x,activo:false,fechaBaja:today()}:x);setEmps(up);LS.set(K.emp,up);setConfirm(null);};
  const handleReactivar=(e)=>{const up=emps.map(x=>x.id===e.id?{...x,activo:true,fechaBaja:null}:x);setEmps(up);LS.set(K.emp,up);};

  const exportExcel=()=>{
    const data=filtered.map(e=>({'N°':e.numero,'Nombre':e.nombre,'RS':e.rs,'Sucursal':e.sucursal,'Sal. Diario':e.salarioDiario,'CFDI Nómina':e.cfdiNomina,'Compe Base':e.compeBase,'Sueldo S/T':e.sueldo,'Real Quincenal':e.cfdiNomina+e.compeBase+e.sueldo,'Días Qna':e.diasQna,'Días Vac/Año':e.diasVacaciones,'Estado':e.activo?'Activo':'Baja','Fecha Alta':e.fechaAlta,'Fecha Baja':e.fechaBaja||''}));
    const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Empleados');XLSX.writeFile(wb,'Empleados_GF.xlsx');
  };

  const nxtNum=useMemo(()=>Math.max(0,...emps.map(e=>e.numero))+1,[emps]);
  const SP={campo:(s)=>({className:`sortable`,onClick:()=>onSort(s)})};

  return <div>
    <div className="kpi-grid">
      <div className="kpi"><div className="kpi-label">Activos</div><div className="kpi-value text-green">{emps.filter(e=>e.activo).length}</div></div>
      <div className="kpi"><div className="kpi-label">Inactivos</div><div className="kpi-value text-muted">{emps.filter(e=>!e.activo).length}</div></div>
      <div className="kpi"><div className="kpi-label">Nómina Base Total</div><div className="kpi-value text-gold" style={{fontSize:14}}>{fmt(emps.filter(e=>e.activo).reduce((s,e)=>s+e.cfdiNomina+e.compeBase+e.sueldo,0))}</div></div>
    </div>
    <div className="section-header">
      <div className="flex items-center gap-2 flex-wrap">
        <div className="search-bar"><span className="search-icon">🔍</span><input placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <label className="check-row text-muted" style={{fontSize:12}}><input type="checkbox" checked={showInact} onChange={e=>setShowInact(e.target.checked)}/>Ver inactivos</label>
      </div>
      <div className="flex gap-2">
        <button className="btn btn-secondary" onClick={exportExcel}>📊 Excel</button>
        <button className="btn btn-primary" onClick={()=>{setSel(null);setModal('form');}}>+ Nuevo</button>
      </div>
    </div>
    <div className="table-wrap"><table>
      <thead><tr>
        <SortTh field="numero" label="#" sf={sf} sd={sd} onSort={onSort}/>
        <SortTh field="rs" label="RS" sf={sf} sd={sd} onSort={onSort}/>
        <SortTh field="nombre" label="Nombre" sf={sf} sd={sd} onSort={onSort}/>
        <SortTh field="sucursal" label="Sucursal" sf={sf} sd={sd} onSort={onSort}/>
        <SortTh field="salarioDiario" label="Sal. Diario" sf={sf} sd={sd} onSort={onSort}/>
        <SortTh field="cfdiNomina" label="CFDI" sf={sf} sd={sd} onSort={onSort}/>
        <SortTh field="compeBase" label="Compe" sf={sf} sd={sd} onSort={onSort}/>
        <th>Sueldo S/T</th><th>Real Qna.</th><th>Días Qna</th><th>Vac/Año</th><th>Estado</th><th>Acciones</th>
      </tr></thead>
      <tbody>{filtered.map(e=>{
        const real=e.cfdiNomina+e.compeBase+e.sueldo;
        return <tr key={e.id} style={e.activo?{}:{opacity:.5}}>
          <td className="text-muted" style={{fontSize:10.5}}>{e.numero}</td>
          <td><RsBadge rs={e.rs}/></td>
          <td style={{fontWeight:500}}>{e.nombre}</td>
          <td><span className="badge badge-gray">{e.sucursal}</span></td>
          <td>{fmt(e.salarioDiario)}</td><td>{fmt(e.cfdiNomina)}</td><td>{fmt(e.compeBase)}</td>
          <td>{e.sueldo?<span className="text-gold">{fmt(e.sueldo)}</span>:<span className="text-muted">—</span>}</td>
          <td style={{fontWeight:600}}>{fmt(real)}</td>
          <td style={{textAlign:'center'}}>{e.diasQna||15}</td>
          <td style={{textAlign:'center'}}>{e.diasVacaciones||12}</td>
          <td>{e.activo?<span className="badge badge-green">Activo</span>:<span className="badge badge-red">Baja</span>}</td>
          <td><div className="flex gap-1">
            <button className="btn btn-secondary btn-sm" onClick={()=>{setSel(e);setModal('form');}}>✏️</button>
            {e.activo?<button className="btn btn-danger btn-sm" onClick={()=>setConfirm(e)}>Baja</button>:<button className="btn btn-green btn-sm" onClick={()=>handleReactivar(e)}>Activar</button>}
          </div></td>
        </tr>;
      })}</tbody>
    </table></div>
    <Modal open={modal==='form'} onClose={()=>{setModal(null);setSel(null);}} title={sel?'Editar Empleado':'Nuevo Empleado'} lg>
      <EmpForm emp={sel?{...sel}:{numero:nxtNum,nombre:'',rs:'MCFR',sucursal:'LAB/NF',salarioDiario:0,cfdiNomina:0,compeBase:0,sueldo:0,rsSueldo:'',activo:true,fechaAlta:today(),fechaBaja:null,diasQna:15,diasVacaciones:12}} onSave={handleSave} onSaveVac={handleSaveVac} onClose={()=>{setModal(null);setSel(null);}} rsOpts={rs}/>
    </Modal>
    <Confirm open={!!confirm} msg={`¿Dar de baja a ${confirm?.nombre}?`} onYes={()=>handleBaja(confirm)} onNo={()=>setConfirm(null)}/>
  </div>;
}

/* ══════════════════════════════════════════════════════════
   INCIDENCIAS
══════════════════════════════════════════════════════════ */
function Incidencias(){
  const [incs,setIncs]=useState(()=>LS.get(K.inc,[]));
  const [tipos,setTipos]=useState(()=>LS.get(K.tipos,SEED_TIPOS));
  const [emps]=useState(()=>LS.get(K.emp,[]));
  const [tab,setTab]=useState('reg');
  const [modal,setModal]=useState(null);
  const [editInc,setEditInc]=useState(null);
  const [search,setSearch]=useState('');
  const [filterMes,setFilterMes]=useState('');
  const blank={empleadoId:'',tipo:'',fecha:today(),motivo:'',horaSalida:'',horaRegreso:'',horaLlegada:''};
  const [f,setF]=useState(blank);
  const fileRef=useRef(null);
  const fld=(k,v)=>setF(p=>({...p,[k]:v}));
  const syncDiasDeb=up=>recalcDiasDebFromIncidencias(up,tipos);
  const normalizeDateValue=v=>{
    if(v===null||v===undefined||v==='')return '';
    if(typeof v==='number'){
      const d=XLSX.SSF.parse_date_code(v);
      if(!d)return '';
      return `${String(d.y).padStart(4,'0')}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
    }
    const raw=String(v).trim();
    if(!raw)return '';
    if(/^\d{4}-\d{2}-\d{2}$/.test(raw))return raw;
    const dt=new Date(raw);
    if(Number.isNaN(dt.getTime()))return '';
    return new Date(dt.getTime()-dt.getTimezoneOffset()*60000).toISOString().slice(0,10);
  };
  const normalizeTimeValue=v=>{
    const raw=String(v||'').trim();
    if(!raw)return '';
    if(/^\d{2}:\d{2}$/.test(raw))return raw;
    if(/^\d{1,2}:\d{2}(:\d{2})?$/.test(raw)){
      const parts=raw.split(':');
      return `${String(parts[0]).padStart(2,'0')}:${parts[1]}`;
    }
    return '';
  };
  const exportTemplate=()=>{
    const ejemploEmp=emps.find(e=>e.activo)||emps[0];
    const ejemploTipo=tipos[0]?.nombre||'FALTA';
    const wsTpl=XLSX.utils.json_to_sheet([{
      empleadoNumero:ejemploEmp?.numero||1,
      empleadoNombre:ejemploEmp?.nombre||'NOMBRE COMPLETO',
      tipo:ejemploTipo,
      fecha:today(),
      motivo:'MOTIVO OPCIONAL',
      horaSalida:'',
      horaRegreso:'',
      horaLlegada:''
    }]);
    const wsInfo=XLSX.utils.json_to_sheet(emps.filter(e=>e.activo).sort((a,b)=>a.numero-b.numero).map(e=>({
      empleadoNumero:e.numero,
      empleadoNombre:e.nombre,
      sucursal:e.sucursal
    })));
    const wsTipos=XLSX.utils.json_to_sheet(tipos.map(t=>({
      tipo:t.nombre,
      descuenta:t.descuenta?'SI':'NO',
      afectaVacaciones:t.afectaVac?'SI':'NO',
      afectaDiasDebidos:t.afectaDias?'SI':'NO'
    })));
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,wsTpl,'Plantilla');
    XLSX.utils.book_append_sheet(wb,wsInfo,'Empleados');
    XLSX.utils.book_append_sheet(wb,wsTipos,'Tipos');
    XLSX.writeFile(wb,'Plantilla_Importacion_Incidencias.xlsx');
  };
  const exportExcel=()=>{
    const data=filtered.map(i=>{
      const emp=emps.find(e=>e.id===i.empleadoId)||{};
      return {
        'Fecha':i.fecha,
        'Empleado N°':emp.numero||'',
        'Empleado':i.empleadoNombre,
        'Sucursal':emp.sucursal||'',
        'Tipo':i.tipo,
        'Descuenta':i.descuenta?'Sí':'No',
        'Motivo':i.motivo||'',
        'Hora Salida':i.horaSalida||'',
        'Hora Regreso':i.horaRegreso||'',
        'Hora Llegada':i.horaLlegada||''
      };
    });
    const ws=XLSX.utils.json_to_sheet(data);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Incidencias');
    XLSX.writeFile(wb,`Incidencias_${filterMes||today()}.xlsx`);
  };
  const exportPDFIncidencia=inc=>{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:'mm',format:'letter'});
    const emp=emps.find(e=>e.id===inc.empleadoId)||{};
    const W=216,M=18;
    addReportHeader(doc,'ACUSE DE INCIDENCIA',{
      accent:[222,238,248],
      textColor:[20,78,120],
      titleSize:21,
      bandY:13,
      bandH:13,
      bandX:20,
      bandW:W-30,
      box:{x:10,y:4,w:26,h:44,logoSize:15,textScale:1.12,bgColor:[25,88,168],fgColor:[255,255,255]}
    });
    doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(60,60,60);
    doc.text('Fecha de emisión:',110,45);
    doc.setFont('helvetica','bold');doc.text(fmtFechaPago(new Date()),145,45);

    doc.setFillColor(240,248,253);doc.roundedRect(M,52,W-M*2,30,3,3,'F');
    doc.setDrawColor(175,212,234);doc.roundedRect(M,52,W-M*2,30,3,3,'S');
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(20,78,120);
    doc.text('DATOS DEL COLABORADOR',M+4,60);
    doc.setFont('helvetica','normal');doc.setFontSize(10);
    doc.setTextColor(40,40,40);
    doc.text(`Nombre: ${inc.empleadoNombre||'—'}`,M+4,68);
    doc.text(`Sucursal: ${emp.sucursal||'—'}`,M+4,75);
    doc.text(`No. de empleado: ${emp.numero||'—'}`,118,68);
    doc.text(`Fecha de incidencia: ${fmtDate(inc.fecha)}`,118,75);

    const body=[
      ['Tipo de incidencia',inc.tipo||'—']
    ];
    if(inc.motivo)body.push(['Motivo / descripción',inc.motivo]);
    if(inc.horaSalida)body.push(['Hora salida',inc.horaSalida]);
    if(inc.horaRegreso)body.push(['Hora regreso',inc.horaRegreso]);
    if(inc.horaLlegada)body.push(['Hora llegada',inc.horaLlegada]);
    if(inc.descuenta)body.push(['Descuenta compensación','Sí']);
    doc.autoTable({
      startY:88,
      head:[['Concepto','Detalle']],
      body,
      theme:'grid',
      headStyles:{fillColor:[46,126,177],textColor:[255,255,255],fontStyle:'bold',fontSize:10},
      bodyStyles:{fontSize:10,textColor:[40,40,40]},
      columnStyles:{0:{cellWidth:54,fontStyle:'bold'},1:{cellWidth:126}},
      margin:{left:M,right:M}
    });

    let y=doc.lastAutoTable.finalY+12;
    doc.setFont('helvetica','normal');doc.setFontSize(10.5);doc.setTextColor(50,50,50);
    const texto=`Por medio del presente, el colaborador queda enterado de la incidencia registrada en el sistema de Recursos Humanos de Grupo Rokma, correspondiente a la fecha y detalle señalados en este documento.`;
    doc.text(texto,M,y,{maxWidth:W-M*2,align:'justify'});
    y+=28;
    doc.text('Firma de enterado:',M,y);
    y+=18;
    doc.setDrawColor(90,90,90);doc.setLineWidth(0.35);
    doc.line(M,y,M+76,y);
    doc.line(W-M-76,y,W-M,y);
    doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.setTextColor(30,30,30);
    doc.text('MARY CARMEN FLORES RIVERA',M,y+5);
    doc.text(inc.empleadoNombre||'COLABORADOR',W-M-76,y+5);
    doc.setFont('helvetica','italic');doc.setFontSize(8.5);doc.setTextColor(90,90,90);
    doc.text('DIRECTORA ADMINISTRATIVA',M,y+10);
    doc.text('COLABORADOR',W-M-76,y+10);

    const safeName=normTxt(inc.empleadoNombre||'INCIDENCIA').replace(/[^A-Z0-9 ]/g,'').trim().replace(/\s+/g,'_');
    doc.save(`Incidencia_${safeName||'COLABORADOR'}_${inc.fecha||today()}.pdf`);
  };
  const importIncidencias=async e=>{
    const file=e.target.files?.[0];
    if(!file)return;
    try{
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      const errores=[];
      let vacSaldoActual=LS.get(K.vacSaldo,{});
      const nuevos=[];
      rows.forEach((row,idx)=>{
        const numero=Number(row.empleadoNumero||row.numero||row['empleado_numero']||0);
        const nombre=normTxt(row.empleadoNombre||row.nombre||row.empleado||'');
        const tipoNombre=normTxt(row.tipo||'');
        const fecha=normalizeDateValue(row.fecha||row.Fecha||row.FECHA);
        const emp=numero?emps.find(x=>x.numero===numero):emps.find(x=>normTxt(x.nombre)===nombre);
        const tipo=findTipo(tipos,tipoNombre);
        if(!emp){errores.push(`Fila ${idx+2}: empleado no encontrado.`);return;}
        if(!tipo){errores.push(`Fila ${idx+2}: tipo inválido.`);return;}
        if(!fecha){errores.push(`Fila ${idx+2}: fecha inválida.`);return;}
        let data={
          id:uuid(),
          empleadoId:emp.id,
          empleadoNombre:emp.nombre,
          tipo:tipo.nombre,
          fecha,
          motivo:normTxt(row.motivo||''),
          horaSalida:normalizeTimeValue(row.horaSalida),
          horaRegreso:normalizeTimeValue(row.horaRegreso),
          horaLlegada:normalizeTimeValue(row.horaLlegada),
          descuenta:tipo.descuenta
        };
        if(tipo.afectaVac){
          const cur=Number(vacSaldoActual[emp.id]??emp.diasVacaciones??0);
          const vacApplied=cur>0;
          if(vacApplied)vacSaldoActual={...vacSaldoActual,[emp.id]:cur-1};
          data={...data,_fx:{vacApplied}};
        }
        nuevos.push(data);
      });
      if(errores.length){
        window.alert(`Se encontraron errores:\n\n${errores.slice(0,10).join('\n')}${errores.length>10?`\n... y ${errores.length-10} más`:''}`);
        return;
      }
      if(!nuevos.length){
        window.alert('No se encontraron incidencias válidas para importar.');
        return;
      }
      LS.set(K.vacSaldo,vacSaldoActual);
      const up=[...nuevos,...incs];
      setIncs(up);LS.set(K.inc,up);
      syncDiasDeb(up);
      window.alert(`Se importaron ${nuevos.length} incidencia(s) correctamente.`);
    }catch(err){
      window.alert(`No se pudo importar el archivo.\n${err?.message||err}`);
    }finally{
      e.target.value='';
    }
  };

  const saveInc=()=>{
    const emp=emps.find(e=>e.id===f.empleadoId);
    const tipo=tipos.find(t=>t.nombre===f.tipo);
    if(!emp||!tipo||!f.fecha)return;
    if(editInc)revertVacIncidenceEffect(editInc,tipos,emps);
    let data={...f,id:editInc?editInc.id:uuid(),empleadoNombre:emp.nombre,descuenta:tipo.descuenta};
    data=applyVacIncidenceEffect(data,tipos,emps).inc;
    const up=editInc?incs.map(i=>i.id===editInc.id?data:i):[data,...incs];
    setIncs(up);LS.set(K.inc,up);setF(blank);setEditInc(null);setModal(null);
    syncDiasDeb(up);
  };

  const delInc=(id)=>{
    const target=incs.find(i=>i.id===id);
    if(target)revertVacIncidenceEffect(target,tipos,emps);
    const up=incs.filter(i=>i.id!==id);
    setIncs(up);LS.set(K.inc,up);
    syncDiasDeb(up);
  };
  const openEdit=(i)=>{setEditInc(i);setF({empleadoId:i.empleadoId,tipo:i.tipo,fecha:i.fecha,motivo:i.motivo,horaSalida:i.horaSalida||'',horaRegreso:i.horaRegreso||'',horaLlegada:i.horaLlegada||''});setModal('form');};

  const [tipoF,setTipoF]=useState({nombre:'',descuenta:false,color:'#3b82f6',afectaVac:false,afectaDias:false});
  const saveTipo=()=>{if(!tipoF.nombre)return;const up=[...tipos,{...tipoF,id:uuid()}];setTipos(up);LS.set(K.tipos,up);setTipoF({nombre:'',descuenta:false,color:'#3b82f6',afectaVac:false,afectaDias:false});};
  const delTipo=(id)=>{const up=tipos.filter(t=>t.id!==id);setTipos(up);LS.set(K.tipos,up);};
  const toggleDesc=(id)=>{const up=tipos.map(t=>t.id===id?{...t,descuenta:!t.descuenta}:t);setTipos(up);LS.set(K.tipos,up);};

  const filtered=useMemo(()=>incs.filter(i=>!search||i.empleadoNombre.toLowerCase().includes(search.toLowerCase())||i.tipo.toLowerCase().includes(search.toLowerCase())).filter(i=>!filterMes||i.fecha.startsWith(filterMes)).sort((a,b)=>b.fecha.localeCompare(a.fecha)),[incs,search,filterMes]);

  return <div>
    <div className="tabs">
      <button className={`tab ${tab==='reg'?'active':''}`} onClick={()=>setTab('reg')}>📋 Registro</button>
      <button className={`tab ${tab==='tipos'?'active':''}`} onClick={()=>setTab('tipos')}>⚙️ Tipos</button>
    </div>
    {tab==='reg'&&<>
      <div className="section-header">
        <div className="flex items-center gap-2 flex-wrap">
          <div className="search-bar"><span className="search-icon">🔍</span><input placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
          <input type="month" value={filterMes} onChange={e=>setFilterMes(e.target.value)} style={{background:'var(--panel2)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 10px',color:'var(--text)',fontSize:12.5}}/>
        </div>
        <div className="flex gap-2">
          <button className="btn btn-secondary" onClick={exportExcel}>📊 Excel</button>
          <button className="btn btn-secondary" onClick={exportTemplate}>📄 Plantilla</button>
          <button className="btn btn-secondary" onClick={()=>fileRef.current?.click()}>📥 Importar</button>
          <button className="btn btn-primary" onClick={()=>{setEditInc(null);setF(blank);setModal('form');}}>+ Registrar</button>
          <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={importIncidencias}/>
        </div>
      </div>
      <div className="table-wrap"><table>
        <thead><tr><th>Fecha</th><th>Empleado</th><th>Tipo</th><th>Descuenta</th><th>Motivo</th><th>Horas</th><th>Acciones</th></tr></thead>
        <tbody>
          {!filtered.length&&<tr><td colSpan={7} style={{textAlign:'center',color:'var(--muted)',padding:32}}>Sin registros</td></tr>}
          {filtered.map(i=>{const t=tipos.find(x=>x.nombre===i.tipo);return <tr key={i.id}>
            <td>{fmtDate(i.fecha)}</td>
            <td style={{fontWeight:500}}>{i.empleadoNombre}</td>
            <td><span className="badge" style={{background:`${t?.color||'#666'}22`,color:t?.color||'#aaa'}}>{i.tipo}</span></td>
            <td>{i.descuenta?<span className="badge badge-red">Sí</span>:<span className="badge badge-gray">No</span>}</td>
            <td className="text-muted" style={{maxWidth:200,overflow:'hidden',textOverflow:'ellipsis'}}>{i.motivo}</td>
            <td style={{fontSize:10.5,color:'var(--muted)'}}>{[i.horaSalida&&`Sal:${i.horaSalida}`,i.horaRegreso&&`Reg:${i.horaRegreso}`,i.horaLlegada&&`Lle:${i.horaLlegada}`].filter(Boolean).join(' ')}</td>
            <td><div className="flex gap-1"><button className="btn btn-secondary btn-sm" onClick={()=>exportPDFIncidencia(i)}>📄</button><button className="btn btn-secondary btn-sm" onClick={()=>openEdit(i)}>✏️</button><button className="btn btn-danger btn-sm" onClick={()=>delInc(i.id)}>✕</button></div></td>
          </tr>;})}
        </tbody>
      </table></div>
    </>}
    {tab==='tipos'&&<div>
      <div className="card mb-4">
        <div className="section-title mb-3">➕ Nuevo Tipo</div>
        <div className="form-row c3">
          <div className="form-group"><label>Nombre</label><input value={tipoF.nombre} onChange={e=>setTipoF(p=>({...p,nombre:e.target.value.toUpperCase()}))}/></div>
          <div className="form-group"><label>Color</label><input type="color" value={tipoF.color} onChange={e=>setTipoF(p=>({...p,color:e.target.value}))}/></div>
          <div className="form-group"><label>Efectos</label>
            <div style={{display:'flex',flexDirection:'column',gap:4,marginTop:2}}>
              <label className="check-row" style={{fontSize:11}}><input type="checkbox" checked={tipoF.descuenta} onChange={e=>setTipoF(p=>({...p,descuenta:e.target.checked}))}/>Descuenta compe</label>
              <label className="check-row" style={{fontSize:11}}><input type="checkbox" checked={tipoF.afectaVac} onChange={e=>setTipoF(p=>({...p,afectaVac:e.target.checked}))}/>Usa día de vacaciones</label>
              <label className="check-row" style={{fontSize:11}}><input type="checkbox" checked={tipoF.afectaDias} onChange={e=>setTipoF(p=>({...p,afectaDias:e.target.checked}))}/>Usa día debido</label>
            </div>
          </div>
        </div>
        <button className="btn btn-primary" onClick={saveTipo}>+ Agregar Tipo</button>
      </div>
      <div className="table-wrap"><table>
        <thead><tr><th>Nombre</th><th>Color</th><th>Descuenta</th><th>Afecta Vac.</th><th>Afecta Días Deb.</th><th>Usos</th><th></th></tr></thead>
        <tbody>{tipos.map(t=><tr key={t.id}>
          <td><span className="badge" style={{background:`${t.color}22`,color:t.color}}>{t.nombre}</span></td>
          <td><div style={{width:22,height:22,borderRadius:4,background:t.color}}/></td>
          <td><label className="check-row"><input type="checkbox" checked={t.descuenta} onChange={()=>toggleDesc(t.id)}/><span style={{fontSize:11,color:t.descuenta?'var(--red)':'var(--muted)'}}>{t.descuenta?'Sí':'No'}</span></label></td>
          <td><span className={`badge ${t.afectaVac?'badge-green':'badge-gray'}`}>{t.afectaVac?'Sí':'No'}</span></td>
          <td><span className={`badge ${t.afectaDias?'badge-orange':'badge-gray'}`}>{t.afectaDias?'Sí':'No'}</span></td>
          <td className="text-muted">{incs.filter(i=>i.tipo===t.nombre).length}</td>
          <td><button className="btn btn-danger btn-sm" onClick={()=>delTipo(t.id)}>✕</button></td>
        </tr>)}</tbody>
      </table></div>
    </div>}
    <Modal open={modal==='form'} onClose={()=>{setModal(null);setEditInc(null);setF(blank);}} title={editInc?'Editar Incidencia':'Nueva Incidencia'}>
      <div className="form-row">
        <div className="form-group"><label>Empleado</label><select value={f.empleadoId} onChange={e=>fld('empleadoId',e.target.value)}><option value="">— Seleccionar —</option>{emps.filter(e=>e.activo).sort((a,b)=>a.nombre.localeCompare(b.nombre)).map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}</select></div>
        <div className="form-group"><label>Tipo</label><select value={f.tipo} onChange={e=>fld('tipo',e.target.value)}><option value="">— Seleccionar —</option>{tipos.map(t=><option key={t.id} value={t.nombre}>{t.nombre}</option>)}</select></div>
      </div>
      <div className="form-row"><div className="form-group"><label>Fecha</label><input type="date" value={f.fecha} onChange={e=>fld('fecha',e.target.value)}/></div><div className="form-group"><label>Motivo</label><input value={f.motivo} onChange={e=>fld('motivo',e.target.value.toUpperCase())}/></div></div>
      <div className="form-row c3">
        <div className="form-group"><label>Hora Salida</label><input type="time" value={f.horaSalida} onChange={e=>fld('horaSalida',e.target.value)}/></div>
        <div className="form-group"><label>Hora Regreso</label><input type="time" value={f.horaRegreso} onChange={e=>fld('horaRegreso',e.target.value)}/></div>
        <div className="form-group"><label>Hora Llegada</label><input type="time" value={f.horaLlegada} onChange={e=>fld('horaLlegada',e.target.value)}/></div>
      </div>
      <div className="form-actions"><button className="btn btn-secondary" onClick={()=>{setModal(null);setEditInc(null);setF(blank);}}>Cancelar</button><button className="btn btn-primary" onClick={saveInc}>💾 Guardar</button></div>
    </Modal>
  </div>;
}

/* ══════════════════════════════════════════════════════════
   PRÉSTAMOS Y ADELANTOS
══════════════════════════════════════════════════════════ */
function Prestamos(){
  const [emps]=useState(()=>LS.get(K.emp,[]));
  const [prest,setPrest]=useState(()=>LS.get(K.prest,[]));
  const [modal,setModal]=useState(false);
  const [filterTipo,setFilterTipo]=useState('TODOS');
  const blank={empleadoId:'',tipo:'PRÉSTAMO',monto:0,cuotaQuincenal:0,fechaOtorgado:today(),motivo:''};
  const [f,setF]=useState(blank);
  const fld=(k,v)=>setF(p=>({...p,[k]:v}));

  const save=()=>{
    const emp=emps.find(e=>e.id===f.empleadoId);
    if(!emp||!f.monto)return;
    const nuevo={...f,id:uuid(),empleadoNombre:emp.nombre,monto:+f.monto,cuotaQuincenal:+f.cuotaQuincenal,saldoPendiente:+f.monto,activo:true};
    const up=[nuevo,...prest];setPrest(up);LS.set(K.prest,up);setF(blank);setModal(false);
  };
  const toggle=(id)=>{const up=prest.map(p=>p.id===id?{...p,activo:!p.activo}:p);setPrest(up);LS.set(K.prest,up);};
  const del=(id)=>{const up=prest.filter(p=>p.id!==id);setPrest(up);LS.set(K.prest,up);};

  const filtered=prest.filter(p=>filterTipo==='TODOS'||p.tipo===filterTipo).sort((a,b)=>b.fechaOtorgado.localeCompare(a.fechaOtorgado));
  const totActivo=prest.filter(p=>p.activo).reduce((s,p)=>s+p.saldoPendiente,0);

  return <div>
    <div className="kpi-grid">
      <div className="kpi"><div className="kpi-label">Préstamos Activos</div><div className="kpi-value text-red">{prest.filter(p=>p.activo&&p.tipo==='PRÉSTAMO').length}</div></div>
      <div className="kpi"><div className="kpi-label">Adelantos Activos</div><div className="kpi-value text-orange">{prest.filter(p=>p.activo&&p.tipo==='ADELANTO').length}</div></div>
      <div className="kpi"><div className="kpi-label">Saldo Pendiente Total</div><div className="kpi-value" style={{fontSize:15}}>{fmt(totActivo)}</div></div>
    </div>
    <div className="section-header">
      <div className="flex gap-2">
        {['TODOS','PRÉSTAMO','ADELANTO'].map(t=><button key={t} className={`btn btn-sm ${filterTipo===t?'btn-primary':'btn-secondary'}`} onClick={()=>setFilterTipo(t)}>{t}</button>)}
      </div>
      <button className="btn btn-primary" onClick={()=>setModal(true)}>+ Nuevo</button>
    </div>
    <div className="table-wrap"><table>
      <thead><tr><th>Tipo</th><th>Empleado</th><th>Monto Original</th><th>Saldo Pendiente</th><th>Cuota Qna.</th><th>Fecha</th><th>Motivo</th><th>Estado</th><th></th></tr></thead>
      <tbody>
        {!filtered.length&&<tr><td colSpan={9} style={{textAlign:'center',color:'var(--muted)',padding:32}}>Sin registros</td></tr>}
        {filtered.map(p=><tr key={p.id} style={p.activo?{}:{opacity:.5}}>
          <td><span className={`badge ${p.tipo==='PRÉSTAMO'?'badge-red':'badge-orange'}`}>{p.tipo}</span></td>
          <td style={{fontWeight:500}}>{p.empleadoNombre}</td>
          <td>{fmt(p.monto)}</td>
          <td style={{fontWeight:600,color:p.saldoPendiente>0?'var(--red)':'var(--green)'}}>{fmt(p.saldoPendiente)}</td>
          <td>{fmt(p.cuotaQuincenal)}</td>
          <td className="text-muted">{fmtDate(p.fechaOtorgado)}</td>
          <td className="text-muted" style={{fontSize:11,maxWidth:150,overflow:'hidden',textOverflow:'ellipsis'}}>{p.motivo}</td>
          <td>{p.activo?<span className="badge badge-red">Activo</span>:<span className="badge badge-green">Liquidado</span>}</td>
          <td><div className="flex gap-1"><button className="btn btn-secondary btn-sm" onClick={()=>toggle(p.id)}>{p.activo?'Liquidar':'Reactivar'}</button><button className="btn btn-danger btn-sm" onClick={()=>del(p.id)}>✕</button></div></td>
        </tr>)}
      </tbody>
    </table></div>
    <Modal open={modal} onClose={()=>setModal(false)} title="Nuevo Préstamo / Adelanto">
      <div className="form-row c1"><div className="form-group"><label>Tipo</label><div className="flex gap-2">{['PRÉSTAMO','ADELANTO'].map(t=><button key={t} type="button" className={`btn btn-sm ${f.tipo===t?'btn-primary':'btn-secondary'}`} onClick={()=>fld('tipo',t)}>{t}</button>)}</div></div></div>
      <div className="form-row c1"><div className="form-group"><label>Empleado</label><select value={f.empleadoId} onChange={e=>fld('empleadoId',e.target.value)}><option value="">— Seleccionar —</option>{emps.filter(e=>e.activo).sort((a,b)=>a.nombre.localeCompare(b.nombre)).map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}</select></div></div>
      <div className="form-row">
        <div className="form-group"><label>Monto</label><input type="number" step="0.01" value={f.monto} onChange={e=>fld('monto',e.target.value)}/></div>
        <div className="form-group"><label>Cuota Quincenal a Descontar</label><input type="number" step="0.01" value={f.cuotaQuincenal} onChange={e=>fld('cuotaQuincenal',e.target.value)}/><span style={{fontSize:10.5,color:'var(--muted)',marginTop:2}}>Se restará automáticamente al cerrar cada quincena</span></div>
      </div>
      <div className="form-row">
        <div className="form-group"><label>Fecha Otorgado</label><input type="date" value={f.fechaOtorgado} onChange={e=>fld('fechaOtorgado',e.target.value)}/></div>
        <div className="form-group"><label>Motivo</label><input value={f.motivo} onChange={e=>fld('motivo',e.target.value.toUpperCase())}/></div>
      </div>
      <div className="form-actions"><button className="btn btn-secondary" onClick={()=>setModal(false)}>Cancelar</button><button className="btn btn-primary" onClick={save}>💾 Guardar</button></div>
    </Modal>
  </div>;
}

/* ══════════════════════════════════════════════════════════
   HISTORIAL
══════════════════════════════════════════════════════════ */
function Historial(){
  const [quins,setQuins]=useState(()=>LS.get(K.quin,[]));
  const [sel,setSel]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null);
  const cerradas=useMemo(()=>quins.filter(q=>q.status==='cerrada').sort((a,b)=>b.fin.localeCompare(a.fin)),[quins]);
  const delQna=q=>{
    const up=quins.filter(x=>x.id!==q.id);
    setQuins(up);LS.set(K.quin,up);
    if(sel?.id===q.id)setSel(null);
    setConfirmDel(null);
  };

  const exportXLSX=(q)=>{
    const rows=q.rows||[];
    const data=rows.map(r=>({'N°':r.numero,'Nombre':r.nombre,'RS':r.rs,'Sucursal':r.sucursal,'Días':r.diasTrabajados,'Faltas':r.faltas,'CFDI Nómina':r.cfdiNomina,'Compensación':r.compe,'Sueldo S/T':r.sueldo,'Préstamos':r.prestamos,'Adelantos':r.adelantos,'Real Quincenal':r.realQuincenal,'Total a Percibir':r.totalAPagar,'Pagado':r.pagado?'Sí':'No','Facturado':r.facturado?'Sí':'No'}));
    const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,`Qna ${q.inicio}`);XLSX.writeFile(wb,`Nomina_${q.inicio}_${q.fin}.xlsx`);
  };

  const exportPDF=(q)=>{
    const{jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'letter'});
    addReportHeader(doc,'REPORTE DE NÓMINA');
    const rows=q.rows||[];
    doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(100,100,100);
    doc.text(`Período: ${fmtDate(q.inicio)} al ${fmtDate(q.fin)}  |  Cerrada: ${fmtDate(q.fechaCierre)}`,108,REPORT_HEADER_CONTENT_Y-5,{align:'center'});
    const body=rows.map(r=>[r.numero,r.nombre,r.rs,r.sucursal,r.diasTrabajados,r.faltas,fmt(r.cfdiNomina),fmt(r.compe),fmt(r.sueldo),fmt(r.prestamos),fmt(r.adelantos),fmt(r.totalAPagar)]);
    const tot=rows.reduce((s,r)=>({...s,cfdi:s.cfdi+r.cfdiNomina,compe:s.compe+r.compe,prest:s.prest+r.prestamos,total:s.total+r.totalAPagar}),{cfdi:0,compe:0,prest:0,total:0});
    body.push(['','TOTALES','','','','',fmt(tot.cfdi),fmt(tot.compe),'',fmt(tot.prest),'',fmt(tot.total)]);
    doc.autoTable({startY:REPORT_HEADER_CONTENT_Y,head:[['#','Nombre','RS','Suc.','Días','Faltas','CFDI','Compe','Sueldo','Prest.','Adel.','Total']],body,theme:'grid',headStyles:{fillColor:[30,30,30],textColor:[255,255,255],fontStyle:'bold',fontSize:8},bodyStyles:{fontSize:7.5},didParseCell:d=>{if(d.section==='body'&&d.row.index===body.length-1){d.cell.styles.fontStyle='bold';d.cell.styles.fillColor=[245,245,245];}},margin:{left:12,right:12}});
    doc.save(`Nomina_${q.inicio}_${q.fin}.pdf`);
  };

  if(sel){
    const tots={real:(sel.rows||[]).reduce((s,r)=>s+r.realQuincenal,0),total:(sel.rows||[]).reduce((s,r)=>s+r.totalAPagar,0),cfdi:(sel.rows||[]).reduce((s,r)=>s+r.cfdiNomina,0)};
    return <div>
      <div className="section-header">
        <h3>Quincena: {fmtDate(sel.inicio)} — {fmtDate(sel.fin)}</h3>
        <div className="flex gap-2">
          <button className="btn btn-secondary" onClick={()=>exportXLSX(sel)}>📊 Excel</button>
          <button className="btn btn-secondary" onClick={()=>exportPDF(sel)}>📄 PDF</button>
          <button className="btn btn-danger" onClick={()=>setConfirmDel(sel)}>🗑️ Eliminar</button>
          <button className="btn btn-secondary" onClick={()=>setSel(null)}>← Volver</button>
        </div>
      </div>
      <div className="kpi-grid">
        <div className="kpi"><div className="kpi-label">Real Quincenal</div><div className="kpi-value text-blue" style={{fontSize:15}}>{fmt(tots.real)}</div></div>
        <div className="kpi"><div className="kpi-label">Total a Percibir</div><div className="kpi-value text-gold" style={{fontSize:15}}>{fmt(tots.total)}</div></div>
        <div className="kpi"><div className="kpi-label">CFDI</div><div className="kpi-value" style={{fontSize:15}}>{fmt(tots.cfdi)}</div></div>
        <div className="kpi"><div className="kpi-label">Empleados</div><div className="kpi-value">{(sel.rows||[]).length}</div></div>
      </div>
      <div className="table-wrap"><table>
        <thead><tr><th>#</th><th>RS</th><th>Nombre</th><th>Suc.</th><th>Días</th><th>Faltas</th><th>CFDI</th><th>Compe</th><th>Sueldo</th><th>Prest.</th><th>Adel.</th><th>Real Qna.</th><th>Total Percibir</th><th>Pagado</th></tr></thead>
        <tbody>{(sel.rows||[]).map(r=><tr key={r.empId}>
          <td className="text-muted" style={{fontSize:10.5}}>{r.numero}</td><td><RsBadge rs={r.rs}/></td><td style={{fontWeight:500}}>{r.nombre}</td><td><span className="badge badge-gray">{r.sucursal}</span></td>
          <td>{r.diasTrabajados}</td><td style={{textAlign:'center'}}><span className={r.faltas>0?'badge badge-red':'badge badge-gray'}>{r.faltas}</span></td>
          <td>{fmt(r.cfdiNomina)}</td><td>{fmt(r.compe)}</td><td>{r.sueldo?fmt(r.sueldo):'—'}</td>
          <td>{r.prestamos?fmt(r.prestamos):'—'}</td><td>{r.adelantos?fmt(r.adelantos):'—'}</td>
          <td className="text-blue" style={{fontWeight:600}}>{fmt(r.realQuincenal)}</td>
          <td className="text-gold" style={{fontWeight:700}}>{fmt(r.totalAPagar)}</td>
          <td>{r.pagado?'✅':'—'}</td>
        </tr>)}</tbody>
      </table></div>
    </div>;
  }

  return <div>
    <div className="section-header"><span className="text-muted">{cerradas.length} quincena(s) cerrada(s)</span></div>
    {!cerradas.length&&<div style={{textAlign:'center',padding:60,color:'var(--muted)'}}>📂 Sin quincenas cerradas aún</div>}
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:12}}>
      {cerradas.map(q=>{
        const tot=(q.rows||[]).reduce((s,r)=>s+r.totalAPagar,0);
        const real=(q.rows||[]).reduce((s,r)=>s+r.realQuincenal,0);
        return <div key={q.id} className="card" style={{cursor:'pointer'}} onClick={()=>setSel(q)}>
          <div className="flex items-center" style={{justifyContent:'space-between',gap:8,marginBottom:7}}>
            <div style={{fontSize:11,color:'var(--muted)'}}>📅 {fmtDate(q.inicio)} — {fmtDate(q.fin)}</div>
            <button className="btn btn-danger btn-sm" onClick={e=>{e.stopPropagation();setConfirmDel(q);}}>🗑️</button>
          </div>
          <div style={{fontSize:17,fontWeight:700,color:'var(--gold)'}}>{fmt(real)}</div>
          <div style={{fontSize:11,color:'var(--green)',marginTop:3}}>Total a percibir: {fmt(tot)}</div>
          <div style={{fontSize:10.5,color:'var(--muted)',marginTop:8}}>{(q.rows||[]).length} empleados · Cerrada {fmtDate(q.fechaCierre)}</div>
        </div>;
      })}
    </div>
    <Confirm open={!!confirmDel} msg={`¿Eliminar la quincena cerrada ${fmtDate(confirmDel?.inicio)} — ${fmtDate(confirmDel?.fin)}? Esta acción borrará su historial guardado.`} onYes={()=>delQna(confirmDel)} onNo={()=>setConfirmDel(null)}/>
  </div>;
}

/* ══════════════════════════════════════════════════════════
   DÍAS DEBIDOS
══════════════════════════════════════════════════════════ */
function DiasDebidos(){
  const [emps]=useState(()=>LS.get(K.emp,[]));
  const [registros,setRegistros]=useState(()=>LS.get(K.diasDeb,[]));
  const [modal,setModal]=useState(false);
  const [tab,setTab]=useState('registro');
  const blank={empleadoId:'',tipo:'COMISIÓN',descripcion:'',fechas:[{fecha:today(),sucursal:''}],diasDebidos:1};
  const [f,setF]=useState(blank);
  const fld=(k,v)=>setF(p=>({...p,[k]:v}));
  const pendientes=useMemo(()=>registros.filter(r=>r.diasUsados<r.diasDebidos).sort((a,b)=>a.fechaRegistro.localeCompare(b.fechaRegistro)),[registros]);
  const exportPendXLSX=()=>{
    const data=pendientes.map(r=>({'Empleado':r.empleadoNombre,'Tipo':r.tipo,'Descripción':r.descripcion,'Fechas':(r.fechas||[]).map(f=>f.fecha+(f.sucursal?' - '+f.sucursal:'')).join(', '),'Días Adeudados':r.diasDebidos,'Días Usados':r.diasUsados,'Pendientes':r.diasDebidos-r.diasUsados,'Fecha Registro':r.fechaRegistro}));
    const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Días Pendientes');XLSX.writeFile(wb,'DiasDebidos_Pendientes.xlsx');
  };
  const exportPendPDF=()=>{
    const{jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'letter'});
    addReportHeader(doc,'DÍAS PENDIENTES A EMPLEADOS');
    const body=pendientes.map(r=>[r.empleadoNombre.split(' ').slice(0,3).join(' '),r.tipo,r.descripcion.length>35?r.descripcion.slice(0,35)+'…':r.descripcion,(r.fechas||[]).map(f=>fmtDate(f.fecha)+(f.sucursal?' ('+f.sucursal+')':'')).join(', '),r.diasDebidos,r.diasUsados,r.diasDebidos-r.diasUsados]);
    doc.autoTable({startY:REPORT_HEADER_CONTENT_Y,head:[['Empleado','Tipo','Descripción','Fechas','Adeudados','Usados','Pendientes']],body,theme:'grid',headStyles:{fillColor:[30,30,30],textColor:[255,255,255],fontStyle:'bold',fontSize:8},bodyStyles:{fontSize:8},columnStyles:{2:{cellWidth:40},3:{cellWidth:45}},margin:{left:12,right:12}});
    const totalPend=pendientes.reduce((s,r)=>s+(r.diasDebidos-r.diasUsados),0);
    const fy=doc.lastAutoTable.finalY+6;doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(40,40,40);
    doc.text(`Total días pendientes: ${totalPend}`,14,fy);
    doc.save('DiasDebidos_Pendientes.pdf');
  };

  const addFecha=()=>setF(p=>({...p,fechas:[...p.fechas,{fecha:today(),sucursal:''}]}));
  const updFecha=(i,k,v)=>setF(p=>({...p,fechas:p.fechas.map((x,j)=>j===i?{...x,[k]:v}:x)}));
  const delFecha=(i)=>setF(p=>({...p,fechas:p.fechas.filter((_,j)=>j!==i)}));

  const save=()=>{
    const emp=emps.find(e=>e.id===f.empleadoId);
    if(!emp)return;
    const nuevo={...f,id:uuid(),empleadoNombre:emp.nombre,diasDebidos:+f.diasDebidos,diasUsados:0,activo:true,fechaRegistro:today()};
    const up=[nuevo,...registros];setRegistros(up);LS.set(K.diasDeb,up);setF(blank);setModal(false);
  };
  const del=(id)=>{const up=registros.filter(r=>r.id!==id);setRegistros(up);LS.set(K.diasDeb,up);};

  // Balance por empleado
  const balances=useMemo(()=>{
    const b={};
    registros.forEach(r=>{if(!b[r.empleadoId])b[r.empleadoId]={nombre:r.empleadoNombre,total:0,usados:0};b[r.empleadoId].total+=r.diasDebidos;b[r.empleadoId].usados+=r.diasUsados;});
    return b;
  },[registros]);

  return <div>
    <div className="section-header">
      <div>
        <div className="section-title">📅 Días que se le deben a empleados</div>
        <p className="text-muted" style={{fontSize:11,marginTop:3}}>Comisiones, días festivos trabajados, aperturas. Al registrar incidencia "FALTA COMISIÓN / DÍA TRABAJADO" se descuenta del registro más antiguo primero.</p>
      </div>
      <button className="btn btn-primary" onClick={()=>setModal(true)}>+ Registrar Días</button>
    </div>
    <div className="tabs">
      <button className={`tab ${tab==='registro'?'active':''}`} onClick={()=>setTab('registro')}>📋 Registro</button>
      <button className={`tab ${tab==='pendientes'?'active':''}`} onClick={()=>setTab('pendientes')}>⏳ Días Pendientes{pendientes.length>0?<span className="badge badge-gold" style={{marginLeft:6,fontSize:10}}>{pendientes.length}</span>:null}</button>
    </div>
    {tab==='pendientes'&&<div>
      <div className="section-header">
        <span className="text-muted" style={{fontSize:12}}>{pendientes.length} registro(s) con saldo pendiente</span>
        <div className="flex gap-2">
          <button className="btn btn-secondary" onClick={exportPendXLSX}>📊 Excel</button>
          <button className="btn btn-secondary" onClick={exportPendPDF}>📄 PDF</button>
        </div>
      </div>
      {!pendientes.length&&<div style={{textAlign:'center',padding:60,color:'var(--muted)'}}>✅ Sin días pendientes</div>}
      {pendientes.length>0&&<div className="table-wrap"><table>
        <thead><tr><th>Empleado</th><th>Tipo</th><th>Descripción</th><th>Fechas</th><th>Adeudados</th><th>Usados</th><th>Pendientes</th></tr></thead>
        <tbody>{pendientes.map(r=>{const saldo=r.diasDebidos-r.diasUsados;return <tr key={r.id}>
          <td style={{fontWeight:500}}>{r.empleadoNombre}</td>
          <td><span className={`badge ${r.tipo==='COMISIÓN'?'badge-orange':'badge-blue'}`}>{r.tipo}</span></td>
          <td className="text-muted" style={{fontSize:11,maxWidth:200,whiteSpace:'normal'}}>{r.descripcion}</td>
          <td style={{fontSize:11,color:'var(--muted)'}}>{(r.fechas||[]).map((f,i)=><div key={i}>{fmtDate(f.fecha)}{f.sucursal?` — ${f.sucursal}`:''}</div>)}</td>
          <td style={{textAlign:'center',fontWeight:600}}>{r.diasDebidos}</td>
          <td style={{textAlign:'center'}}><span className="badge badge-green">{r.diasUsados}</span></td>
          <td style={{textAlign:'center'}}><span className="badge badge-gold" style={{fontSize:13,fontWeight:700}}>{saldo}</span></td>
        </tr>;})}
        </tbody>
        <tfoot><tr className="tr-total"><td colSpan={6}>Total días pendientes</td><td style={{textAlign:'center'}}>{pendientes.reduce((s,r)=>s+(r.diasDebidos-r.diasUsados),0)}</td></tr></tfoot>
      </table></div>}
    </div>}
    {tab==='registro'&&<div>

    {/* Resumen por empleado */}
    {Object.keys(balances).length>0&&<div className="card mb-4">
      <div className="section-title mb-3">Balance por Empleado</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:10}}>
        {Object.entries(balances).map(([empId,b])=>{
          const saldo=b.total-b.usados;
          const pct=b.total>0?Math.round(b.usados/b.total*100):0;
          return <div key={empId} style={{background:'var(--panel2)',borderRadius:8,padding:12}}>
            <div style={{fontSize:12,fontWeight:500,marginBottom:4}}>{b.nombre.split(' ').slice(0,2).join(' ')}</div>
            <div className="flex items-center" style={{justifyContent:'space-between',marginBottom:4}}>
              <span style={{fontSize:11,color:'var(--muted)'}}>Pendientes</span>
              <span style={{fontSize:14,fontWeight:700,color:saldo>0?'var(--gold)':'var(--green)'}}>{saldo} día(s)</span>
            </div>
            <div className="dias-bar"><div className="dias-fill" style={{width:`${pct}%`,background:'var(--green)'}}/></div>
            <div style={{fontSize:10,color:'var(--muted)',marginTop:3}}>{b.usados} usados / {b.total} total</div>
          </div>;
        })}
      </div>
    </div>}

    <div className="table-wrap"><table>
      <thead><tr><th>Empleado</th><th>Tipo</th><th>Descripción</th><th>Fechas</th><th>Días Adeudados</th><th>Días Usados</th><th>Saldo</th><th></th></tr></thead>
      <tbody>
        {!registros.length&&<tr><td colSpan={8} style={{textAlign:'center',color:'var(--muted)',padding:32}}>Sin registros</td></tr>}
        {registros.map(r=>{
          const saldo=r.diasDebidos-r.diasUsados;
          return <tr key={r.id}>
            <td style={{fontWeight:500}}>{r.empleadoNombre}</td>
            <td><span className={`badge ${r.tipo==='COMISIÓN'?'badge-orange':'badge-blue'}`}>{r.tipo}</span></td>
            <td className="text-muted" style={{fontSize:11,maxWidth:200,whiteSpace:'normal'}}>{r.descripcion}</td>
            <td style={{fontSize:11,color:'var(--muted)'}}>{(r.fechas||[]).map((f,i)=><div key={i}>{fmtDate(f.fecha)}{f.sucursal?` — ${f.sucursal}`:''}</div>)}</td>
            <td style={{textAlign:'center',fontWeight:600}}>{r.diasDebidos}</td>
            <td style={{textAlign:'center'}}><span className="badge badge-green">{r.diasUsados}</span></td>
            <td style={{textAlign:'center'}}><span className={`badge ${saldo>0?'badge-gold':'badge-gray'}`}>{saldo}</span></td>
            <td><button className="btn btn-danger btn-sm" onClick={()=>del(r.id)}>✕</button></td>
          </tr>;
        })}
      </tbody>
    </table></div>
    </div>}

    <Modal open={modal} onClose={()=>setModal(false)} title="Registrar Días Debidos" lg>
      <div className="form-row">
        <div className="form-group"><label>Empleado</label><select value={f.empleadoId} onChange={e=>fld('empleadoId',e.target.value)}><option value="">— Seleccionar —</option>{emps.filter(e=>e.activo).sort((a,b)=>a.nombre.localeCompare(b.nombre)).map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}</select></div>
        <div className="form-group"><label>Tipo</label><div className="flex gap-2">{['COMISIÓN','DÍA TRABAJADO'].map(t=><button key={t} type="button" className={`btn btn-sm ${f.tipo===t?'btn-primary':'btn-secondary'}`} onClick={()=>fld('tipo',t)}>{t}</button>)}</div></div>
      </div>
      <div className="form-row c1"><div className="form-group"><label>Descripción (ej: Salida del 12/abr/2026 a Saltillo y Monterrey)</label><input value={f.descripcion} onChange={e=>fld('descripcion',e.target.value.toUpperCase())}/></div></div>
      <div className="form-row c1"><div className="form-group"><label>Total de días a deber</label><input type="number" value={f.diasDebidos} min={1} onChange={e=>fld('diasDebidos',+e.target.value)}/></div></div>
      <div style={{marginBottom:12}}>
        <div className="flex items-center" style={{justifyContent:'space-between',marginBottom:8}}>
          <label>Fechas de la comisión / días trabajados</label>
          <button className="btn btn-secondary btn-sm" onClick={addFecha}>+ Agregar fecha</button>
        </div>
        {f.fechas.map((fx,i)=><div key={i} className="flex gap-2 mb-2 items-center">
          <input type="date" value={fx.fecha} onChange={e=>updFecha(i,'fecha',e.target.value)} style={{width:140}}/>
          <input placeholder="Sucursal/lugar (opcional)" value={fx.sucursal} onChange={e=>updFecha(i,'sucursal',e.target.value.toUpperCase())} style={{flex:1}}/>
          {f.fechas.length>1&&<button className="btn btn-danger btn-sm" onClick={()=>delFecha(i)}>✕</button>}
        </div>)}
      </div>
      <div className="form-actions"><button className="btn btn-secondary" onClick={()=>setModal(false)}>Cancelar</button><button className="btn btn-primary" onClick={save}>💾 Guardar</button></div>
    </Modal>
  </div>;
}

/* ══════════════════════════════════════════════════════════
   VACACIONES
══════════════════════════════════════════════════════════ */
function Vacaciones(){
  const [emps]=useState(()=>LS.get(K.emp,[]));
  const [vacSaldo,setVacSaldo]=useState(()=>LS.get(K.vacSaldo,{}));
  const [incs]=useState(()=>LS.get(K.inc,[]));
  const [sel,setSel]=useState(null);
  const [modalAjuste,setModalAjuste]=useState(false);
  const [ajuste,setAjuste]=useState({empId:'',dias:0,motivo:''});
  const [search,setSearch]=useState('');

  const getSaldo=(emp)=>{
    if(vacSaldo[emp.id]!==undefined)return vacSaldo[emp.id];
    return emp.diasVacaciones||12;
  };

  const vacUsadasIncs=(emp)=>incs.filter(i=>i.empleadoId===emp.id&&i.tipo==='FALTA POR VACACIONES').length;

  const saveAjuste=()=>{
    if(!ajuste.empId)return;
    const vs={...vacSaldo,[ajuste.empId]:+ajuste.dias};
    setVacSaldo(vs);LS.set(K.vacSaldo,vs);setModalAjuste(false);setAjuste({empId:'',dias:0,motivo:''});
  };

  const activos=emps.filter(e=>e.activo&&e.nombre.toLowerCase().includes(search.toLowerCase()));

  const exportVacPDF=()=>{
    const{jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'letter'});
    addReportHeader(doc,'CONTROL DE VACACIONES');
    const body=activos.map(e=>{
      const saldo=getSaldo(e);const porAño=e.diasVacaciones||12;const usados=vacUsadasIncs(e);
      const pct=porAño>0?Math.min(100,Math.round((porAño-saldo)/porAño*100)):0;
      return [e.numero,e.nombre,e.sucursal,porAño,usados,saldo,pct+'%'];
    });
    doc.autoTable({startY:REPORT_HEADER_CONTENT_Y,head:[['#','Nombre','Sucursal','Días/Año','Usados (Inc.)','Saldo Disp.','% Usado']],body,theme:'grid',headStyles:{fillColor:[30,30,30],textColor:[255,255,255],fontStyle:'bold',fontSize:9},bodyStyles:{fontSize:9},margin:{left:14,right:14},didParseCell:d=>{if(d.section==='body'&&d.column.index===5){const v=+d.cell.raw;d.cell.styles.textColor=v<=2?[200,30,30]:v<=5?[180,120,0]:[20,150,80];d.cell.styles.fontStyle='bold';}}});
    const totalDias=activos.reduce((s,e)=>s+getSaldo(e),0);
    const fy=doc.lastAutoTable.finalY+6;doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(100,100,100);
    doc.text(`Total días disponibles: ${totalDias}  |  Empleados activos: ${activos.length}`,14,fy);
    doc.save('Vacaciones_GF.pdf');
  };

  return <div>
    <div className="section-header">
      <div>
        <div className="section-title">🏖️ Control de Vacaciones</div>
        <p className="text-muted" style={{fontSize:11,marginTop:3}}>El saldo se actualiza cuando guardas las vacaciones en el módulo de Empleados o al hacer un ajuste manual aquí.</p>
      </div>
      <div className="flex gap-2">
        <div className="search-bar"><span className="search-icon">🔍</span><input placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <button className="btn btn-secondary" onClick={exportVacPDF}>📄 PDF</button>
        <button className="btn btn-secondary" onClick={()=>setModalAjuste(true)}>⚙️ Ajuste Manual</button>
      </div>
    </div>

    <div className="table-wrap"><table>
      <thead><tr><th>#</th><th>Nombre</th><th>Sucursal</th><th>Días por Año</th><th>Días por Incidencias</th><th>Saldo Disponible</th><th>% Usado</th></tr></thead>
      <tbody>
        {activos.map(e=>{
          const saldo=getSaldo(e);
          const porAño=e.diasVacaciones||12;
          const usadosInc=vacUsadasIncs(e);
          const pct=porAño>0?Math.min(100,Math.round((porAño-saldo)/porAño*100)):0;
          return <tr key={e.id} onClick={()=>setSel(e===sel?null:e)} style={{cursor:'pointer'}}>
            <td className="text-muted" style={{fontSize:10.5}}>{e.numero}</td>
            <td style={{fontWeight:500}}>{e.nombre}</td>
            <td><span className="badge badge-gray">{e.sucursal}</span></td>
            <td style={{textAlign:'center'}}>{porAño}</td>
            <td style={{textAlign:'center'}}><span className="badge badge-red">{usadosInc}</span></td>
            <td style={{textAlign:'center'}}>
              <span className={`badge ${saldo>5?'badge-green':saldo>2?'badge-gold':'badge-red'}`} style={{fontSize:13,fontWeight:700}}>{saldo}</span>
            </td>
            <td style={{minWidth:120}}>
              <div className="flex items-center gap-2">
                <div className="dias-bar" style={{flex:1}}><div className="dias-fill" style={{width:`${pct}%`,background:pct>80?'var(--red)':pct>50?'var(--gold)':'var(--green)'}}/></div>
                <span style={{fontSize:10.5,color:'var(--muted)',minWidth:30}}>{pct}%</span>
              </div>
            </td>
          </tr>;
        })}
      </tbody>
    </table></div>

    {sel&&<div className="card mt-4" style={{marginTop:16}}>
      <div className="section-title mb-3">Detalle — {sel.nombre}</div>
      <div className="kpi-grid">
        <div className="kpi"><div className="kpi-label">Días por año</div><div className="kpi-value">{sel.diasVacaciones||12}</div></div>
        <div className="kpi"><div className="kpi-label">Saldo disponible</div><div className="kpi-value text-green">{getSaldo(sel)}</div></div>
        <div className="kpi"><div className="kpi-label">Usados (incidencias)</div><div className="kpi-value text-red">{vacUsadasIncs(sel)}</div></div>
      </div>
      <div className="section-title mb-2" style={{fontSize:12}}>Historial de FALTA POR VACACIONES</div>
      {incs.filter(i=>i.empleadoId===sel.id&&i.tipo==='FALTA POR VACACIONES').length===0?
        <p className="text-muted" style={{fontSize:12}}>Sin registros</p>:
        <div className="table-wrap"><table>
          <thead><tr><th>Fecha</th><th>Motivo</th></tr></thead>
          <tbody>{incs.filter(i=>i.empleadoId===sel.id&&i.tipo==='FALTA POR VACACIONES').sort((a,b)=>b.fecha.localeCompare(a.fecha)).map(i=><tr key={i.id}><td>{fmtDate(i.fecha)}</td><td className="text-muted">{i.motivo||'—'}</td></tr>)}</tbody>
        </table></div>
      }
    </div>}

    <Modal open={modalAjuste} onClose={()=>setModalAjuste(false)} title="⚙️ Ajuste Manual de Saldo Vacacional">
      <p className="text-muted mb-3" style={{fontSize:12}}>Establece directamente el saldo disponible del empleado. Usa esto para correcciones o para asignar el saldo inicial.</p>
      <div className="form-row c1"><div className="form-group"><label>Empleado</label><select value={ajuste.empId} onChange={e=>setAjuste(p=>({...p,empId:e.target.value,dias:getSaldo(emps.find(x=>x.id===e.target.value)||{})}))}><option value="">— Seleccionar —</option>{emps.filter(e=>e.activo).sort((a,b)=>a.nombre.localeCompare(b.nombre)).map(e=><option key={e.id} value={e.id}>{e.nombre} (actual: {getSaldo(e)} días)</option>)}</select></div></div>
      <div className="form-row"><div className="form-group"><label>Nuevo saldo (días disponibles)</label><input type="number" value={ajuste.dias} min={0} onChange={e=>setAjuste(p=>({...p,dias:+e.target.value}))}/></div><div className="form-group"><label>Motivo del ajuste</label><input value={ajuste.motivo} onChange={e=>setAjuste(p=>({...p,motivo:e.target.value}))}/></div></div>
      <div className="form-actions"><button className="btn btn-secondary" onClick={()=>setModalAjuste(false)}>Cancelar</button><button className="btn btn-primary" onClick={saveAjuste}>💾 Aplicar Ajuste</button></div>
    </Modal>
  </div>;
}

/* ══════════════════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════════════════ */
const VIEWS=[
  {section:'OPERACIÓN'},
  {id:'dashboard',icon:'🏠',label:'Dashboard'},
  {id:'nomina',icon:'💰',label:'Nómina / Quincena'},
  {id:'historial',icon:'🗂️',label:'Historial'},
  {section:'PERSONAL'},
  {id:'empleados',icon:'👥',label:'Empleados'},
  {id:'vacaciones',icon:'🏖️',label:'Vacaciones'},
  {id:'diasdebidos',icon:'📅',label:'Días Debidos'},
  {section:'CONTROL'},
  {id:'incidencias',icon:'📋',label:'Incidencias'},
  {id:'prestamos',icon:'💳',label:'Préstamos y Adelantos'},
];
const TITLES={dashboard:'Dashboard',nomina:'Nómina — Quincena Activa',empleados:'Empleados',incidencias:'Incidencias',prestamos:'Préstamos y Adelantos',historial:'Historial de Quincenas',diasdebidos:'Días Debidos a Empleados',vacaciones:'Control de Vacaciones'};

function App(){
  const [ready,setReady]=useState(false);
  const [cloudOk,setCloudOk]=useState(null);
  const [view,setView]=useState('dashboard');
  const [sidebarOpen,setSidebarOpen]=useState(true);
  const [syncing,setSyncing]=useState(false);

  useEffect(()=>{
    GFStore.init().then(online=>{
      initData();
      setCloudOk(online);
      setReady(true);
    });
  },[]);

  const syncNow=()=>{
    setSyncing(true);
    setTimeout(()=>window.location.reload(),300);
  };

  if(!ready)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:16,background:'var(--bg)'}}>
      <div style={{fontSize:38}}>⚙️</div>
      <div style={{color:'var(--gold)',fontSize:15,fontWeight:700,letterSpacing:'.5px'}}>GF Diversiones — RH &amp; Nóminas</div>
      <div style={{color:'var(--muted)',fontSize:12}}>Sincronizando con la nube...</div>
      <div className="gf-loading-bar" style={{marginTop:6}}/>
    </div>
  );

  const renderView=()=>{switch(view){case'dashboard':return<Dashboard/>;case'nomina':return<Nomina/>;case'empleados':return<Empleados/>;case'incidencias':return<Incidencias/>;case'prestamos':return<Prestamos/>;case'historial':return<Historial/>;case'diasdebidos':return<DiasDebidos/>;case'vacaciones':return<Vacaciones/>;default:return<Dashboard/>;}};
  return <>
    <div className={`sidebar${sidebarOpen?'':' collapsed'}`}>
      <div className="sidebar-logo"><h1>GF Diversiones</h1><p>Sistema RH & Nóminas</p></div>
      <nav className="sidebar-nav">
        {VIEWS.map((v,i)=>v.section
          ?<div key={i} className="sidebar-group">{v.section}</div>
          :<button key={v.id} className={`nav-item ${view===v.id?'active':''}`} onClick={()=>setView(v.id)}><span className="nav-icon">{v.icon}</span>{v.label}</button>
        )}
      </nav>
      <div className="sidebar-footer">Grupo Rokma © 2026</div>
    </div>
    <div className="main">
      <div className="topbar">
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button className="btn-toggle-sidebar" onClick={()=>setSidebarOpen(o=>!o)} title={sidebarOpen?'Ocultar menú':'Mostrar menú'}>
            {sidebarOpen?'✕':'☰'}
          </button>
          <h2>{TITLES[view]}</h2>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          {cloudOk===true&&<span style={{fontSize:10,color:'var(--green)',display:'flex',alignItems:'center',gap:5}}><span style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',display:'inline-block',boxShadow:'0 0 5px var(--green)'}}/>Nube activa</span>}
          {cloudOk===false&&<span style={{fontSize:10,color:'var(--muted)',display:'flex',alignItems:'center',gap:5}}><span style={{width:6,height:6,borderRadius:'50%',background:'var(--muted)',display:'inline-block'}}/>Sin conexión</span>}
          <span style={{fontSize:11,color:'var(--muted)'}}>{todayLong()}</span>
        </div>
      </div>
      <div className="content">{renderView()}</div>
    </div>
    <button className="fab-sync" onClick={syncNow} title="Sincronizar datos de la nube">
      {syncing?'⏳':'🔄'}
    </button>
  </>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
