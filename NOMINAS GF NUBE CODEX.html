/* ══════════════════════════════════════════════════
   FIREBASE CONFIG — reemplaza estos valores con los
   de tu proyecto en https://console.firebase.google.com
   ══════════════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCqjGzzn_X6nz17ayTlYZJcl5OV98cm5Ow",
  authDomain:        "modulo-nominas-gf.firebaseapp.com",
  projectId:         "modulo-nominas-gf",
  storageBucket:     "modulo-nominas-gf.firebasestorage.app",
  messagingSenderId: "365638951018",
  appId:             "1:365638951018:web:c3d8dd02fe42df00ee6a13"
};

/* ── GFStore: capa de sincronización Firestore ── */
const GFStore = (() => {
const GF_KEYS = ['gf2_emp','gf2_inc','gf2_tipos','gf2_quin','gf2_prest',
'gf2_rs','gf2_diasdeb','gf2_vacsaldo','gf2_colsref','gf2_finiquitos'];
  const COL = 'gf_data';
  let db = null;
  let online = false;
  let timers = {};

  const dkey = k => k.replace('gf2_','');
  const lsGet = k => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } };
  const lsSet = (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

  async function init() {
    try {
      const configured = FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey !== 'TU_API_KEY';
      if (!configured) throw new Error('Firebase no configurado');

      firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.firestore();

      // Descarga todos los documentos en paralelo
      const snaps = await Promise.all(GF_KEYS.map(k => db.collection(COL).doc(dkey(k)).get()));
      const cloudHasData = snaps.some(s => s.exists);

      if (cloudHasData) {
        // Nube tiene datos → sobreescribe localStorage con datos de nube
        snaps.forEach((snap, i) => {
          if (snap.exists) lsSet(GF_KEYS[i], snap.data().data);
        });
      } else {
        // Nube vacía → sube localStorage a nube (primera vez)
        const batch = db.batch();
        GF_KEYS.forEach(k => {
          const val = lsGet(k);
          if (val !== null) batch.set(db.collection(COL).doc(dkey(k)), { data: val });
        });
        await batch.commit();
      }
      online = true;
    } catch (err) {
      console.warn('[GFStore] Modo sin conexión:', err.message);
      online = false;
    }
    return online;
  }

  // Escribe a Firestore con debounce de 800ms (para no saturar en ediciones rápidas)
  function set(k, v) {
    if (!db || !online) return;
    if (timers[k]) clearTimeout(timers[k]);
    timers[k] = setTimeout(() => {
      db.collection(COL).doc(dkey(k)).set({ data: v })
        .catch(err => { console.warn('[GFStore] Error al guardar:', err); online = false; });
    }, 800);
  }

  return { init, set, isOnline: () => online };
})();
</script>

function numLetra(n){
  n=Math.round(n*100)/100;const e=Math.floor(n);const d=Math.round((n-e)*100);
  const U=['','UN','DOS','TRES','CUATRO','CINCO','SEIS','SIETE','OCHO','NUEVE','DIEZ','ONCE','DOCE','TRECE','CATORCE','QUINCE','DIECISÉIS','DIECISIETE','DIECIOCHO','DIECINUEVE'];
  const D=['','DIEZ','VEINTE','TREINTA','CUARENTA','CINCUENTA','SESENTA','SETENTA','OCHENTA','NOVENTA'];
  const C=['','CIENTO','DOSCIENTOS','TRESCIENTOS','CUATROCIENTOS','QUINIENTOS','SEISCIENTOS','SETECIENTOS','OCHOCIENTOS','NOVECIENTOS'];
  function c(x){if(x===0)return'CERO';if(x<20)return U[x];if(x<100)return D[Math.floor(x/10)]+(x%10?' Y '+U[x%10]:'');if(x===100)return'CIEN';if(x<1000)return C[Math.floor(x/100)]+(x%100?' '+c(x%100):'');if(x<2000)return'MIL'+(x%1000?' '+c(x%1000):'');if(x<1000000)return c(Math.floor(x/1000))+' MIL'+(x%1000?' '+c(x%1000):'');return x+''}
  return c(e)+' PESOS '+String(d).padStart(2,'0')+'/100 MXN';
}

const normTxt=v=>String(v||'').trim().toUpperCase();
const findTipo=(tipos,nombre)=>tipos.find(t=>t.nombre===nombre);
const incidenciaTieneFlag=(inc,tipos,flag)=>{
  if(!inc?.tipo)return false;
  return !!findTipo(tipos,inc.tipo)?.[flag];
};
function sortIncidenciasCronologicas(incs){
  return [...incs].map((inc,idx)=>({...inc,__idx:idx})).sort((a,b)=>String(a.fecha||'').localeCompare(String(b.fecha||''))||a.__idx-b.__idx);
}
function drawRokmaBrandBox(doc,{x=0,y=0,w=28,h=42,logoSize=18,textScale=1,bgColor=[30,30,30],fgColor=[255,255,255]}={}){
  doc.setFillColor(...bgColor);doc.rect(x,y,w,h,'F');
  try{
    if(ROKMA_LOGO_DATA_URL&&ROKMA_LOGO_DATA_URL!=='__ROKMA_LOGO_DATA_URL__'){
      const lx=x+(w-logoSize)/2;
      const ly=y+2.5;
      doc.addImage(ROKMA_LOGO_DATA_URL,'PNG',lx,ly,logoSize,logoSize);
    }
  }catch{}
  doc.setFont('times','bold');doc.setFontSize(11.8*textScale);doc.setTextColor(...fgColor);
  doc.text('GRUPO',x+w/2,y+h-11.2*textScale,{align:'center'});
  doc.text('ROKMA',x+w/2,y+h-4.6*textScale,{align:'center'});
}
function revertVacIncidenceEffect(inc,tipos,emps){
  if(!incidenciaTieneFlag(inc,tipos,'afectaVac'))return LS.get(K.vacSaldo,{});
  if(inc?._fx?.vacApplied===false)return LS.get(K.vacSaldo,{});
  const emp=emps.find(e=>e.id===inc.empleadoId);
  if(!emp)return LS.get(K.vacSaldo,{});
  const vs=LS.get(K.vacSaldo,{});
  const cur=Number(vs[emp.id]??emp.diasVacaciones??0);
  vs[emp.id]=cur+1;
  LS.set(K.vacSaldo,vs);
  return vs;
}
function applyVacIncidenceEffect(inc,tipos,emps){
  if(!incidenciaTieneFlag(inc,tipos,'afectaVac'))return {inc,vacSaldo:LS.get(K.vacSaldo,{})};
  const emp=emps.find(e=>e.id===inc.empleadoId);
  if(!emp)return {inc,vacSaldo:LS.get(K.vacSaldo,{})};
  const vs=LS.get(K.vacSaldo,{});
  const cur=Number(vs[emp.id]??emp.diasVacaciones??0);
  const vacApplied=cur>0;
  if(vacApplied){
    vs[emp.id]=cur-1;
    LS.set(K.vacSaldo,vs);
  }
  return {inc:{...inc,_fx:{...(inc._fx||{}),vacApplied}},vacSaldo:vs};
}
function recalcDiasDebFromIncidencias(incs,tipos){
  const regs=LS.get(K.diasDeb,[]);
  const ordered=[...regs].map((r,idx)=>({...r,__idx:idx})).sort((a,b)=>String(a.fechaRegistro||'').localeCompare(String(b.fechaRegistro||''))||a.__idx-b.__idx);
  const map=Object.fromEntries(regs.map(r=>[r.id,{...r,diasUsados:0}]));
  sortIncidenciasCronologicas(incs).forEach(inc=>{
    if(!incidenciaTieneFlag(inc,tipos,'afectaDias'))return;
    const target=ordered.find(r=>{
      const cur=map[r.id];
      return cur.empleadoId===inc.empleadoId&&cur.diasUsados<cur.diasDebidos;
    });
    if(target){
      map[target.id]={...map[target.id],diasUsados:Math.min(map[target.id].diasDebidos,map[target.id].diasUsados+1)};
    }
  });
  const updated=regs.map(r=>map[r.id]||r);
  LS.set(K.diasDeb,updated);
  return updated;
}

function addReportHeader(doc,titulo,opts={}){
  const W=216;

    accent=[210,210,210],
    textColor=[30,30,30],
    titleSize=20,
    bandY=12,
    bandH=14,
    bandX=20,

  }=opts;

  drawRokmaBrandBox(doc,box);

}

  if(turno==='td')return Math.floor((new Date(dF.getFullYear(),dF.getMonth(),dF.getDate())-new Date(dI.getFullYear(),dI.getMonth(),dI.getDate()))/86400000)+1;

  const d=new Date(dI.getFullYear(),dI.getMonth(),dI.getDate());
  const f=new Date(dF.getFullYear(),dF.getMonth(),dF.getDate());
  while(d<=f){
    const w=d.getDay();
    if(turno==='lv'&&w>=1&&w<=5)n++;
    if(turno==='sd'&&(w===0||w===6))n++;
    d.setDate(d.getDate()+1);
  }
  return n;
}
function getFiniquitoVacDaysBase(ef){
  if(ef<=365)return 12;
  if(ef<=730)return 14;
  if(ef<=1095)return 16;
  if(ef<=1460)return 18;
  if(ef<=1825)return 20;
  if(ef<=3650)return 22;
  if(ef<=5475)return 24;
  if(ef<=7300)return 26;
  if(ef<=9125)return 28;
  if(ef<=10950)return 30;
  return 32;
}
function calcFiniquitoISR(base,aplicaSubsidio){
  if(base<=0)return 0;
  let row=FINIQUITO_ISR_TARIFA[FINIQUITO_ISR_TARIFA.length-1];
  for(let i=0;i<FINIQUITO_ISR_TARIFA.length;i++){
    if(base>=FINIQUITO_ISR_TARIFA[i][0]&&base<=FINIQUITO_ISR_TARIFA[i][1]){
      row=FINIQUITO_ISR_TARIFA[i];
      break;
    }
  }
  let isr=(base-row[0])*row[3]+row[2];
  if(aplicaSubsidio!==false)isr-=390.12;
  return Math.max(0,isr);
}
function buildFiniquitoTramos(tramos,baja){
  if(!baja||!Array.isArray(tramos)||!tramos.length||!tramos[0].fecha)return null;
  const dB=finiquitoParseDate(baja);
  if(!dB)return null;
  const res=[];
  for(let i=0;i<tramos.length;i++){
    const t=tramos[i];
    const ini=finiquitoParseDate(t.fecha);
    if(!ini)continue;
    let fin;
    if(i<tramos.length-1&&tramos[i+1]&&tramos[i+1].fecha){
      fin=finiquitoParseDate(tramos[i+1].fecha);
      if(fin)fin.setDate(fin.getDate()-1);
    }else{
      fin=new Date(dB);
    }
    if(!fin||fin<ini)continue;
    res.push({turno:t.turno||'lv',salario:parseFloat(t.salario)||0,ini,fin,def:countFiniquitoEffectiveDays(ini,fin,t.turno||'lv')});
  }
  return res.length?res:null;
}
function getFiniquitoConceptSuggestions(tipoDespido,diasEfT){
  const aniosCompletos=Math.floor((diasEfT||0)/365);
  const injustificado=tipoDespido==='injustificado';
  return {
    primaAntiguedadON:injustificado||(tipoDespido==='justificado'&&aniosCompletos>=15),
    indemnizacionON:injustificado,
    dias90ON:injustificado
  };
}
function normalizeFiniquitoRecord(r){
  if(!r)return null;
  const out={...r};
  if(!out.tipoDespido)out.tipoDespido='';
  if(typeof out.smgDiario!=='number')out.smgDiario=out.smgDiario?parseFloat(out.smgDiario)||0:0;
  if(typeof out.primaAntiguedad!=='number')out.primaAntiguedad=typeof out.p12==='number'?out.p12:0;
  if(typeof out.indemnizacion!=='number')out.indemnizacion=typeof out.i20==='number'?out.i20:0;
  if(typeof out.dias90!=='number')out.dias90=typeof out.d90==='number'?out.d90:0;
  out.primaAntiguedadON=typeof out.primaAntiguedadON==='boolean'?out.primaAntiguedadON:out.primaAntiguedad>0;
  out.indemnizacionON=typeof out.indemnizacionON==='boolean'?out.indemnizacionON:out.indemnizacion>0;
  out.dias90ON=typeof out.dias90ON==='boolean'?out.dias90ON:out.dias90>0;
  if(typeof out.exentoLiquidacion!=='number')out.exentoLiquidacion=0;
  if(typeof out.totalExento!=='number')out.totalExento=0;
  if(typeof out.exentoAguinaldo!=='number')out.exentoAguinaldo=0;
  if(typeof out.exentoPrimaVac!=='number')out.exentoPrimaVac=0;
  if(typeof out.baseGravable!=='number')out.baseGravable=typeof out.bISR==='number'?out.bISR:0;
  if(typeof out.totalIngresos!=='number')out.totalIngresos=typeof out.totalP==='number'?out.totalP:0;
  if(!out.fecha)out.fecha=new Date().toISOString();
  const pagoRealNum=typeof out.montoPagadoReal==='number'?out.montoPagadoReal:parseFloat(out.montoPagadoReal);
  out.montoPagadoReal=Number.isFinite(pagoRealNum)?Math.max(0,Math.round(pagoRealNum*100)/100):Math.max(0,Math.round((out.neto||0)*100)/100);
  if(!out.fechaPagoReal){
    const fechaBase=String(out.fecha||'').slice(0,10);
    out.fechaPagoReal=/^\d{4}-\d{2}-\d{2}$/.test(fechaBase)?fechaBase:today();
  }
  if(!out.id)out.id=Date.now()+Math.floor(Math.random()*100000);
  return out;
}
function normalizeImportedFiniquitoRegs(payload){
  const list=Array.isArray(payload)?payload:(payload&&Array.isArray(payload.records)?payload.records:[]);
  return list.map(normalizeFiniquitoRecord).filter(Boolean);
}
function loadLegacyFiniquitoRegs(){
  try{
    const raw=localStorage.getItem(FINIQUITO_LEGACY_KEY);
    if(!raw)return [];
    return normalizeImportedFiniquitoRegs(JSON.parse(raw));
  }catch{
    return [];
  }
}
function computeFiniquitoRecord({tipo,tipoDespido,form,tramos,agStatus,liqState,editingId}){
  const bt=buildFiniquitoTramos(tramos,form.baja);
  if(!bt)return null;
  const bono=parseFloat(form.bono)||0;
  const dB=finiquitoParseDate(form.baja);
  const dI=bt[0].ini;
  const totalA=(dB-dI)/(1000*60*60*24*365.25);
  let diasEfT=0;
  bt.forEach(t=>{diasEfT+=t.def;});
  const aniosProp=diasEfT/365;
  const aniosC=Math.floor(diasEfT/365);
  const meses=Math.round(((diasEfT%365)/30.4167)*100)/100;
  const dv=getFiniquitoVacDaysBase(diasEfT);
  const anioI=dI.getFullYear();
  const anioF=dB.getFullYear();
  const agD={};
  let aguinaldo=0;
  for(let y=anioI;y<=anioF;y++){
    const pag=agStatus[y]==='pag';
    const items=[];
    for(let ti=0;ti<bt.length;ti++){
      const t=bt[ti];
      const ini=new Date(Math.max(t.ini,new Date(y,0,1)));
      const fin=new Date(Math.min(t.fin,new Date(y,11,31)));
      if(fin<ini)continue;
      const de=countFiniquitoEffectiveDays(ini,fin,t.turno);
      const mo=Math.round(((15*t.salario/365)*de)*100)/100;
      if(mo>0)items.push({tramo:ti+1,turno:t.turno,salario:t.salario,de,mo});
    }
    if(!items.length)continue;
    const mt=Math.round(items.reduce((s,x)=>s+x.mo,0)*100)/100;
    agD[y]={pag,items,mt,mf:pag?0:mt};
    aguinaldo+=pag?0:mt;
  }
  aguinaldo=Math.round(aguinaldo*100)/100;
  const vacD=[];
  let vacaciones=0;
  for(let y=anioI;y<=anioF;y++){
    for(let ti=0;ti<bt.length;ti++){
      const t=bt[ti];
      const ini=new Date(Math.max(t.ini,new Date(y,0,1)));
      const fin=new Date(Math.min(t.fin,new Date(y,11,31)));
      if(fin<ini)continue;
      const de=countFiniquitoEffectiveDays(ini,fin,t.turno);
      const mo=Math.round(((dv*t.salario/365)*de)*100)/100;
      if(mo>0){
        vacD.push({y,tr:ti+1,turno:t.turno,sal:t.salario,de,dv,mo});
        vacaciones+=mo;
      }
    }
  }
  vacaciones=Math.round(vacaciones*100)/100;
  const primaVac=Math.round(vacaciones*0.25*100)/100;
  const exentoAguinaldo=Math.round(Math.min(aguinaldo,30*FINIQUITO_UMA)*100)/100;
  const exentoPrimaVac=Math.round(Math.min(primaVac,15*FINIQUITO_UMA)*100)/100;
  const ultSal=bt[bt.length-1].salario;
  const smgDiario=tipo==='liquidacion'?(parseFloat(form.smg)||0):0;
  let primaAntiguedad=0,indemnizacion=0,dias90=0,primaSinTope=0,primaTope=0,exentoLiquidacion=0,totalExento=0,baseGravable=0,montoLiquidacion=0;
  if(tipo==='liquidacion'){
    if(liqState.primaAntiguedadON){
      primaSinTope=Math.round((12*aniosProp*ultSal)*100)/100;
      primaTope=Math.round((12*aniosProp*(2*smgDiario))*100)/100;
      primaAntiguedad=Math.round(Math.min(primaSinTope,primaTope)*100)/100;
    }
    if(liqState.indemnizacionON)indemnizacion=Math.round((20*aniosProp*ultSal)*100)/100;
    if(liqState.dias90ON)dias90=Math.round((90*ultSal)*100)/100;
    montoLiquidacion=Math.round((primaAntiguedad+indemnizacion+dias90)*100)/100;
    exentoLiquidacion=Math.round(Math.min(montoLiquidacion,90*smgDiario*aniosProp)*100)/100;
    totalExento=Math.round((exentoAguinaldo+exentoPrimaVac+exentoLiquidacion)*100)/100;
    baseGravable=Math.round(Math.max(0,(aguinaldo+vacaciones+primaVac+primaAntiguedad+indemnizacion+dias90+bono)-totalExento)*100)/100;
  }else{
    totalExento=Math.round((exentoAguinaldo+exentoPrimaVac)*100)/100;
    baseGravable=Math.round(Math.max(0,(aguinaldo-exentoAguinaldo)+(primaVac-exentoPrimaVac)+bono)*100)/100;
  }
  const ISR=Math.round(calcFiniquitoISR(baseGravable,tipo!=='liquidacion')*100)/100;
  const totalP=Math.round((aguinaldo+vacaciones+primaVac+bono+primaAntiguedad+indemnizacion+dias90)*100)/100;
  const neto=Math.round((totalP-ISR)*100)/100;
  const horario=bt.length===1?getFiniquitoTurnoFull(bt[0].turno):bt.map((t,i)=>`T${i+1}: ${getFiniquitoTurnoFull(t.turno)} $${t.salario}/d`).join(' | ');
  const salDisplay=bt.length===1?`$${bt[0].salario}`:'Ver tramos';
  return normalizeFiniquitoRecord({
    id:editingId||Date.now(),
    nombre:(form.nombre||'').trim()||'(Sin nombre)',
    suc:form.suc,
    baja:form.baja,
    ingreso:bt[0].ini.toISOString().slice(0,10),
    bono,
    tipo,
    horario,
    salDisplay,
    tipoDespido,
    smgDiario,
    tramos:bt.map(t=>({turno:t.turno,sal:t.salario,ini:t.ini.toISOString().slice(0,10),fin:t.fin.toISOString().slice(0,10),def:t.def})),
    diasEfT,
    dv,
    totalA,
    aniosC,
    meses,
    agD,
    aguinaldo,
    vacD,
    vacaciones,
    primaVac,
    bISR:baseGravable,
    ISR,
    primaAntiguedadON:liqState.primaAntiguedadON,
    indemnizacionON:liqState.indemnizacionON,
    dias90ON:liqState.dias90ON,
    primaAntiguedad,
    indemnizacion,
    dias90,
    primaAntiguedadCalcSinTope:primaSinTope,
    primaAntiguedadTope:primaTope,
    exentoAguinaldo,
    exentoPrimaVac,
    exentoLiquidacion,
    totalExento,
    baseGravable,
    totalIngresos:totalP,
    i20:indemnizacion,
    p12:primaAntiguedad,
    d90:dias90,
    totalP,
    neto,
    montoPagadoReal:neto,
    fechaPagoReal:today(),
    fecha:new Date().toISOString()
  });
}

  return <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className={`modal ${lg?'modal-lg':''} ${xl?'modal-xl':''}`}>
      <div className="modal-title"><span>{title}</span><button className="modal-close" onClick={onClose}>✕</button></div>

}
function Confirm({open,msg,onYes,onNo}){

    <div className="modal-title"><span>⚠️ Confirmar</span></div>

}

}

  const prestActivo=prest.filter(p=>p.activo).reduce((s,p)=>s+(p.saldoPendiente||0),0);

  const cerradas=quins.filter(q=>q.status==='cerrada');

      <div className="kpi"><div className="kpi-label">Quincena Activa</div><div className="kpi-value" style={{fontSize:13}}>{abierta?`${fmtDate(abierta.inicio)} — ${fmtDate(abierta.fin)}`:'—'}</div><div className="kpi-sub">{abierta?'🟢 Abierta':'Sin quincena activa'}</div></div>
      <div className="kpi"><div className="kpi-label">Incidencias este mes</div><div className="kpi-value">{faltasTotales}</div><div className="kpi-sub text-red">{faltasDescuento} con descuento</div></div>
      <div className="kpi"><div className="kpi-label">Préstamos Pendientes</div><div className="kpi-value" style={{fontSize:15}}>{fmt(prestActivo)}</div></div>
      <div className="kpi"><div className="kpi-label">Quincenas Cerradas</div><div className="kpi-value">{cerradas.length}</div>{ultimaQna&&<div className="kpi-sub">Última: {fmtDate(ultimaQna.fin)}</div>}</div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <div className="card">
        <div className="section-title mb-3">👥 Por Sucursal</div>
        {['LAB/NF','ROKMA','PRESTTO','DM'].map(s=>{
          const cnt=emps.filter(e=>e.activo&&e.sucursal===s).length;
          const tot=emps.filter(e=>e.activo).length;
          const pct=tot?Math.round(cnt/tot*100):0;
          return <div key={s} style={{marginBottom:11}}>
            <div className="flex items-center" style={{justifyContent:'space-between',marginBottom:3}}>
              <span style={{fontSize:12}}>{s}</span><span style={{fontSize:11,color:'var(--muted)'}}>{cnt} ({pct}%)</span>
            </div>
            <div className="dias-bar"><div className="dias-fill" style={{width:`${pct}%`,background:'var(--gold)'}}/></div>
          </div>;
        })}
      </div>
      <div className="card">
        <div className="section-title mb-3">📋 Últimas Incidencias</div>
        {incs.slice(0,7).map(i=><div key={i.id} className="flex items-center" style={{justifyContent:'space-between',marginBottom:9}}>
          <div><div style={{fontSize:12,fontWeight:500}}>{i.empleadoNombre.split(' ').slice(0,2).join(' ')}</div><div style={{fontSize:10.5,color:'var(--muted)'}}>{i.tipo} · {fmtDate(i.fecha)}</div></div>
          {i.descuenta?<span className="badge badge-red">Descuenta</span>:<span className="badge badge-gray">Info</span>}
        </div>)}
        {!incs.length&&<p className="text-muted" style={{fontSize:12}}>Sin incidencias</p>}
      </div>
    </div>
  </div>;
}

   NÓMINA — QUINCENA

function calcFaltas(empId,inicio,fin,incs){
  return incs.filter(i=>i.empleadoId===empId&&i.descuenta===true&&i.fecha>=inicio&&i.fecha<=fin).length;
}
function normalizeDebtTipo(tipo){
  return String(tipo||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim().toUpperCase();
}
function sumActiveDebtQuota(prest,empId,tipo){
  const target=normalizeDebtTipo(tipo);
  return (prest||[]).filter(p=>p.empleadoId===empId&&p.activo&&Number(p.saldoPendiente)>0&&normalizeDebtTipo(p.tipo)===target).reduce((s,p)=>s+(Number(p.cuotaQuincenal)||0),0);
}
function buildRow(emp,inicio,fin,incs,prest,extraCols){
  const faltas=calcFaltas(emp.id,inicio,fin,incs);
  const compe=Math.max(0,emp.compeBase-(faltas*emp.salarioDiario));
  const realQuincenal=emp.cfdiNomina+emp.compeBase+emp.sueldo;
  const cuotasPrest=sumActiveDebtQuota(prest,emp.id,'PRÉSTAMO');
  const cuotasAdel=sumActiveDebtQuota(prest,emp.id,'ADELANTO');
  const extra=extraCols?extraCols.reduce((s,c)=>({...s,[c.id]:0}),{}):{};
  const total=(emp.cfdiNomina+compe+emp.sueldo)-cuotasPrest-cuotasAdel;
  const efectivoExtra=compe+emp.sueldo;
  return {empId:emp.id,numero:emp.numero,nombre:emp.nombre,rs:emp.rs,rsSueldo:emp.rsSueldo,sucursal:emp.sucursal,salarioDiario:emp.salarioDiario,diasTrabajados:emp.diasQna||15,faltas,cfdiNomina:emp.cfdiNomina,compeBase:emp.compeBase,compe,sueldo:emp.sueldo,prestamos:cuotasPrest,adelantos:cuotasAdel,realQuincenal,totalAPagar:total,pagado:false,facturado:false,extraCols:extra,incluyeEfectivo:true,efectivoExtra};
}
function recalcRow(row,extraCols){
  const compe=Math.max(0,row.compeBase-(row.faltas*row.salarioDiario));
  const realQuincenal=row.cfdiNomina+row.compeBase+row.sueldo;
  let sumaExtra=0,restaExtra=0;
  (extraCols||[]).forEach(c=>{const v=row.extraCols?.[c.id]||0;if(c.efecto==='suma')sumaExtra+=v;else if(c.efecto==='resta')restaExtra+=v;});
  const totalAPagar=(row.cfdiNomina+compe+row.sueldo)+sumaExtra-restaExtra-row.prestamos-row.adelantos;
  let efectivoExtra=0;
  if(row.incluyeEfectivo!==false){
    efectivoExtra=compe+row.sueldo;
    (extraCols||[]).forEach(c=>{if(c.afectaEfectivo)efectivoExtra+=(row.extraCols?.[c.id]||0);});
  }
  return {...row,compe,realQuincenal,totalAPagar,efectivoExtra};
}

  doc.setFontSize(10.5);
  doc.setFont('helvetica','bold');doc.setTextColor(40,40,40);
  doc.text('Nombre:',M,74);doc.setFont('helvetica','normal');doc.text(row.nombre,M+21,74);
  doc.setFont('helvetica','bold');doc.text('No de empleado:',130,74);doc.setFont('helvetica','normal');doc.text(String(row.numero),168,74);
  doc.setFont('helvetica','bold');doc.text('Sucursal:',M,82);doc.setFont('helvetica','normal');doc.text(row.sucursal,M+21,82);

  doc.setFont('helvetica','bold');doc.text('Faltas a Descontar:',130,90);doc.setFont('helvetica','normal');doc.text(String(row.faltas),171,90);

  // Tabla de conceptos
  const body=[];
  let pdfTotal=0;
  const pushConcept=(desc,subtotal,cantidad,total)=>{
    body.push([desc,subtotal,cantidad,total]);
    pdfTotal+=total;
  };
  pushConcept('COMPENSACIÓN',fmt(row.compeBase),'1',row.compeBase);
  if(row.faltas>0){
    const fDesc=row.faltas*row.salarioDiario;
    pushConcept('FALTAS',`-${fmt(row.salarioDiario)}`,String(row.faltas),-fDesc);
  }
  if(row.sueldo>0)pushConcept(`SUELDO S/T (${row.rsSueldo||'N/A'})`,fmt(row.sueldo),'1',row.sueldo);
  (extraCols||[]).forEach(c=>{
    const v=row.extraCols?.[c.id]||0;
    if(v!==0){
      const isR=c.efecto==='resta';
      pushConcept(c.nombre,isR?`-${fmt(v)}`:fmt(v),'1',isR?-v:v);
    }
  });
  if(row.prestamos>0)pushConcept('PRÉSTAMO(S)',`-${fmt(row.prestamos)}`,'1',-row.prestamos);
  if(row.adelantos>0)pushConcept('ADELANTO(S)',`-${fmt(row.adelantos)}`,'1',-row.adelantos);

  doc.autoTable({
    startY:97,
    head:[['DESCRIPCIÓN','SUBTOTAL','CANTIDAD','TOTAL']],
    body,
    foot:[['','','TOTAL',fmt(pdfTotal)]],
    theme:'grid',
    headStyles:{fillColor:[30,30,30],textColor:[255,255,255],fontStyle:'bold',fontSize:10,halign:'center'},
    footStyles:{fillColor:[215,215,215],textColor:[30,30,30],fontStyle:'bold',fontSize:11},
    bodyStyles:{fontSize:10,textColor:[40,40,40]},
    columnStyles:{0:{cellWidth:80},1:{halign:'right',cellWidth:42},2:{halign:'center',cellWidth:26},3:{halign:'right',cellWidth:32}},
    margin:{left:M,right:M},
    didParseCell:(d)=>{
      if(d.section==='body'){
        const desc=d.row.raw[0];
        if(desc==='FALTAS'||desc==='PRÉSTAMO(S)'||desc==='ADELANTO(S)'){
          if(d.column.index===1||d.column.index===3)d.cell.styles.textColor=[200,30,30];
        }
      }
      if(d.section==='foot'&&d.column.index===3)d.cell.styles.halign='right';
    }
  });

  const finalY=doc.lastAutoTable.finalY+10;
  // Importe en letra (minúsculas, cursiva)
  const letraRaw=numLetra(pdfTotal);
  const letraFmt=letraRaw.charAt(0)+letraRaw.slice(1).toLowerCase().replace('mxn','M.N.');
  doc.setFont('helvetica','italic');doc.setFontSize(10);doc.setTextColor(60,60,60);
  doc.text(letraFmt,M,finalY,{maxWidth:W-M*2});

  // Firmas
  const sigY=Math.min(finalY+50,245);
  doc.setDrawColor(80,80,80);doc.setLineWidth(0.4);
  doc.line(M,sigY,M+75,sigY);
  doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.setTextColor(30,30,30);
  doc.text('MARY CARMEN FLORES RIVERA',M,sigY+5);
  doc.setFont('helvetica','italic');doc.setFontSize(8.5);doc.setTextColor(80,80,80);
  doc.text('DIRECTORA ADMINISTRATIVA',M,sigY+10);
  doc.setDrawColor(80,80,80);doc.setLineWidth(0.4);
  doc.line(W-M-75,sigY,W-M,sigY);
  doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.setTextColor(30,30,30);
  doc.text(row.nombre,W-M-75,sigY+5);
  doc.setFont('helvetica','italic');doc.setFontSize(8.5);doc.setTextColor(80,80,80);
  doc.text('COLABORADOR',W-M-75,sigY+10);

  doc.save(`COMPE_${row.nombre.split(' ')[0]}_${row.nombre.split(' ')[1]}_${inicio}.pdf`);
}

// Gestor de columnas extra
function ColManager({cols,setCols,onClose}){
  const blank={id:uuid(),nombre:'',efecto:'suma',afectaEfectivo:false};
  const [f,setF]=useState(blank);
  const add=()=>{if(!f.nombre)return;setCols(p=>[...p,{...f}]);setF({...blank,id:uuid()});};
  const del=(id)=>setCols(p=>p.filter(c=>c.id!==id));
  const toggleEfecto=(id)=>setCols(p=>p.map(c=>c.id===id?{...c,efecto:c.efecto==='suma'?'resta':c.efecto==='resta'?'neutro':'suma'}:c));
  const toggleEfectivo=(id)=>setCols(p=>p.map(c=>c.id===id?{...c,afectaEfectivo:!c.afectaEfectivo}:c));
  const EFECTO_BADGE={suma:'badge-green',resta:'badge-red',neutro:'badge-gray'};
  const EFECTO_LABEL={suma:'+ Suma al total',resta:'− Resta del total',neutro:'sin efecto'};
  return <div>
    <p className="text-muted mb-3" style={{fontSize:12}}>Las columnas extra aparecen en la tabla de nómina. Haz clic en el efecto para cambiarlo. Activa 💵 para incluirla en Efectivo Extra.</p>
    {cols.map(c=><div key={c.id} className="flex items-center gap-2 mb-2" style={{background:'var(--panel2)',padding:'8px 12px',borderRadius:7}}>
      <span style={{flex:1,fontSize:12.5,fontWeight:500}}>{c.nombre}</span>
      <span className={`badge ${EFECTO_BADGE[c.efecto]}`} style={{cursor:'pointer'}} onClick={()=>toggleEfecto(c.id)}>{EFECTO_LABEL[c.efecto]}</span>
      <span className={`badge ${c.afectaEfectivo?'badge-cyan':'badge-gray'}`} style={{cursor:'pointer'}} onClick={()=>toggleEfectivo(c.id)} title="¿Suma a Efectivo Extra?">{c.afectaEfectivo?'💵 Efectivo':'💵 —'}</span>
      <button className="btn btn-danger btn-sm" onClick={()=>del(c.id)}>✕</button>
    </div>)}
    <div className="flex gap-2 mt-3" style={{flexWrap:'wrap'}}>
      <input placeholder="Nombre columna (ej: PV/TIMB)" value={f.nombre} onChange={e=>setF(p=>({...p,nombre:e.target.value.toUpperCase()}))} style={{flex:1,minWidth:160}} />
      <select value={f.efecto} onChange={e=>setF(p=>({...p,efecto:e.target.value}))} style={{width:140}}>
        <option value="suma">+ Suma</option><option value="resta">− Resta</option><option value="neutro">Sin efecto</option>
      </select>
      <label className="check-row" style={{fontSize:12,whiteSpace:'nowrap'}}><input type="checkbox" checked={f.afectaEfectivo} onChange={e=>setF(p=>({...p,afectaEfectivo:e.target.checked}))}/>💵 Efectivo</label>
      <button className="btn btn-primary" onClick={add}>+ Agregar</button>
    </div>
    <div className="form-actions"><button className="btn btn-green" onClick={onClose}>✓ Listo</button></div>
  </div>;
}

function NominaTable({rows,setRows,extraCols}){
  const upd=(idx,k,v)=>setRows(prev=>{
    const c=[...prev];const r={...c[idx],[k]:isNaN(+v)?v:+v};
    c[idx]=recalcRow(r,extraCols);return c;
  });
  const updExtra=(idx,colId,v)=>setRows(prev=>{
    const c=[...prev];const r={...c[idx],extraCols:{...c[idx].extraCols,[colId]:isNaN(+v)?0:+v}};
    c[idx]=recalcRow(r,extraCols);return c;
  });
  const toggleEfectivo=(idx,checked)=>setRows(prev=>{
    const c=[...prev];const r={...c[idx],incluyeEfectivo:checked};
    c[idx]=recalcRow(r,extraCols);return c;
  });
  const tot={cfdi:0,compe:0,sueldo:0,prest:0,adel:0,real:0,total:0,faltas:0,efectivo:0,extra:{}};
  rows.forEach(r=>{tot.cfdi+=r.cfdiNomina;tot.compe+=r.compe;tot.sueldo+=r.sueldo;tot.prest+=r.prestamos;tot.adel+=r.adelantos;tot.real+=r.realQuincenal;tot.total+=r.totalAPagar;tot.faltas+=r.faltas;if(r.incluyeEfectivo!==false)tot.efectivo+=(r.efectivoExtra||0);});
  (extraCols||[]).forEach(c=>{tot.extra[c.id]=rows.reduce((s,r)=>s+(r.extraCols?.[c.id]||0),0);});
  const ni=(idx,k)=>e=>upd(idx,k,e.target.value);
  const SI=(val,idx,k)=><input type="number" step="0.01" value={val} onChange={ni(idx,k)}/>;
  return <div className="nomina-wrap"><table className="nomina-table">
    <thead><tr>
      <th>#</th><th>RS</th><th>Nombre</th><th>Suc.</th><th>Días</th><th>Faltas</th>
      <th>CFDI Nómina</th><th>Compe</th><th>Sueldo S/T</th>
      {(extraCols||[]).map(c=><th key={c.id} className={c.efecto==='suma'?'col-suma':c.efecto==='resta'?'col-resta':''}>{c.nombre}</th>)}
      <th className="col-efec" title="Compe + Sueldo S/T + columnas marcadas como Efectivo. Desactiva por empleado con el checkbox.">💵 Efectivo Extra</th>
      <th className="col-resta">Préstamos</th><th className="col-resta">Adelantos</th>
      <th className="col-real">Real Quincenal</th>
      <th className="col-total">Total a Percibir</th>
      <th>Pagado</th><th>Facturado</th>
    </tr></thead>
    <tbody>
      {rows.map((r,i)=><tr key={r.empId}>
        <td style={{color:'var(--muted)',fontSize:10.5}}>{r.numero}</td>
        <td><RsBadge rs={r.rs}/></td>
        <td style={{fontWeight:500,minWidth:200}}>{r.nombre}</td>
        <td><span className="badge badge-gray">{r.sucursal}</span></td>
        <td>{SI(r.diasTrabajados,i,'diasTrabajados')}</td>
        <td style={{textAlign:'center'}}><span className={r.faltas>0?'badge badge-red':'badge badge-gray'}>{r.faltas}</span></td>
        <td>{fmt(r.cfdiNomina)}</td>
        <td style={{fontWeight:500}}>{fmt(r.compe)}</td>
        <td>{r.sueldo?<span className="text-gold">{fmt(r.sueldo)}</span>:<span className="text-muted">—</span>}</td>
        {(extraCols||[]).map(c=><td key={c.id} className={c.efecto==='suma'?'col-suma':c.efecto==='resta'?'col-resta':''}>
          <input type="number" step="0.01" value={r.extraCols?.[c.id]||0} onChange={e=>updExtra(i,c.id,e.target.value)}/>
        </td>)}
        <td className="col-efec">
          <label style={{display:'flex',alignItems:'center',gap:5,cursor:'pointer'}}>
            <input type="checkbox" checked={r.incluyeEfectivo!==false} onChange={e=>toggleEfectivo(i,e.target.checked)}/>
            {r.incluyeEfectivo!==false?fmt(r.efectivoExtra||0):<span className="text-muted" style={{fontWeight:400}}>—</span>}
          </label>
        </td>
        <td className="col-resta">{SI(r.prestamos,i,'prestamos')}</td>
        <td className="col-resta">{SI(r.adelantos,i,'adelantos')}</td>
        <td className="col-real">{fmt(r.realQuincenal)}</td>
        <td className="col-total">{fmt(r.totalAPagar)}</td>
        <td><input type="checkbox" checked={r.pagado} onChange={e=>upd(i,'pagado',e.target.checked)}/></td>
        <td><input type="checkbox" checked={r.facturado} onChange={e=>upd(i,'facturado',e.target.checked)}/></td>
      </tr>)}
    </tbody>
    <tfoot><tr className="tr-total">
      <td colSpan={6}>{rows.length} empleados — {tot.faltas} faltas</td>
      <td>{fmt(tot.cfdi)}</td><td>{fmt(tot.compe)}</td><td>{fmt(tot.sueldo)}</td>
      {(extraCols||[]).map(c=><td key={c.id}>{fmt(tot.extra[c.id]||0)}</td>)}
      <td className="col-efec">{fmt(tot.efectivo)}</td>
      <td>{fmt(tot.prest)}</td><td>{fmt(tot.adel)}</td>
      <td>{fmt(tot.real)}</td><td>{fmt(tot.total)}</td><td colSpan={2}/>
    </tr></tfoot>
  </table></div>;
}

function Nomina(){
  const [emps]=useState(()=>LS.get(K.emp,[]));
  const [incs]=useState(()=>LS.get(K.inc,[]));
  const [prest,setPrest]=useState(()=>LS.get(K.prest,[]));
  const [quins,setQuins]=useState(()=>LS.get(K.quin,[]));
  const [rs]=useState(()=>LS.get(K.rs,SEED_RS));
  const abierta=useMemo(()=>quins.find(q=>q.status==='abierta'),[quins]);
  const [inicio,setInicio]=useState('2026-04-16');
  const [fin,setFin]=useState('2026-04-30');
  const [rows,setRows]=useState([]);
  const [extraCols,setExtraCols]=useState([]);
  const [modalNew,setModalNew]=useState(false);
  const [modalCols,setModalCols]=useState(false);
  const [confirmCerrar,setConfirmCerrar]=useState(false);
  const [saved,setSaved]=useState(false);
  const skipPersistRef=useRef(false);
  const persistTimerRef=useRef(null);
  const savedTimerRef=useRef(null);
  const latestRowsRef=useRef([]);
  const latestExtraColsRef=useRef([]);

  const persistOpenQuincena=(nextRows,nextExtraCols)=>{
    if(!abierta)return;
    const currentQuins=LS.get(K.quin,[]);
    const up=currentQuins.map(q=>q.id===abierta.id?{...q,rows:nextRows,extraCols:nextExtraCols}:q);
    LS.set(K.quin,up);
  };

  useEffect(()=>{
    if(abierta){
      skipPersistRef.current=true;
      const freshPrest=LS.get(K.prest,[]);
      setPrest(freshPrest);
      setInicio(abierta.inicio);setFin(abierta.fin);
      setExtraCols(abierta.extraCols||[]);
      if(abierta.rows)setRows(abierta.rows);
      else setRows(emps.filter(e=>e.activo).sort((a,b)=>a.numero-b.numero).map(e=>buildRow(e,abierta.inicio,abierta.fin,incs,freshPrest,abierta.extraCols||[])));
    }
  },[abierta]);

  useEffect(()=>{
    latestRowsRef.current=rows;
    latestExtraColsRef.current=extraCols;
  },[rows,extraCols]);

  useEffect(()=>{
    if(!abierta)return;
    if(skipPersistRef.current){
      skipPersistRef.current=false;
      return;
    }
    if(persistTimerRef.current)clearTimeout(persistTimerRef.current);
    persistTimerRef.current=setTimeout(()=>{
      persistOpenQuincena(rows,extraCols);
      setSaved(true);
      if(savedTimerRef.current)clearTimeout(savedTimerRef.current);
      savedTimerRef.current=setTimeout(()=>setSaved(false),1200);
    },300);
    return ()=>{if(persistTimerRef.current)clearTimeout(persistTimerRef.current);};
  },[abierta,rows,extraCols]);

  useEffect(()=>()=>{
    if(persistTimerRef.current)clearTimeout(persistTimerRef.current);
    if(savedTimerRef.current)clearTimeout(savedTimerRef.current);
    if(abierta)persistOpenQuincena(latestRowsRef.current,latestExtraColsRef.current);
  },[abierta?.id]);

  const recalcTodo=()=>{
    if(!abierta)return;
    const freshEmps=LS.get(K.emp,[]);
    const freshIncs=LS.get(K.inc,[]);
    const freshPrest=LS.get(K.prest,[]);
    setPrest(freshPrest);
    setRows(prev=>prev.map(r=>{
      const freshEmp=freshEmps.find(e=>e.id===r.empId);
      const faltas=calcFaltas(r.empId,abierta.inicio,abierta.fin,freshIncs);
      const cuotasPrest=sumActiveDebtQuota(freshPrest,r.empId,'PRÉSTAMO');
      const cuotasAdel=sumActiveDebtQuota(freshPrest,r.empId,'ADELANTO');
      const nextRow=freshEmp?{
        ...r,
        numero:freshEmp.numero,
        nombre:freshEmp.nombre,
        rs:freshEmp.rs,
        rsSueldo:freshEmp.rsSueldo,
        sucursal:freshEmp.sucursal,
        salarioDiario:freshEmp.salarioDiario,
        cfdiNomina:freshEmp.cfdiNomina,
        compeBase:freshEmp.compeBase,
        sueldo:freshEmp.sueldo
      }:{...r};
      return recalcRow({...nextRow,faltas,prestamos:cuotasPrest,adelantos:cuotasAdel},extraCols);
    }));
  };

  const autoSave=()=>{
    if(!abierta)return;
    const up=quins.map(q=>q.id===abierta.id?{...q,rows,extraCols}:q);
    setQuins(up);LS.set(K.quin,up);setSaved(true);setTimeout(()=>setSaved(false),2000);
  };

  const crearQna=()=>{
    const freshPrest=LS.get(K.prest,[]);
    setPrest(freshPrest);
    const nueva={id:uuid(),inicio,fin,status:'abierta',rows:null,extraCols:[],fechaCreacion:today()};
    const up=[...quins,nueva];setQuins(up);LS.set(K.quin,up);setModalNew(false);
    setExtraCols([]);
    setRows(emps.filter(e=>e.activo).sort((a,b)=>a.numero-b.numero).map(e=>buildRow(e,inicio,fin,incs,freshPrest,[])));
  };

  const cerrarQna=()=>{
    // Aplicar exactamente lo capturado en la quincena, distribuyéndolo
    // sobre los saldos activos del empleado, del más antiguo al más nuevo.
    let prestUp=[...prest];
    rows.forEach(r=>{
      if(r.prestamos>0||r.adelantos>0){
        const restantes={'PRÉSTAMO':Number(r.prestamos)||0,'ADELANTO':Number(r.adelantos)||0};
        ['PRÉSTAMO','ADELANTO'].forEach(tipo=>{
          let restante=restantes[tipo]||0;
          if(restante<=0)return;
          const ordenados=[...prestUp].map((p,idx)=>({...p,__idx:idx})).filter(p=>p.empleadoId===r.empId&&p.tipo===tipo&&p.activo&&p.saldoPendiente>0).sort((a,b)=>String(a.fechaOtorgado||'').localeCompare(String(b.fechaOtorgado||''))||a.__idx-b.__idx);
          ordenados.forEach(p=>{
            if(restante<=0)return;
            const abono=Math.min(restante,p.saldoPendiente);
            restante=Number((restante-abono).toFixed(2));
            prestUp=prestUp.map(x=>x.id===p.id?{...x,saldoPendiente:Number((x.saldoPendiente-abono).toFixed(2)),activo:Number((x.saldoPendiente-abono).toFixed(2))>0}:x);
          });
        });
      }
    });
    LS.set(K.prest,prestUp);setPrest(prestUp);
    const up=quins.map(q=>q.id===abierta.id?{...q,status:'cerrada',rows,extraCols,fechaCierre:today()}:q);
    setQuins(up);LS.set(K.quin,up);setConfirmCerrar(false);
  };

  if(!abierta)return <div style={{textAlign:'center',paddingTop:80}}>
    <div style={{fontSize:48,marginBottom:14}}>📋</div>
    <p className="text-muted mb-4">No hay quincena abierta.</p>
    <button className="btn btn-primary" onClick={()=>setModalNew(true)}>+ Crear Quincena</button>
    <Modal open={modalNew} onClose={()=>setModalNew(false)} title="Nueva Quincena">
      <div className="form-row">
        <div className="form-group"><label>Inicio</label><input type="date" value={inicio} onChange={e=>setInicio(e.target.value)}/></div>
        <div className="form-group"><label>Fin</label><input type="date" value={fin} onChange={e=>setFin(e.target.value)}/></div>
      </div>
      <div className="form-actions"><button className="btn btn-secondary" onClick={()=>setModalNew(false)}>Cancelar</button><button className="btn btn-primary" onClick={crearQna}>✓ Crear</button></div>
    </Modal>
  </div>;

  const tots={real:rows.reduce((s,r)=>s+r.realQuincenal,0),total:rows.reduce((s,r)=>s+r.totalAPagar,0),cfdi:rows.reduce((s,r)=>s+r.cfdiNomina,0)};

  return <div>
    <div className="kpi-grid">
      <div className="kpi"><div className="kpi-label">Período</div><div className="kpi-value" style={{fontSize:12.5}}>{fmtDate(abierta.inicio)} — {fmtDate(abierta.fin)}</div><div className="kpi-sub text-green">🟢 Abierta</div></div>
      <div className="kpi"><div className="kpi-label">Real Quincenal</div><div className="kpi-value text-blue" style={{fontSize:15}}>{fmt(tots.real)}</div></div>
      <div className="kpi"><div className="kpi-label">Total a Percibir</div><div className="kpi-value text-gold" style={{fontSize:15}}>{fmt(tots.total)}</div></div>
      <div className="kpi"><div className="kpi-label">CFDI Total</div><div className="kpi-value" style={{fontSize:15}}>{fmt(tots.cfdi)}</div></div>
      <div className="kpi"><div className="kpi-label">Empleados</div><div className="kpi-value">{rows.length}</div></div>
    </div>
    <div className="section-header">
      <div className="flex gap-2 items-center flex-wrap">
        <button className="btn btn-secondary" onClick={()=>setModalCols(true)}>⚙️ Columnas Extra</button>
        <span className="text-muted" style={{fontSize:11}}>Columnas activas: {extraCols.length}</span>
      </div>
      <div className="flex gap-2">
        {saved&&<span className="text-green" style={{fontSize:12,alignSelf:'center'}}>✓ Guardado</span>}
        <button className="btn btn-blue" onClick={recalcTodo}>🔄 Recalcular Todo</button>
        <button className="btn btn-secondary" onClick={autoSave}>💾 Guardar</button>
        <button className="btn btn-danger" onClick={()=>setConfirmCerrar(true)}>🔒 Cerrar Quincena</button>
      </div>
    </div>
    <NominaTable rows={rows} setRows={setRows} extraCols={extraCols}/>
    <div style={{marginTop:18}}>
      <div className="section-title mb-2">📄 Generar Comprobantes PDF</div>
      <div className="flex flex-wrap gap-1">
        {rows.map(r=><button key={r.empId} className="btn btn-secondary btn-sm" onClick={()=>generarPDF(r,abierta.inicio,abierta.fin,rs,extraCols)}>
          📄 {r.nombre.split(' ').slice(0,2).join(' ')}
        </button>)}
      </div>
    </div>
    <Modal open={modalCols} onClose={()=>{setModalCols(false);}} title="⚙️ Gestionar Columnas Extra" lg>
      <ColManager cols={extraCols} setCols={updater=>{
        const nextCols=typeof updater==='function'?updater(extraCols):updater;
        setExtraCols(nextCols);
        setRows(prev=>prev.map(r=>{
          const ne=nextCols.reduce((s,col)=>({...s,[col.id]:r.extraCols?.[col.id]||0}),{});
          return recalcRow({...r,extraCols:ne},nextCols);
        }));
      }} onClose={()=>setModalCols(false)}/>
    </Modal>
    <Confirm open={confirmCerrar} msg={`¿Cerrar quincena ${fmtDate(abierta.inicio)} — ${fmtDate(abierta.fin)}? Se guardará el snapshot y se actualizarán los préstamos.`} onYes={cerrarQna} onNo={()=>setConfirmCerrar(false)}/>
  </div>;
}

function Empleados(){
  const [emps,setEmps]=useState(()=>LS.get(K.emp,[]));
  const [rs]=useState(()=>LS.get(K.rs,SEED_RS));
  const [modal,setModal]=useState(null);
  const [sel,setSel]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [search,setSearch]=useState('');
  const [showInact,setShowInact]=useState(false);
  const [sf,setSf]=useState('numero');
  const [sd,setSd]=useState('asc');
  const onSort=(f)=>{setSf(f);setSd(p=>sf===f?(p==='asc'?'desc':'asc'):'asc');};

  const filtered=useMemo(()=>{
    let r=emps.filter(e=>showInact?true:e.activo).filter(e=>e.nombre.toLowerCase().includes(search.toLowerCase())||e.sucursal.toLowerCase().includes(search.toLowerCase()));
    r.sort((a,b)=>{const va=a[sf],vb=b[sf],m=sd==='asc'?1:-1;return typeof va==='number'?(va-vb)*m:String(va||'').localeCompare(String(vb||''))*m;});
    return r;
  },[emps,search,showInact,sf,sd]);

  const handleSave=(f)=>{
    const up=sel?emps.map(e=>e.id===sel.id?{...f,id:sel.id}:e):[...emps,{...f,id:uuid()}];
    setEmps(up);LS.set(K.emp,up);setModal(null);setSel(null);
  };
  const handleSaveVac=(f)=>{
    const up=emps.map(e=>e.id===sel.id?{...f,id:sel.id}:e);
    setEmps(up);LS.set(K.emp,up);
    // Reset vacation saldo
    const vs=LS.get(K.vacSaldo,{});
    vs[sel.id]=f.diasVacaciones;LS.set(K.vacSaldo,vs);
    setModal(null);setSel(null);
  };
  const handleBaja=(e)=>{const up=emps.map(x=>x.id===e.id?{...x,activo:false,fechaBaja:today()}:x);setEmps(up);LS.set(K.emp,up);setConfirm(null);};
  const handleReactivar=(e)=>{const up=emps.map(x=>x.id===e.id?{...x,activo:true,fechaBaja:null}:x);setEmps(up);LS.set(K.emp,up);};

  const exportExcel=()=>{
    const data=filtered.map(e=>({'N°':e.numero,'Nombre':e.nombre,'RS':e.rs,'Sucursal':e.sucursal,'Sal. Diario':e.salarioDiario,'CFDI Nómina':e.cfdiNomina,'Compe Base':e.compeBase,'Sueldo S/T':e.sueldo,'Real Quincenal':e.cfdiNomina+e.compeBase+e.sueldo,'Días Qna':e.diasQna,'Días Vac/Año':e.diasVacaciones,'Estado':e.activo?'Activo':'Baja','Fecha Alta':e.fechaAlta,'Fecha Baja':e.fechaBaja||''}));
    const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Empleados');XLSX.writeFile(wb,'Empleados_GF.xlsx');
  };

  const nxtNum=useMemo(()=>Math.max(0,...emps.map(e=>e.numero))+1,[emps]);
  const SP={campo:(s)=>({className:`sortable`,onClick:()=>onSort(s)})};

  return <div>
    <div className="kpi-grid">
      <div className="kpi"><div className="kpi-label">Activos</div><div className="kpi-value text-green">{emps.filter(e=>e.activo).length}</div></div>
      <div className="kpi"><div className="kpi-label">Inactivos</div><div className="kpi-value text-muted">{emps.filter(e=>!e.activo).length}</div></div>
      <div className="kpi"><div className="kpi-label">Nómina Base Total</div><div className="kpi-value text-gold" style={{fontSize:14}}>{fmt(emps.filter(e=>e.activo).reduce((s,e)=>s+e.cfdiNomina+e.compeBase+e.sueldo,0))}</div></div>
    </div>
    <div className="section-header">
      <div className="flex items-center gap-2 flex-wrap">
        <div className="search-bar"><span className="search-icon">🔍</span><input placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <label className="check-row text-muted" style={{fontSize:12}}><input type="checkbox" checked={showInact} onChange={e=>setShowInact(e.target.checked)}/>Ver inactivos</label>
      </div>
      <div className="flex gap-2">
        <button className="btn btn-secondary" onClick={exportExcel}>📊 Excel</button>
        <button className="btn btn-primary" onClick={()=>{setSel(null);setModal('form');}}>+ Nuevo</button>
      </div>
    </div>
    <div className="table-wrap"><table>
      <thead><tr>
        <SortTh field="numero" label="#" sf={sf} sd={sd} onSort={onSort}/>
        <SortTh field="rs" label="RS" sf={sf} sd={sd} onSort={onSort}/>
        <SortTh field="nombre" label="Nombre" sf={sf} sd={sd} onSort={onSort}/>
        <SortTh field="sucursal" label="Sucursal" sf={sf} sd={sd} onSort={onSort}/>
        <SortTh field="salarioDiario" label="Sal. Diario" sf={sf} sd={sd} onSort={onSort}/>
        <SortTh field="cfdiNomina" label="CFDI" sf={sf} sd={sd} onSort={onSort}/>
        <SortTh field="compeBase" label="Compe" sf={sf} sd={sd} onSort={onSort}/>
        <th>Sueldo S/T</th><th>Real Qna.</th><th>Días Qna</th><th>Vac/Año</th><th>Estado</th><th>Acciones</th>
      </tr></thead>
      <tbody>{filtered.map(e=>{
        const real=e.cfdiNomina+e.compeBase+e.sueldo;
        return <tr key={e.id} style={e.activo?{}:{opacity:.5}}>
          <td className="text-muted" style={{fontSize:10.5}}>{e.numero}</td>
          <td><RsBadge rs={e.rs}/></td>
          <td style={{fontWeight:500}}>{e.nombre}</td>
          <td><span className="badge badge-gray">{e.sucursal}</span></td>
          <td>{fmt(e.salarioDiario)}</td><td>{fmt(e.cfdiNomina)}</td><td>{fmt(e.compeBase)}</td>
          <td>{e.sueldo?<span className="text-gold">{fmt(e.sueldo)}</span>:<span className="text-muted">—</span>}</td>
          <td style={{fontWeight:600}}>{fmt(real)}</td>
          <td style={{textAlign:'center'}}>{e.diasQna||15}</td>
          <td style={{textAlign:'center'}}>{e.diasVacaciones||12}</td>
          <td>{e.activo?<span className="badge badge-green">Activo</span>:<span className="badge badge-red">Baja</span>}</td>
          <td><div className="flex gap-1">
            <button className="btn btn-secondary btn-sm" onClick={()=>{setSel(e);setModal('form');}}>✏️</button>
            {e.activo?<button className="btn btn-danger btn-sm" onClick={()=>setConfirm(e)}>Baja</button>:<button className="btn btn-green btn-sm" onClick={()=>handleReactivar(e)}>Activar</button>}
          </div></td>
        </tr>;
      })}</tbody>
    </table></div>
    <Modal open={modal==='form'} onClose={()=>{setModal(null);setSel(null);}} title={sel?'Editar Empleado':'Nuevo Empleado'} lg>
      <EmpForm emp={sel?{...sel}:{numero:nxtNum,nombre:'',rs:'MCFR',sucursal:'LAB/NF',salarioDiario:0,cfdiNomina:0,compeBase:0,sueldo:0,rsSueldo:'',activo:true,fechaAlta:today(),fechaBaja:null,diasQna:15,diasVacaciones:12}} onSave={handleSave} onSaveVac={handleSaveVac} onClose={()=>{setModal(null);setSel(null);}} rsOpts={rs}/>
    </Modal>
    <Confirm open={!!confirm} msg={`¿Dar de baja a ${confirm?.nombre}?`} onYes={()=>handleBaja(confirm)} onNo={()=>setConfirm(null)}/>
  </div>;
}

/* ══════════════════════════════════════════════════════════
   INCIDENCIAS

function Incidencias(){
  const [incs,setIncs]=useState(()=>LS.get(K.inc,[]));
  const [tipos,setTipos]=useState(()=>LS.get(K.tipos,SEED_TIPOS));
  const [emps]=useState(()=>LS.get(K.emp,[]));
  const [tab,setTab]=useState('reg');
  const [modal,setModal]=useState(null);
  const [editInc,setEditInc]=useState(null);
  const [search,setSearch]=useState('');
  const [filterMes,setFilterMes]=useState('');
  const blank={empleadoId:'',tipo:'',fecha:today(),motivo:'',horaSalida:'',horaRegreso:'',horaLlegada:''};
  const [f,setF]=useState(blank);
  const fileRef=useRef(null);
  const fld=(k,v)=>setF(p=>({...p,[k]:v}));
  const syncDiasDeb=up=>recalcDiasDebFromIncidencias(up,tipos);
  const normalizeDateValue=v=>{
    if(v===null||v===undefined||v==='')return '';
    if(typeof v==='number'){
      const d=XLSX.SSF.parse_date_code(v);
      if(!d)return '';
      return `${String(d.y).padStart(4,'0')}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
    }
    const raw=String(v).trim();
    if(!raw)return '';
    if(/^\d{4}-\d{2}-\d{2}$/.test(raw))return raw;
    const dt=new Date(raw);
    if(Number.isNaN(dt.getTime()))return '';
    return new Date(dt.getTime()-dt.getTimezoneOffset()*60000).toISOString().slice(0,10);
  };
  const normalizeTimeValue=v=>{
    const raw=String(v||'').trim();
    if(!raw)return '';
    if(/^\d{2}:\d{2}$/.test(raw))return raw;
    if(/^\d{1,2}:\d{2}(:\d{2})?$/.test(raw)){
      const parts=raw.split(':');
      return `${String(parts[0]).padStart(2,'0')}:${parts[1]}`;
    }
    return '';
  };
  const exportTemplate=()=>{
    const ejemploEmp=emps.find(e=>e.activo)||emps[0];
    const ejemploTipo=tipos[0]?.nombre||'FALTA';
    const wsTpl=XLSX.utils.json_to_sheet([{
      empleadoNumero:ejemploEmp?.numero||1,
      empleadoNombre:ejemploEmp?.nombre||'NOMBRE COMPLETO',
      tipo:ejemploTipo,
      fecha:today(),
      motivo:'MOTIVO OPCIONAL',
      horaSalida:'',
      horaRegreso:'',
      horaLlegada:''
    }]);
    const wsInfo=XLSX.utils.json_to_sheet(emps.filter(e=>e.activo).sort((a,b)=>a.numero-b.numero).map(e=>({
      empleadoNumero:e.numero,
      empleadoNombre:e.nombre,
      sucursal:e.sucursal
    })));
    const wsTipos=XLSX.utils.json_to_sheet(tipos.map(t=>({
      tipo:t.nombre,
      descuenta:t.descuenta?'SI':'NO',
      afectaVacaciones:t.afectaVac?'SI':'NO',
      afectaDiasDebidos:t.afectaDias?'SI':'NO'
    })));
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,wsTpl,'Plantilla');
    XLSX.utils.book_append_sheet(wb,wsInfo,'Empleados');
    XLSX.utils.book_append_sheet(wb,wsTipos,'Tipos');
    XLSX.writeFile(wb,'Plantilla_Importacion_Incidencias.xlsx');
  };
  const exportExcel=()=>{
    const data=filtered.map(i=>{
      const emp=emps.find(e=>e.id===i.empleadoId)||{};
      return {
        'Fecha':i.fecha,
        'Empleado N°':emp.numero||'',
        'Empleado':i.empleadoNombre,
        'Sucursal':emp.sucursal||'',
        'Tipo':i.tipo,
        'Descuenta':i.descuenta?'Sí':'No',
        'Motivo':i.motivo||'',
        'Hora Salida':i.horaSalida||'',
        'Hora Regreso':i.horaRegreso||'',
        'Hora Llegada':i.horaLlegada||''
      };
    });
    const ws=XLSX.utils.json_to_sheet(data);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Incidencias');
    XLSX.writeFile(wb,`Incidencias_${filterMes||today()}.xlsx`);
  };
  const exportPDFIncidencia=inc=>{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:'mm',format:'letter'});
    const emp=emps.find(e=>e.id===inc.empleadoId)||{};
    const W=216,M=18;
    addReportHeader(doc,'ACUSE DE INCIDENCIA',{
      accent:[222,238,248],
      textColor:[20,78,120],
      titleSize:21,
      bandY:13,
      bandH:13,
      bandX:20,
      bandW:W-30,
      box:{x:10,y:4,w:26,h:44,logoSize:15,textScale:1.12,bgColor:[25,88,168],fgColor:[255,255,255]}
    });
    doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(60,60,60);
    doc.text('Fecha de emisión:',110,45);
    doc.setFont('helvetica','bold');doc.text(fmtFechaPago(new Date()),145,45);

    doc.setFillColor(240,248,253);doc.roundedRect(M,52,W-M*2,30,3,3,'F');
    doc.setDrawColor(175,212,234);doc.roundedRect(M,52,W-M*2,30,3,3,'S');
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(20,78,120);
    doc.text('DATOS DEL COLABORADOR',M+4,60);
    doc.setFont('helvetica','normal');doc.setFontSize(10);
    doc.setTextColor(40,40,40);
    doc.text(`Nombre: ${inc.empleadoNombre||'—'}`,M+4,68);
    doc.text(`Sucursal: ${emp.sucursal||'—'}`,M+4,75);
    doc.text(`No. de empleado: ${emp.numero||'—'}`,118,68);
    doc.text(`Fecha de incidencia: ${fmtDate(inc.fecha)}`,118,75);

    const body=[
      ['Tipo de incidencia',inc.tipo||'—']
    ];
    if(inc.motivo)body.push(['Motivo / descripción',inc.motivo]);
    if(inc.horaSalida)body.push(['Hora salida',inc.horaSalida]);
    if(inc.horaRegreso)body.push(['Hora regreso',inc.horaRegreso]);
    if(inc.horaLlegada)body.push(['Hora llegada',inc.horaLlegada]);
    if(inc.descuenta)body.push(['Descuenta compensación','Sí']);
    doc.autoTable({
      startY:88,
      head:[['Concepto','Detalle']],
      body,
      theme:'grid',
      headStyles:{fillColor:[46,126,177],textColor:[255,255,255],fontStyle:'bold',fontSize:10},
      bodyStyles:{fontSize:10,textColor:[40,40,40]},
      columnStyles:{0:{cellWidth:54,fontStyle:'bold'},1:{cellWidth:126}},
      margin:{left:M,right:M}
    });

    let y=doc.lastAutoTable.finalY+12;
    doc.setFont('helvetica','normal');doc.setFontSize(10.5);doc.setTextColor(50,50,50);
    const texto=`Por medio del presente, el colaborador queda enterado de la incidencia registrada en el sistema de Recursos Humanos de Grupo Rokma, correspondiente a la fecha y detalle señalados en este documento.`;
    doc.text(texto,M,y,{maxWidth:W-M*2,align:'justify'});
    y+=28;
    doc.text('Firma de enterado:',M,y);
    y+=18;
    doc.setDrawColor(90,90,90);doc.setLineWidth(0.35);
    doc.line(M,y,M+76,y);
    doc.line(W-M-76,y,W-M,y);
    doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.setTextColor(30,30,30);
    doc.text('MARY CARMEN FLORES RIVERA',M,y+5);
    doc.text(inc.empleadoNombre||'COLABORADOR',W-M-76,y+5);
    doc.setFont('helvetica','italic');doc.setFontSize(8.5);doc.setTextColor(90,90,90);
    doc.text('DIRECTORA ADMINISTRATIVA',M,y+10);
    doc.text('COLABORADOR',W-M-76,y+10);

    const safeName=normTxt(inc.empleadoNombre||'INCIDENCIA').replace(/[^A-Z0-9 ]/g,'').trim().replace(/\s+/g,'_');
    doc.save(`Incidencia_${safeName||'COLABORADOR'}_${inc.fecha||today()}.pdf`);
  };
  const importIncidencias=async e=>{
    const file=e.target.files?.[0];
    if(!file)return;
    try{
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      const errores=[];
      let vacSaldoActual=LS.get(K.vacSaldo,{});
      const nuevos=[];
      rows.forEach((row,idx)=>{
        const numero=Number(row.empleadoNumero||row.numero||row['empleado_numero']||0);
        const nombre=normTxt(row.empleadoNombre||row.nombre||row.empleado||'');
        const tipoNombre=normTxt(row.tipo||'');
        const fecha=normalizeDateValue(row.fecha||row.Fecha||row.FECHA);
        const emp=numero?emps.find(x=>x.numero===numero):emps.find(x=>normTxt(x.nombre)===nombre);
        const tipo=findTipo(tipos,tipoNombre);
        if(!emp){errores.push(`Fila ${idx+2}: empleado no encontrado.`);return;}
        if(!tipo){errores.push(`Fila ${idx+2}: tipo inválido.`);return;}
        if(!fecha){errores.push(`Fila ${idx+2}: fecha inválida.`);return;}
        let data={
          id:uuid(),
          empleadoId:emp.id,
          empleadoNombre:emp.nombre,
          tipo:tipo.nombre,
          fecha,
          motivo:normTxt(row.motivo||''),
          horaSalida:normalizeTimeValue(row.horaSalida),
          horaRegreso:normalizeTimeValue(row.horaRegreso),
          horaLlegada:normalizeTimeValue(row.horaLlegada),
          descuenta:tipo.descuenta
        };
        if(tipo.afectaVac){
          const cur=Number(vacSaldoActual[emp.id]??emp.diasVacaciones??0);
          const vacApplied=cur>0;
          if(vacApplied)vacSaldoActual={...vacSaldoActual,[emp.id]:cur-1};
          data={...data,_fx:{vacApplied}};
        }
        nuevos.push(data);
      });
      if(errores.length){
        window.alert(`Se encontraron errores:\n\n${errores.slice(0,10).join('\n')}${errores.length>10?`\n... y ${errores.length-10} más`:''}`);
        return;
      }
      if(!nuevos.length){
        window.alert('No se encontraron incidencias válidas para importar.');
        return;
      }
      LS.set(K.vacSaldo,vacSaldoActual);
      const up=[...nuevos,...incs];
      setIncs(up);LS.set(K.inc,up);
      syncDiasDeb(up);
      window.alert(`Se importaron ${nuevos.length} incidencia(s) correctamente.`);
    }catch(err){
      window.alert(`No se pudo importar el archivo.\n${err?.message||err}`);
    }finally{
      e.target.value='';
    }
  };

  const saveInc=()=>{
    const emp=emps.find(e=>e.id===f.empleadoId);
    const tipo=tipos.find(t=>t.nombre===f.tipo);
    if(!emp||!tipo||!f.fecha)return;
    if(editInc)revertVacIncidenceEffect(editInc,tipos,emps);
    let data={...f,id:editInc?editInc.id:uuid(),empleadoNombre:emp.nombre,descuenta:tipo.descuenta};
    data=applyVacIncidenceEffect(data,tipos,emps).inc;
    const up=editInc?incs.map(i=>i.id===editInc.id?data:i):[data,...incs];
    setIncs(up);LS.set(K.inc,up);setF(blank);setEditInc(null);setModal(null);
    syncDiasDeb(up);
  };

  const delInc=(id)=>{
    const target=incs.find(i=>i.id===id);
    if(target)revertVacIncidenceEffect(target,tipos,emps);
    const up=incs.filter(i=>i.id!==id);
    setIncs(up);LS.set(K.inc,up);
    syncDiasDeb(up);
  };
  const openEdit=(i)=>{setEditInc(i);setF({empleadoId:i.empleadoId,tipo:i.tipo,fecha:i.fecha,motivo:i.motivo,horaSalida:i.horaSalida||'',horaRegreso:i.horaRegreso||'',horaLlegada:i.horaLlegada||''});setModal('form');};

  const [tipoF,setTipoF]=useState({nombre:'',descuenta:false,color:'#3b82f6',afectaVac:false,afectaDias:false});
  const saveTipo=()=>{if(!tipoF.nombre)return;const up=[...tipos,{...tipoF,id:uuid()}];setTipos(up);LS.set(K.tipos,up);setTipoF({nombre:'',descuenta:false,color:'#3b82f6',afectaVac:false,afectaDias:false});};
  const delTipo=(id)=>{const up=tipos.filter(t=>t.id!==id);setTipos(up);LS.set(K.tipos,up);};
  const toggleDesc=(id)=>{const up=tipos.map(t=>t.id===id?{...t,descuenta:!t.descuenta}:t);setTipos(up);LS.set(K.tipos,up);};

  const filtered=useMemo(()=>incs.filter(i=>!search||i.empleadoNombre.toLowerCase().includes(search.toLowerCase())||i.tipo.toLowerCase().includes(search.toLowerCase())).filter(i=>!filterMes||i.fecha.startsWith(filterMes)).sort((a,b)=>b.fecha.localeCompare(a.fecha)),[incs,search,filterMes]);

  return <div>
    <div className="tabs">
      <button className={`tab ${tab==='reg'?'active':''}`} onClick={()=>setTab('reg')}>📋 Registro</button>
      <button className={`tab ${tab==='tipos'?'active':''}`} onClick={()=>setTab('tipos')}>⚙️ Tipos</button>
    </div>
    {tab==='reg'&&<>
      <div className="section-header">
        <div className="flex items-center gap-2 flex-wrap">
          <div className="search-bar"><span className="search-icon">🔍</span><input placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
          <input type="month" value={filterMes} onChange={e=>setFilterMes(e.target.value)} style={{background:'var(--panel2)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 10px',color:'var(--text)',fontSize:12.5}}/>
        </div>
        <div className="flex gap-2">
          <button className="btn btn-secondary" onClick={exportExcel}>📊 Excel</button>
          <button className="btn btn-secondary" onClick={exportTemplate}>📄 Plantilla</button>
          <button className="btn btn-secondary" onClick={()=>fileRef.current?.click()}>📥 Importar</button>
          <button className="btn btn-primary" onClick={()=>{setEditInc(null);setF(blank);setModal('form');}}>+ Registrar</button>
          <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={importIncidencias}/>
        </div>
      </div>
      <div className="table-wrap"><table>
        <thead><tr><th>Fecha</th><th>Empleado</th><th>Tipo</th><th>Descuenta</th><th>Motivo</th><th>Horas</th><th>Acciones</th></tr></thead>
        <tbody>
          {!filtered.length&&<tr><td colSpan={7} style={{textAlign:'center',color:'var(--muted)',padding:32}}>Sin registros</td></tr>}
          {filtered.map(i=>{const t=tipos.find(x=>x.nombre===i.tipo);return <tr key={i.id}>
            <td>{fmtDate(i.fecha)}</td>
            <td style={{fontWeight:500}}>{i.empleadoNombre}</td>
            <td><span className="badge" style={{background:`${t?.color||'#666'}22`,color:t?.color||'#aaa'}}>{i.tipo}</span></td>
            <td>{i.descuenta?<span className="badge badge-red">Sí</span>:<span className="badge badge-gray">No</span>}</td>
            <td className="text-muted" style={{maxWidth:200,overflow:'hidden',textOverflow:'ellipsis'}}>{i.motivo}</td>
            <td style={{fontSize:10.5,color:'var(--muted)'}}>{[i.horaSalida&&`Sal:${i.horaSalida}`,i.horaRegreso&&`Reg:${i.horaRegreso}`,i.horaLlegada&&`Lle:${i.horaLlegada}`].filter(Boolean).join(' ')}</td>
            <td><div className="flex gap-1"><button className="btn btn-secondary btn-sm" onClick={()=>exportPDFIncidencia(i)}>📄</button><button className="btn btn-secondary btn-sm" onClick={()=>openEdit(i)}>✏️</button><button className="btn btn-danger btn-sm" onClick={()=>delInc(i.id)}>✕</button></div></td>
          </tr>;})}
        </tbody>
      </table></div>
    </>}
    {tab==='tipos'&&<div>
      <div className="card mb-4">
        <div className="section-title mb-3">➕ Nuevo Tipo</div>
        <div className="form-row c3">
          <div className="form-group"><label>Nombre</label><input value={tipoF.nombre} onChange={e=>setTipoF(p=>({...p,nombre:e.target.value.toUpperCase()}))}/></div>
          <div className="form-group"><label>Color</label><input type="color" value={tipoF.color} onChange={e=>setTipoF(p=>({...p,color:e.target.value}))}/></div>
          <div className="form-group"><label>Efectos</label>
            <div style={{display:'flex',flexDirection:'column',gap:4,marginTop:2}}>
              <label className="check-row" style={{fontSize:11}}><input type="checkbox" checked={tipoF.descuenta} onChange={e=>setTipoF(p=>({...p,descuenta:e.target.checked}))}/>Descuenta compe</label>
              <label className="check-row" style={{fontSize:11}}><input type="checkbox" checked={tipoF.afectaVac} onChange={e=>setTipoF(p=>({...p,afectaVac:e.target.checked}))}/>Usa día de vacaciones</label>
              <label className="check-row" style={{fontSize:11}}><input type="checkbox" checked={tipoF.afectaDias} onChange={e=>setTipoF(p=>({...p,afectaDias:e.target.checked}))}/>Usa día debido</label>
            </div>
          </div>
        </div>
        <button className="btn btn-primary" onClick={saveTipo}>+ Agregar Tipo</button>
      </div>
      <div className="table-wrap"><table>
        <thead><tr><th>Nombre</th><th>Color</th><th>Descuenta</th><th>Afecta Vac.</th><th>Afecta Días Deb.</th><th>Usos</th><th></th></tr></thead>
        <tbody>{tipos.map(t=><tr key={t.id}>
          <td><span className="badge" style={{background:`${t.color}22`,color:t.color}}>{t.nombre}</span></td>
          <td><div style={{width:22,height:22,borderRadius:4,background:t.color}}/></td>
          <td><label className="check-row"><input type="checkbox" checked={t.descuenta} onChange={()=>toggleDesc(t.id)}/><span style={{fontSize:11,color:t.descuenta?'var(--red)':'var(--muted)'}}>{t.descuenta?'Sí':'No'}</span></label></td>
          <td><span className={`badge ${t.afectaVac?'badge-green':'badge-gray'}`}>{t.afectaVac?'Sí':'No'}</span></td>
          <td><span className={`badge ${t.afectaDias?'badge-orange':'badge-gray'}`}>{t.afectaDias?'Sí':'No'}</span></td>
          <td className="text-muted">{incs.filter(i=>i.tipo===t.nombre).length}</td>
          <td><button className="btn btn-danger btn-sm" onClick={()=>delTipo(t.id)}>✕</button></td>
        </tr>)}</tbody>
      </table></div>
    </div>}
    <Modal open={modal==='form'} onClose={()=>{setModal(null);setEditInc(null);setF(blank);}} title={editInc?'Editar Incidencia':'Nueva Incidencia'}>
      <div className="form-row">
        <div className="form-group"><label>Empleado</label><select value={f.empleadoId} onChange={e=>fld('empleadoId',e.target.value)}><option value="">— Seleccionar —</option>{emps.filter(e=>e.activo).sort((a,b)=>a.nombre.localeCompare(b.nombre)).map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}</select></div>
        <div className="form-group"><label>Tipo</label><select value={f.tipo} onChange={e=>fld('tipo',e.target.value)}><option value="">— Seleccionar —</option>{tipos.map(t=><option key={t.id} value={t.nombre}>{t.nombre}</option>)}</select></div>
      </div>
      <div className="form-row"><div className="form-group"><label>Fecha</label><input type="date" value={f.fecha} onChange={e=>fld('fecha',e.target.value)}/></div><div className="form-group"><label>Motivo</label><input value={f.motivo} onChange={e=>fld('motivo',e.target.value.toUpperCase())}/></div></div>
      <div className="form-row c3">
        <div className="form-group"><label>Hora Salida</label><input type="time" value={f.horaSalida} onChange={e=>fld('horaSalida',e.target.value)}/></div>
        <div className="form-group"><label>Hora Regreso</label><input type="time" value={f.horaRegreso} onChange={e=>fld('horaRegreso',e.target.value)}/></div>
        <div className="form-group"><label>Hora Llegada</label><input type="time" value={f.horaLlegada} onChange={e=>fld('horaLlegada',e.target.value)}/></div>
      </div>
      <div className="form-actions"><button className="btn btn-secondary" onClick={()=>{setModal(null);setEditInc(null);setF(blank);}}>Cancelar</button><button className="btn btn-primary" onClick={saveInc}>💾 Guardar</button></div>
    </Modal>
  </div>;
}

/* ══════════════════════════════════════════════════════════
   PRÉSTAMOS Y ADELANTOS
══════════════════════════════════════════════════════════ */
function Prestamos(){
  const [emps]=useState(()=>LS.get(K.emp,[]));
  const [prest,setPrest]=useState(()=>LS.get(K.prest,[]));
  const [modal,setModal]=useState(false);
  const [filterTipo,setFilterTipo]=useState('TODOS');
  const blank={empleadoId:'',tipo:'PRÉSTAMO',monto:0,cuotaQuincenal:0,fechaOtorgado:today(),motivo:''};
  const [f,setF]=useState(blank);
  const fld=(k,v)=>setF(p=>({...p,[k]:v}));

  const save=()=>{
    const emp=emps.find(e=>e.id===f.empleadoId);
    if(!emp||!f.monto)return;
    const monto=Number(f.monto)||0;
    const cuotaCapturada=Number(f.cuotaQuincenal)||0;
    const cuotaQuincenal=f.tipo==='ADELANTO'&&cuotaCapturada<=0?monto:cuotaCapturada;
    const nuevo={...f,id:uuid(),empleadoNombre:emp.nombre,monto,cuotaQuincenal,saldoPendiente:monto,activo:true};
    const up=[nuevo,...prest];setPrest(up);LS.set(K.prest,up);setF(blank);setModal(false);
  };
  const toggle=(id)=>{const up=prest.map(p=>p.id===id?{...p,activo:!p.activo}:p);setPrest(up);LS.set(K.prest,up);};
  const del=(id)=>{const up=prest.filter(p=>p.id!==id);setPrest(up);LS.set(K.prest,up);};

  const filtered=prest.filter(p=>filterTipo==='TODOS'||p.tipo===filterTipo).sort((a,b)=>b.fechaOtorgado.localeCompare(a.fechaOtorgado));
  const totActivo=prest.filter(p=>p.activo).reduce((s,p)=>s+p.saldoPendiente,0);

  return <div>
    <div className="kpi-grid">
      <div className="kpi"><div className="kpi-label">Préstamos Activos</div><div className="kpi-value text-red">{prest.filter(p=>p.activo&&p.tipo==='PRÉSTAMO').length}</div></div>
      <div className="kpi"><div className="kpi-label">Adelantos Activos</div><div className="kpi-value text-orange">{prest.filter(p=>p.activo&&p.tipo==='ADELANTO').length}</div></div>
      <div className="kpi"><div className="kpi-label">Saldo Pendiente Total</div><div className="kpi-value" style={{fontSize:15}}>{fmt(totActivo)}</div></div>
    </div>
    <div className="section-header">
      <div className="flex gap-2">
        {['TODOS','PRÉSTAMO','ADELANTO'].map(t=><button key={t} className={`btn btn-sm ${filterTipo===t?'btn-primary':'btn-secondary'}`} onClick={()=>setFilterTipo(t)}>{t}</button>)}
      </div>
      <button className="btn btn-primary" onClick={()=>setModal(true)}>+ Nuevo</button>
    </div>
    <div className="table-wrap"><table>
      <thead><tr><th>Tipo</th><th>Empleado</th><th>Monto Original</th><th>Saldo Pendiente</th><th>Cuota Qna.</th><th>Fecha</th><th>Motivo</th><th>Estado</th><th></th></tr></thead>
      <tbody>
        {!filtered.length&&<tr><td colSpan={9} style={{textAlign:'center',color:'var(--muted)',padding:32}}>Sin registros</td></tr>}
        {filtered.map(p=><tr key={p.id} style={p.activo?{}:{opacity:.5}}>
          <td><span className={`badge ${p.tipo==='PRÉSTAMO'?'badge-red':'badge-orange'}`}>{p.tipo}</span></td>
          <td style={{fontWeight:500}}>{p.empleadoNombre}</td>
          <td>{fmt(p.monto)}</td>
          <td style={{fontWeight:600,color:p.saldoPendiente>0?'var(--red)':'var(--green)'}}>{fmt(p.saldoPendiente)}</td>
          <td>{fmt(p.cuotaQuincenal)}</td>
          <td className="text-muted">{fmtDate(p.fechaOtorgado)}</td>
          <td className="text-muted" style={{fontSize:11,maxWidth:150,overflow:'hidden',textOverflow:'ellipsis'}}>{p.motivo}</td>
          <td>{p.activo?<span className="badge badge-red">Activo</span>:<span className="badge badge-green">Liquidado</span>}</td>
          <td><div className="flex gap-1"><button className="btn btn-secondary btn-sm" onClick={()=>toggle(p.id)}>{p.activo?'Liquidar':'Reactivar'}</button><button className="btn btn-danger btn-sm" onClick={()=>del(p.id)}>✕</button></div></td>
        </tr>)}
      </tbody>
    </table></div>
    <Modal open={modal} onClose={()=>setModal(false)} title="Nuevo Préstamo / Adelanto">
      <div className="form-row c1"><div className="form-group"><label>Tipo</label><div className="flex gap-2">{['PRÉSTAMO','ADELANTO'].map(t=><button key={t} type="button" className={`btn btn-sm ${f.tipo===t?'btn-primary':'btn-secondary'}`} onClick={()=>fld('tipo',t)}>{t}</button>)}</div></div></div>
      <div className="form-row c1"><div className="form-group"><label>Empleado</label><select value={f.empleadoId} onChange={e=>fld('empleadoId',e.target.value)}><option value="">— Seleccionar —</option>{emps.filter(e=>e.activo).sort((a,b)=>a.nombre.localeCompare(b.nombre)).map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}</select></div></div>
      <div className="form-row">
        <div className="form-group"><label>Monto</label><input type="number" step="0.01" value={f.monto} onChange={e=>fld('monto',e.target.value)}/></div>
        <div className="form-group"><label>Cuota Quincenal a Descontar</label><input type="number" step="0.01" value={f.cuotaQuincenal} onChange={e=>fld('cuotaQuincenal',e.target.value)}/><span style={{fontSize:10.5,color:'var(--muted)',marginTop:2}}>Se restará automáticamente al cerrar cada quincena</span></div>
      </div>
      <div className="form-row">
        <div className="form-group"><label>Fecha Otorgado</label><input type="date" value={f.fechaOtorgado} onChange={e=>fld('fechaOtorgado',e.target.value)}/></div>
        <div className="form-group"><label>Motivo</label><input value={f.motivo} onChange={e=>fld('motivo',e.target.value.toUpperCase())}/></div>
      </div>
      <div className="form-actions"><button className="btn btn-secondary" onClick={()=>setModal(false)}>Cancelar</button><button className="btn btn-primary" onClick={save}>💾 Guardar</button></div>
    </Modal>
  </div>;
}

/* ══════════════════════════════════════════════════════════
   HISTORIAL
══════════════════════════════════════════════════════════ */
function Historial(){
  const [quins,setQuins]=useState(()=>LS.get(K.quin,[]));
  const [sel,setSel]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null);
  const cerradas=useMemo(()=>quins.filter(q=>q.status==='cerrada').sort((a,b)=>b.fin.localeCompare(a.fin)),[quins]);
  const delQna=q=>{
    const up=quins.filter(x=>x.id!==q.id);
    setQuins(up);LS.set(K.quin,up);
    if(sel?.id===q.id)setSel(null);
    setConfirmDel(null);
  };

  const exportXLSX=(q)=>{
    const rows=q.rows||[];
    const data=rows.map(r=>({'N°':r.numero,'Nombre':r.nombre,'RS':r.rs,'Sucursal':r.sucursal,'Días':r.diasTrabajados,'Faltas':r.faltas,'CFDI Nómina':r.cfdiNomina,'Compensación':r.compe,'Sueldo S/T':r.sueldo,'Préstamos':r.prestamos,'Adelantos':r.adelantos,'Real Quincenal':r.realQuincenal,'Total a Percibir':r.totalAPagar,'Pagado':r.pagado?'Sí':'No','Facturado':r.facturado?'Sí':'No'}));
    const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,`Qna ${q.inicio}`);XLSX.writeFile(wb,`Nomina_${q.inicio}_${q.fin}.xlsx`);
  };

  const exportPDF=(q)=>{
    const{jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'letter'});
    addReportHeader(doc,'REPORTE DE NÓMINA');
    const rows=q.rows||[];
    doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(100,100,100);
    doc.text(`Período: ${fmtDate(q.inicio)} al ${fmtDate(q.fin)}  |  Cerrada: ${fmtDate(q.fechaCierre)}`,108,REPORT_HEADER_CONTENT_Y-5,{align:'center'});
    const body=rows.map(r=>[r.numero,r.nombre,r.rs,r.sucursal,r.diasTrabajados,r.faltas,fmt(r.cfdiNomina),fmt(r.compe),fmt(r.sueldo),fmt(r.prestamos),fmt(r.adelantos),fmt(r.totalAPagar)]);
    const tot=rows.reduce((s,r)=>({...s,cfdi:s.cfdi+r.cfdiNomina,compe:s.compe+r.compe,prest:s.prest+r.prestamos,total:s.total+r.totalAPagar}),{cfdi:0,compe:0,prest:0,total:0});
    body.push(['','TOTALES','','','','',fmt(tot.cfdi),fmt(tot.compe),'',fmt(tot.prest),'',fmt(tot.total)]);
    doc.autoTable({startY:REPORT_HEADER_CONTENT_Y,head:[['#','Nombre','RS','Suc.','Días','Faltas','CFDI','Compe','Sueldo','Prest.','Adel.','Total']],body,theme:'grid',headStyles:{fillColor:[30,30,30],textColor:[255,255,255],fontStyle:'bold',fontSize:8},bodyStyles:{fontSize:7.5},didParseCell:d=>{if(d.section==='body'&&d.row.index===body.length-1){d.cell.styles.fontStyle='bold';d.cell.styles.fillColor=[245,245,245];}},margin:{left:12,right:12}});
    doc.save(`Nomina_${q.inicio}_${q.fin}.pdf`);
  };

  if(sel){
    const tots={real:(sel.rows||[]).reduce((s,r)=>s+r.realQuincenal,0),total:(sel.rows||[]).reduce((s,r)=>s+r.totalAPagar,0),cfdi:(sel.rows||[]).reduce((s,r)=>s+r.cfdiNomina,0)};
    return <div>
      <div className="section-header">
        <h3>Quincena: {fmtDate(sel.inicio)} — {fmtDate(sel.fin)}</h3>
        <div className="flex gap-2">
          <button className="btn btn-secondary" onClick={()=>exportXLSX(sel)}>📊 Excel</button>
          <button className="btn btn-secondary" onClick={()=>exportPDF(sel)}>📄 PDF</button>
          <button className="btn btn-danger" onClick={()=>setConfirmDel(sel)}>🗑️ Eliminar</button>
          <button className="btn btn-secondary" onClick={()=>setSel(null)}>← Volver</button>
        </div>
      </div>
      <div className="kpi-grid">
        <div className="kpi"><div className="kpi-label">Real Quincenal</div><div className="kpi-value text-blue" style={{fontSize:15}}>{fmt(tots.real)}</div></div>
        <div className="kpi"><div className="kpi-label">Total a Percibir</div><div className="kpi-value text-gold" style={{fontSize:15}}>{fmt(tots.total)}</div></div>
        <div className="kpi"><div className="kpi-label">CFDI</div><div className="kpi-value" style={{fontSize:15}}>{fmt(tots.cfdi)}</div></div>
        <div className="kpi"><div className="kpi-label">Empleados</div><div className="kpi-value">{(sel.rows||[]).length}</div></div>
      </div>
      <div className="table-wrap"><table>
        <thead><tr><th>#</th><th>RS</th><th>Nombre</th><th>Suc.</th><th>Días</th><th>Faltas</th><th>CFDI</th><th>Compe</th><th>Sueldo</th><th>Prest.</th><th>Adel.</th><th>Real Qna.</th><th>Total Percibir</th><th>Pagado</th></tr></thead>
        <tbody>{(sel.rows||[]).map(r=><tr key={r.empId}>
          <td className="text-muted" style={{fontSize:10.5}}>{r.numero}</td><td><RsBadge rs={r.rs}/></td><td style={{fontWeight:500}}>{r.nombre}</td><td><span className="badge badge-gray">{r.sucursal}</span></td>
          <td>{r.diasTrabajados}</td><td style={{textAlign:'center'}}><span className={r.faltas>0?'badge badge-red':'badge badge-gray'}>{r.faltas}</span></td>
          <td>{fmt(r.cfdiNomina)}</td><td>{fmt(r.compe)}</td><td>{r.sueldo?fmt(r.sueldo):'—'}</td>
          <td>{r.prestamos?fmt(r.prestamos):'—'}</td><td>{r.adelantos?fmt(r.adelantos):'—'}</td>
          <td className="text-blue" style={{fontWeight:600}}>{fmt(r.realQuincenal)}</td>
          <td className="text-gold" style={{fontWeight:700}}>{fmt(r.totalAPagar)}</td>
          <td>{r.pagado?'✅':'—'}</td>
        </tr>)}</tbody>
      </table></div>
    </div>;
  }

  return <div>
    <div className="section-header"><span className="text-muted">{cerradas.length} quincena(s) cerrada(s)</span></div>
    {!cerradas.length&&<div style={{textAlign:'center',padding:60,color:'var(--muted)'}}>📂 Sin quincenas cerradas aún</div>}
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:12}}>
      {cerradas.map(q=>{
        const tot=(q.rows||[]).reduce((s,r)=>s+r.totalAPagar,0);
        const real=(q.rows||[]).reduce((s,r)=>s+r.realQuincenal,0);
        return <div key={q.id} className="card" style={{cursor:'pointer'}} onClick={()=>setSel(q)}>
          <div className="flex items-center" style={{justifyContent:'space-between',gap:8,marginBottom:7}}>
            <div style={{fontSize:11,color:'var(--muted)'}}>📅 {fmtDate(q.inicio)} — {fmtDate(q.fin)}</div>
            <button className="btn btn-danger btn-sm" onClick={e=>{e.stopPropagation();setConfirmDel(q);}}>🗑️</button>
          </div>
          <div style={{fontSize:17,fontWeight:700,color:'var(--gold)'}}>{fmt(real)}</div>
          <div style={{fontSize:11,color:'var(--green)',marginTop:3}}>Total a percibir: {fmt(tot)}</div>
          <div style={{fontSize:10.5,color:'var(--muted)',marginTop:8}}>{(q.rows||[]).length} empleados · Cerrada {fmtDate(q.fechaCierre)}</div>
        </div>;
      })}
    </div>
    <Confirm open={!!confirmDel} msg={`¿Eliminar la quincena cerrada ${fmtDate(confirmDel?.inicio)} — ${fmtDate(confirmDel?.fin)}? Esta acción borrará su historial guardado.`} onYes={()=>delQna(confirmDel)} onNo={()=>setConfirmDel(null)}/>
  </div>;
}

/* ══════════════════════════════════════════════════════════
   DÍAS DEBIDOS
══════════════════════════════════════════════════════════ */
function DiasDebidos(){
  const [emps]=useState(()=>LS.get(K.emp,[]));
  const [registros,setRegistros]=useState(()=>LS.get(K.diasDeb,[]));
