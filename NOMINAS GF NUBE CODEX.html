  const [modal,setModal]=useState(false);
  const [tab,setTab]=useState('registro');
  const blank={empleadoId:'',tipo:'COMISIÓN',descripcion:'',fechas:[{fecha:today(),sucursal:''}],diasDebidos:1};
  const [f,setF]=useState(blank);
  const fld=(k,v)=>setF(p=>({...p,[k]:v}));
  const pendientes=useMemo(()=>registros.filter(r=>r.diasUsados<r.diasDebidos).sort((a,b)=>a.fechaRegistro.localeCompare(b.fechaRegistro)),[registros]);
  const exportPendXLSX=()=>{
    const data=pendientes.map(r=>({'Empleado':r.empleadoNombre,'Tipo':r.tipo,'Descripción':r.descripcion,'Fechas':(r.fechas||[]).map(f=>f.fecha+(f.sucursal?' - '+f.sucursal:'')).join(', '),'Días Adeudados':r.diasDebidos,'Días Usados':r.diasUsados,'Pendientes':r.diasDebidos-r.diasUsados,'Fecha Registro':r.fechaRegistro}));
    const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Días Pendientes');XLSX.writeFile(wb,'DiasDebidos_Pendientes.xlsx');
  };
  const exportPendPDF=()=>{
    const{jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'letter'});
    addReportHeader(doc,'DÍAS PENDIENTES A EMPLEADOS');
    const body=pendientes.map(r=>[r.empleadoNombre.split(' ').slice(0,3).join(' '),r.tipo,r.descripcion.length>35?r.descripcion.slice(0,35)+'…':r.descripcion,(r.fechas||[]).map(f=>fmtDate(f.fecha)+(f.sucursal?' ('+f.sucursal+')':'')).join(', '),r.diasDebidos,r.diasUsados,r.diasDebidos-r.diasUsados]);
    doc.autoTable({startY:REPORT_HEADER_CONTENT_Y,head:[['Empleado','Tipo','Descripción','Fechas','Adeudados','Usados','Pendientes']],body,theme:'grid',headStyles:{fillColor:[30,30,30],textColor:[255,255,255],fontStyle:'bold',fontSize:8},bodyStyles:{fontSize:8},columnStyles:{2:{cellWidth:40},3:{cellWidth:45}},margin:{left:12,right:12}});
    const totalPend=pendientes.reduce((s,r)=>s+(r.diasDebidos-r.diasUsados),0);
    const fy=doc.lastAutoTable.finalY+6;doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(40,40,40);
    doc.text(`Total días pendientes: ${totalPend}`,14,fy);
    doc.save('DiasDebidos_Pendientes.pdf');
  };

  const addFecha=()=>setF(p=>({...p,fechas:[...p.fechas,{fecha:today(),sucursal:''}]}));
  const updFecha=(i,k,v)=>setF(p=>({...p,fechas:p.fechas.map((x,j)=>j===i?{...x,[k]:v}:x)}));
  const delFecha=(i)=>setF(p=>({...p,fechas:p.fechas.filter((_,j)=>j!==i)}));

  const save=()=>{
    const emp=emps.find(e=>e.id===f.empleadoId);
    if(!emp)return;
    const nuevo={...f,id:uuid(),empleadoNombre:emp.nombre,diasDebidos:+f.diasDebidos,diasUsados:0,activo:true,fechaRegistro:today()};
    const up=[nuevo,...registros];setRegistros(up);LS.set(K.diasDeb,up);setF(blank);setModal(false);
  };
  const del=(id)=>{const up=registros.filter(r=>r.id!==id);setRegistros(up);LS.set(K.diasDeb,up);};

  // Balance por empleado
  const balances=useMemo(()=>{
    const b={};
    registros.forEach(r=>{if(!b[r.empleadoId])b[r.empleadoId]={nombre:r.empleadoNombre,total:0,usados:0};b[r.empleadoId].total+=r.diasDebidos;b[r.empleadoId].usados+=r.diasUsados;});
    return b;
  },[registros]);

  return <div>
    <div className="section-header">
      <div>
        <div className="section-title">📅 Días que se le deben a empleados</div>
        <p className="text-muted" style={{fontSize:11,marginTop:3}}>Comisiones, días festivos trabajados, aperturas. Al registrar incidencia "FALTA COMISIÓN / DÍA TRABAJADO" se descuenta del registro más antiguo primero.</p>
      </div>
      <button className="btn btn-primary" onClick={()=>setModal(true)}>+ Registrar Días</button>
    </div>
    <div className="tabs">
      <button className={`tab ${tab==='registro'?'active':''}`} onClick={()=>setTab('registro')}>📋 Registro</button>
      <button className={`tab ${tab==='pendientes'?'active':''}`} onClick={()=>setTab('pendientes')}>⏳ Días Pendientes{pendientes.length>0?<span className="badge badge-gold" style={{marginLeft:6,fontSize:10}}>{pendientes.length}</span>:null}</button>
    </div>
    {tab==='pendientes'&&<div>
      <div className="section-header">
        <span className="text-muted" style={{fontSize:12}}>{pendientes.length} registro(s) con saldo pendiente</span>
        <div className="flex gap-2">
          <button className="btn btn-secondary" onClick={exportPendXLSX}>📊 Excel</button>
          <button className="btn btn-secondary" onClick={exportPendPDF}>📄 PDF</button>
        </div>
      </div>
      {!pendientes.length&&<div style={{textAlign:'center',padding:60,color:'var(--muted)'}}>✅ Sin días pendientes</div>}
      {pendientes.length>0&&<div className="table-wrap"><table>
        <thead><tr><th>Empleado</th><th>Tipo</th><th>Descripción</th><th>Fechas</th><th>Adeudados</th><th>Usados</th><th>Pendientes</th></tr></thead>
        <tbody>{pendientes.map(r=>{const saldo=r.diasDebidos-r.diasUsados;return <tr key={r.id}>
          <td style={{fontWeight:500}}>{r.empleadoNombre}</td>
          <td><span className={`badge ${r.tipo==='COMISIÓN'?'badge-orange':'badge-blue'}`}>{r.tipo}</span></td>
          <td className="text-muted" style={{fontSize:11,maxWidth:200,whiteSpace:'normal'}}>{r.descripcion}</td>
          <td style={{fontSize:11,color:'var(--muted)'}}>{(r.fechas||[]).map((f,i)=><div key={i}>{fmtDate(f.fecha)}{f.sucursal?` — ${f.sucursal}`:''}</div>)}</td>
          <td style={{textAlign:'center',fontWeight:600}}>{r.diasDebidos}</td>
          <td style={{textAlign:'center'}}><span className="badge badge-green">{r.diasUsados}</span></td>
          <td style={{textAlign:'center'}}><span className="badge badge-gold" style={{fontSize:13,fontWeight:700}}>{saldo}</span></td>
        </tr>;})}
        </tbody>
        <tfoot><tr className="tr-total"><td colSpan={6}>Total días pendientes</td><td style={{textAlign:'center'}}>{pendientes.reduce((s,r)=>s+(r.diasDebidos-r.diasUsados),0)}</td></tr></tfoot>
      </table></div>}
    </div>}
    {tab==='registro'&&<div>

    {/* Resumen por empleado */}
    {Object.keys(balances).length>0&&<div className="card mb-4">
      <div className="section-title mb-3">Balance por Empleado</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:10}}>
        {Object.entries(balances).map(([empId,b])=>{
          const saldo=b.total-b.usados;
          const pct=b.total>0?Math.round(b.usados/b.total*100):0;
          return <div key={empId} style={{background:'var(--panel2)',borderRadius:8,padding:12}}>
            <div style={{fontSize:12,fontWeight:500,marginBottom:4}}>{b.nombre.split(' ').slice(0,2).join(' ')}</div>
            <div className="flex items-center" style={{justifyContent:'space-between',marginBottom:4}}>
              <span style={{fontSize:11,color:'var(--muted)'}}>Pendientes</span>
              <span style={{fontSize:14,fontWeight:700,color:saldo>0?'var(--gold)':'var(--green)'}}>{saldo} día(s)</span>
            </div>
            <div className="dias-bar"><div className="dias-fill" style={{width:`${pct}%`,background:'var(--green)'}}/></div>
            <div style={{fontSize:10,color:'var(--muted)',marginTop:3}}>{b.usados} usados / {b.total} total</div>
          </div>;
        })}
      </div>
    </div>}

    <div className="table-wrap"><table>
      <thead><tr><th>Empleado</th><th>Tipo</th><th>Descripción</th><th>Fechas</th><th>Días Adeudados</th><th>Días Usados</th><th>Saldo</th><th></th></tr></thead>
      <tbody>
        {!registros.length&&<tr><td colSpan={8} style={{textAlign:'center',color:'var(--muted)',padding:32}}>Sin registros</td></tr>}
        {registros.map(r=>{
          const saldo=r.diasDebidos-r.diasUsados;
          return <tr key={r.id}>
            <td style={{fontWeight:500}}>{r.empleadoNombre}</td>
            <td><span className={`badge ${r.tipo==='COMISIÓN'?'badge-orange':'badge-blue'}`}>{r.tipo}</span></td>
            <td className="text-muted" style={{fontSize:11,maxWidth:200,whiteSpace:'normal'}}>{r.descripcion}</td>
            <td style={{fontSize:11,color:'var(--muted)'}}>{(r.fechas||[]).map((f,i)=><div key={i}>{fmtDate(f.fecha)}{f.sucursal?` — ${f.sucursal}`:''}</div>)}</td>
            <td style={{textAlign:'center',fontWeight:600}}>{r.diasDebidos}</td>
            <td style={{textAlign:'center'}}><span className="badge badge-green">{r.diasUsados}</span></td>
            <td style={{textAlign:'center'}}><span className={`badge ${saldo>0?'badge-gold':'badge-gray'}`}>{saldo}</span></td>
            <td><button className="btn btn-danger btn-sm" onClick={()=>del(r.id)}>✕</button></td>
          </tr>;
        })}
      </tbody>
    </table></div>
    </div>}

    <Modal open={modal} onClose={()=>setModal(false)} title="Registrar Días Debidos" lg>
      <div className="form-row">
        <div className="form-group"><label>Empleado</label><select value={f.empleadoId} onChange={e=>fld('empleadoId',e.target.value)}><option value="">— Seleccionar —</option>{emps.filter(e=>e.activo).sort((a,b)=>a.nombre.localeCompare(b.nombre)).map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}</select></div>
        <div className="form-group"><label>Tipo</label><div className="flex gap-2">{['COMISIÓN','DÍA TRABAJADO'].map(t=><button key={t} type="button" className={`btn btn-sm ${f.tipo===t?'btn-primary':'btn-secondary'}`} onClick={()=>fld('tipo',t)}>{t}</button>)}</div></div>
      </div>
      <div className="form-row c1"><div className="form-group"><label>Descripción (ej: Salida del 12/abr/2026 a Saltillo y Monterrey)</label><input value={f.descripcion} onChange={e=>fld('descripcion',e.target.value.toUpperCase())}/></div></div>
      <div className="form-row c1"><div className="form-group"><label>Total de días a deber</label><input type="number" value={f.diasDebidos} min={1} onChange={e=>fld('diasDebidos',+e.target.value)}/></div></div>
      <div style={{marginBottom:12}}>
        <div className="flex items-center" style={{justifyContent:'space-between',marginBottom:8}}>
          <label>Fechas de la comisión / días trabajados</label>
          <button className="btn btn-secondary btn-sm" onClick={addFecha}>+ Agregar fecha</button>
        </div>
        {f.fechas.map((fx,i)=><div key={i} className="flex gap-2 mb-2 items-center">
          <input type="date" value={fx.fecha} onChange={e=>updFecha(i,'fecha',e.target.value)} style={{width:140}}/>
          <input placeholder="Sucursal/lugar (opcional)" value={fx.sucursal} onChange={e=>updFecha(i,'sucursal',e.target.value.toUpperCase())} style={{flex:1}}/>
          {f.fechas.length>1&&<button className="btn btn-danger btn-sm" onClick={()=>delFecha(i)}>✕</button>}
        </div>)}
      </div>
      <div className="form-actions"><button className="btn btn-secondary" onClick={()=>setModal(false)}>Cancelar</button><button className="btn btn-primary" onClick={save}>💾 Guardar</button></div>
    </Modal>
  </div>;
}

/* ══════════════════════════════════════════════════════════
   VACACIONES
══════════════════════════════════════════════════════════ */
function Vacaciones(){
  const [emps]=useState(()=>LS.get(K.emp,[]));
  const [vacSaldo,setVacSaldo]=useState(()=>LS.get(K.vacSaldo,{}));
  const [incs]=useState(()=>LS.get(K.inc,[]));
  const [sel,setSel]=useState(null);
  const [modalAjuste,setModalAjuste]=useState(false);
  const [ajuste,setAjuste]=useState({empId:'',dias:0,motivo:''});
  const [search,setSearch]=useState('');

  const getSaldo=(emp)=>{
    if(vacSaldo[emp.id]!==undefined)return vacSaldo[emp.id];
    return emp.diasVacaciones||12;
  };

  const vacUsadasIncs=(emp)=>incs.filter(i=>i.empleadoId===emp.id&&i.tipo==='FALTA POR VACACIONES').length;

  const saveAjuste=()=>{
    if(!ajuste.empId)return;
    const vs={...vacSaldo,[ajuste.empId]:+ajuste.dias};
    setVacSaldo(vs);LS.set(K.vacSaldo,vs);setModalAjuste(false);setAjuste({empId:'',dias:0,motivo:''});
  };

  const activos=emps.filter(e=>e.activo&&e.nombre.toLowerCase().includes(search.toLowerCase()));

  const exportVacPDF=()=>{
    const{jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'letter'});
    addReportHeader(doc,'CONTROL DE VACACIONES');
    const body=activos.map(e=>{
      const saldo=getSaldo(e);const porAño=e.diasVacaciones||12;const usados=vacUsadasIncs(e);
      const pct=porAño>0?Math.min(100,Math.round((porAño-saldo)/porAño*100)):0;
      return [e.numero,e.nombre,e.sucursal,porAño,usados,saldo,pct+'%'];
    });
    doc.autoTable({startY:REPORT_HEADER_CONTENT_Y,head:[['#','Nombre','Sucursal','Días/Año','Usados (Inc.)','Saldo Disp.','% Usado']],body,theme:'grid',headStyles:{fillColor:[30,30,30],textColor:[255,255,255],fontStyle:'bold',fontSize:9},bodyStyles:{fontSize:9},margin:{left:14,right:14},didParseCell:d=>{if(d.section==='body'&&d.column.index===5){const v=+d.cell.raw;d.cell.styles.textColor=v<=2?[200,30,30]:v<=5?[180,120,0]:[20,150,80];d.cell.styles.fontStyle='bold';}}});
    const totalDias=activos.reduce((s,e)=>s+getSaldo(e),0);
    const fy=doc.lastAutoTable.finalY+6;doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(100,100,100);
    doc.text(`Total días disponibles: ${totalDias}  |  Empleados activos: ${activos.length}`,14,fy);
    doc.save('Vacaciones_GF.pdf');
  };

  return <div>
    <div className="section-header">
      <div>
        <div className="section-title">🏖️ Control de Vacaciones</div>
        <p className="text-muted" style={{fontSize:11,marginTop:3}}>El saldo se actualiza cuando guardas las vacaciones en el módulo de Empleados o al hacer un ajuste manual aquí.</p>
      </div>
      <div className="flex gap-2">
        <div className="search-bar"><span className="search-icon">🔍</span><input placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <button className="btn btn-secondary" onClick={exportVacPDF}>📄 PDF</button>
        <button className="btn btn-secondary" onClick={()=>setModalAjuste(true)}>⚙️ Ajuste Manual</button>
      </div>
    </div>

    <div className="table-wrap"><table>
      <thead><tr><th>#</th><th>Nombre</th><th>Sucursal</th><th>Días por Año</th><th>Días por Incidencias</th><th>Saldo Disponible</th><th>% Usado</th></tr></thead>
      <tbody>
        {activos.map(e=>{
          const saldo=getSaldo(e);
          const porAño=e.diasVacaciones||12;
          const usadosInc=vacUsadasIncs(e);
          const pct=porAño>0?Math.min(100,Math.round((porAño-saldo)/porAño*100)):0;
          return <tr key={e.id} onClick={()=>setSel(e===sel?null:e)} style={{cursor:'pointer'}}>
            <td className="text-muted" style={{fontSize:10.5}}>{e.numero}</td>
            <td style={{fontWeight:500}}>{e.nombre}</td>
            <td><span className="badge badge-gray">{e.sucursal}</span></td>
            <td style={{textAlign:'center'}}>{porAño}</td>
            <td style={{textAlign:'center'}}><span className="badge badge-red">{usadosInc}</span></td>
            <td style={{textAlign:'center'}}>
              <span className={`badge ${saldo>5?'badge-green':saldo>2?'badge-gold':'badge-red'}`} style={{fontSize:13,fontWeight:700}}>{saldo}</span>
            </td>
            <td style={{minWidth:120}}>
              <div className="flex items-center gap-2">
                <div className="dias-bar" style={{flex:1}}><div className="dias-fill" style={{width:`${pct}%`,background:pct>80?'var(--red)':pct>50?'var(--gold)':'var(--green)'}}/></div>
                <span style={{fontSize:10.5,color:'var(--muted)',minWidth:30}}>{pct}%</span>
              </div>
            </td>
          </tr>;
        })}
      </tbody>
    </table></div>

    {sel&&<div className="card mt-4" style={{marginTop:16}}>
      <div className="section-title mb-3">Detalle — {sel.nombre}</div>
      <div className="kpi-grid">
        <div className="kpi"><div className="kpi-label">Días por año</div><div className="kpi-value">{sel.diasVacaciones||12}</div></div>
        <div className="kpi"><div className="kpi-label">Saldo disponible</div><div className="kpi-value text-green">{getSaldo(sel)}</div></div>
        <div className="kpi"><div className="kpi-label">Usados (incidencias)</div><div className="kpi-value text-red">{vacUsadasIncs(sel)}</div></div>
      </div>
      <div className="section-title mb-2" style={{fontSize:12}}>Historial de FALTA POR VACACIONES</div>
      {incs.filter(i=>i.empleadoId===sel.id&&i.tipo==='FALTA POR VACACIONES').length===0?
        <p className="text-muted" style={{fontSize:12}}>Sin registros</p>:
        <div className="table-wrap"><table>
          <thead><tr><th>Fecha</th><th>Motivo</th></tr></thead>
          <tbody>{incs.filter(i=>i.empleadoId===sel.id&&i.tipo==='FALTA POR VACACIONES').sort((a,b)=>b.fecha.localeCompare(a.fecha)).map(i=><tr key={i.id}><td>{fmtDate(i.fecha)}</td><td className="text-muted">{i.motivo||'—'}</td></tr>)}</tbody>
        </table></div>
      }
    </div>}

    <Modal open={modalAjuste} onClose={()=>setModalAjuste(false)} title="⚙️ Ajuste Manual de Saldo Vacacional">
      <p className="text-muted mb-3" style={{fontSize:12}}>Establece directamente el saldo disponible del empleado. Usa esto para correcciones o para asignar el saldo inicial.</p>
      <div className="form-row c1"><div className="form-group"><label>Empleado</label><select value={ajuste.empId} onChange={e=>setAjuste(p=>({...p,empId:e.target.value,dias:getSaldo(emps.find(x=>x.id===e.target.value)||{})}))}><option value="">— Seleccionar —</option>{emps.filter(e=>e.activo).sort((a,b)=>a.nombre.localeCompare(b.nombre)).map(e=><option key={e.id} value={e.id}>{e.nombre} (actual: {getSaldo(e)} días)</option>)}</select></div></div>
      <div className="form-row"><div className="form-group"><label>Nuevo saldo (días disponibles)</label><input type="number" value={ajuste.dias} min={0} onChange={e=>setAjuste(p=>({...p,dias:+e.target.value}))}/></div><div className="form-group"><label>Motivo del ajuste</label><input value={ajuste.motivo} onChange={e=>setAjuste(p=>({...p,motivo:e.target.value}))}/></div></div>
      <div className="form-actions"><button className="btn btn-secondary" onClick={()=>setModalAjuste(false)}>Cancelar</button><button className="btn btn-primary" onClick={saveAjuste}>💾 Aplicar Ajuste</button></div>
    </Modal>
  </div>;
}

function Finiquitos(){
  const [tab,setTab]=useState('calc');
  const [records,setRecords]=useState(()=>{const base=LS.get(K.finiquitos,[]);return (Array.isArray(base)?base:[]).map(normalizeFiniquitoRecord).filter(Boolean);});
  const [tipo,setTipo]=useState('finiquito');
  const [tipoDespido,setTipoDespido]=useState('');
  const [form,setForm]=useState(blankFiniquitoForm);
  const [tramos,setTramos]=useState([blankFiniquitoTramo()]);
  const [agStatus,setAgStatus]=useState({});
  const [liqState,setLiqState]=useState(createFiniquitoLiqState());
  const [lastReg,setLastReg]=useState(null);
  const [editingId,setEditingId]=useState(null);
  const [savedLabel,setSavedLabel]=useState('');
  const [search,setSearch]=useState('');
  const [histSuc,setHistSuc]=useState('');
  const [histDateFrom,setHistDateFrom]=useState('');
  const [histDateTo,setHistDateTo]=useState('');
  const [selectedIds,setSelectedIds]=useState({});
  const [paymentDrafts,setPaymentDrafts]=useState({});
  const [expanded,setExpanded]=useState({});
  const fileRef=useRef(null);
  const getPaidAmount=useCallback(reg=>{
    const parsed=typeof reg?.montoPagadoReal==='number'?reg.montoPagadoReal:parseFloat(reg?.montoPagadoReal);
    const base=Number.isFinite(parsed)?parsed:(reg?.neto||0);
    return Math.max(0,Math.round(base*100)/100);
  },[]);
  const getPaidDate=useCallback(reg=>reg?.fechaPagoReal||String(reg?.fecha||'').slice(0,10)||'',[]);

  const builtTramos=useMemo(()=>buildFiniquitoTramos(tramos,form.baja),[tramos,form.baja]);
  const diasEfT=useMemo(()=>builtTramos?builtTramos.reduce((s,t)=>s+t.def,0):0,[builtTramos]);
  const dv=useMemo(()=>diasEfT?getFiniquitoVacDaysBase(diasEfT):0,[diasEfT]);
  const agPreview=useMemo(()=>{
    if(!builtTramos||!form.baja)return [];
    const bajaDate=finiquitoParseDate(form.baja);
    const ingreso=builtTramos[0]?.ini;
    if(!bajaDate||!ingreso)return [];
    const rows=[];
    for(let y=ingreso.getFullYear();y<=bajaDate.getFullYear();y++){
      let dea=0;
      builtTramos.forEach(t=>{
        const ini=new Date(Math.max(t.ini,new Date(y,0,1)));
        const fin=new Date(Math.min(t.fin,new Date(y,11,31)));
        if(fin>=ini)dea+=countFiniquitoEffectiveDays(ini,fin,t.turno);
      });
      if(dea>0)rows.push({year:y,dea});
    }
    return rows;
  },[builtTramos,form.baja]);

  useEffect(()=>{
    const key=agPreview.map(r=>`${r.year}:${r.dea}`).join('|');
    if(!key){
      if(Object.keys(agStatus).length)setAgStatus({});
      return;
    }
    setAgStatus(prev=>{
      const next={};
      agPreview.forEach(r=>{next[r.year]=prev[r.year]||'pte';});
      return JSON.stringify(prev)===JSON.stringify(next)?prev:next;
    });
  },[agPreview.map(r=>`${r.year}:${r.dea}`).join('|')]);

  useEffect(()=>{
    if(tipo!=='liquidacion'||!tipoDespido||!builtTramos)return;
    const sugg=getFiniquitoConceptSuggestions(tipoDespido,diasEfT);
    setLiqState(prev=>{
      const next={...prev,manual:{...prev.manual}};
      if(!next.manual.primaAntiguedadON)next.primaAntiguedadON=sugg.primaAntiguedadON;
      if(!next.manual.indemnizacionON)next.indemnizacionON=sugg.indemnizacionON;
      if(!next.manual.dias90ON)next.dias90ON=sugg.dias90ON;
      return prev.primaAntiguedadON===next.primaAntiguedadON&&prev.indemnizacionON===next.indemnizacionON&&prev.dias90ON===next.dias90ON?prev:next;
    });
  },[tipo,tipoDespido,diasEfT,!!builtTramos]);

  const filtered=useMemo(()=>{
    const q=normTxt(search);
    return records.filter(r=>{
      if(q&&!normTxt(`${r.nombre} ${r.suc} ${r.tipo} ${r.tipoDespido||''}`).includes(q))return false;
      if(histSuc&&r.suc!==histSuc)return false;
      const paidDate=getPaidDate(r);
      if(histDateFrom&&(!paidDate||paidDate<histDateFrom))return false;
      if(histDateTo&&(!paidDate||paidDate>histDateTo))return false;
      return true;
    });
  },[records,search,histSuc,histDateFrom,histDateTo,getPaidDate]);
  const stats=useMemo(()=>{
    return filtered.reduce((acc,r)=>{
      acc.total+=r.neto||0;
      acc.totalReal+=getPaidAmount(r);
      if(r.tipo==='finiquito')acc.fin++;
      else acc.liq++;
      return acc;
    },{total:0,totalReal:0,fin:0,liq:0});
  },[filtered,getPaidAmount]);
  const selectedFiltered=useMemo(()=>filtered.filter(r=>selectedIds[String(r.id)]),[filtered,selectedIds]);
  const allFilteredSelected=!!filtered.length&&filtered.every(r=>selectedIds[String(r.id)]);

  const saveRecords=next=>{
    const normalized=(Array.isArray(next)?next:[]).map(normalizeFiniquitoRecord).filter(Boolean);
    setRecords(normalized);
    LS.set(K.finiquitos,normalized);
  };
  const resetCalc=()=>{
    setTipo('finiquito');
    setTipoDespido('');
    setForm(blankFiniquitoForm());
    setTramos([blankFiniquitoTramo()]);
    setAgStatus({});
    setLiqState(createFiniquitoLiqState());
    setLastReg(null);
    setEditingId(null);
  };
  const flashSaved=label=>{
    setSavedLabel(label);
    setTimeout(()=>setSavedLabel(''),2500);
  };
  const patchForm=(field,value)=>setForm(prev=>({...prev,[field]:value}));
  const patchTramo=(idx,field,value)=>setTramos(prev=>prev.map((t,i)=>i===idx?{...t,[field]:value}:t));
  const addTramo=()=>{if(tramos.length>=4)return;setTramos(prev=>[...prev,blankFiniquitoTramo()]);};
  const removeTramo=idx=>setTramos(prev=>prev.length>1?prev.filter((_,i)=>i!==idx):prev);

  const validateInputs=()=>{
    const bonoRaw=String(form.bono||'').trim();
    const bono=bonoRaw===''?0:parseFloat(bonoRaw);
    if(!form.baja){window.alert('Ingresa el ultimo dia trabajado.');return false;}
    if(Number.isNaN(bono)||bono<0){window.alert('El bono adicional debe ser un numero igual o mayor a 0.');return false;}
    if(tipo==='liquidacion'&&!tipoDespido){window.alert('Selecciona si el despido es injustificado o justificado.');return false;}
    if(tipo==='liquidacion'&&!(parseFloat(form.smg)>0)){window.alert('Captura el SMG diario vigente para calcular la liquidacion.');return false;}
    const bajaDate=finiquitoParseDate(form.baja);
    let prevDate=null;
    for(let i=0;i<tramos.length;i++){
      const fecha=tramos[i].fecha;
      const salario=parseFloat(tramos[i].salario);
      if(!fecha){window.alert(`Completa la fecha del tramo ${i+1}.`);return false;}
      if(!(salario>0)){window.alert(`El salario diario del tramo ${i+1} debe ser mayor a 0.`);return false;}
      const fechaDate=finiquitoParseDate(fecha);
      if(!fechaDate){window.alert(`La fecha del tramo ${i+1} no es valida.`);return false;}
      if(prevDate&&fechaDate<=prevDate){window.alert('Cada tramo debe iniciar despues del anterior. Revisa las fechas capturadas.');return false;}
      if(fechaDate>bajaDate){window.alert('Ningun tramo puede iniciar despues del ultimo dia trabajado.');return false;}
      prevDate=fechaDate;
    }
    if(finiquitoParseDate(tramos[0].fecha)>bajaDate){window.alert('La fecha de baja no puede ser anterior a la fecha de ingreso.');return false;}
    return true;
  };

  const calcular=()=>{
    if(!validateInputs())return;
    const computed=computeFiniquitoRecord({tipo,tipoDespido,form,tramos,agStatus,liqState,editingId});
    if(!computed)return;
    const prev=editingId?records.find(r=>r.id===editingId):null;
    const reg=prev?normalizeFiniquitoRecord({...prev,...computed,montoPagadoReal:prev.montoPagadoReal,fechaPagoReal:prev.fechaPagoReal}):computed;
    setLastReg(reg);
    const next=editingId?records.map(r=>r.id===editingId?reg:r):[reg,...records];
    saveRecords(next);
    flashSaved(editingId?'Actualizado':'Guardado');
    setEditingId(null);
  };
  const loadForEdit=reg=>{
    setEditingId(reg.id);
    setLastReg(null);
    setTipo(reg.tipo||'finiquito');
    setTipoDespido(reg.tipoDespido||'');
    setForm({
      nombre:reg.nombre||'',
      suc:reg.suc||FINIQUITO_SUCURSALES[0],
      baja:reg.baja||'',
      bono:String(reg.bono||0),
      smg:reg.smgDiario?String(reg.smgDiario):''
    });
    const editTramos=(reg.tramos||[]).map(t=>({turno:t.turno||'lv',salario:String(t.sal!=null?t.sal:(t.salario||'')),fecha:t.ini||t.fecha||''})).slice(0,4);
    setTramos(editTramos.length?editTramos:[blankFiniquitoTramo()]);
    const nextAg={};
    Object.keys(reg.agD||{}).forEach(y=>{nextAg[y]=reg.agD[y]&&reg.agD[y].pag?'pag':'pte';});
    setAgStatus(nextAg);
    setLiqState({
      primaAntiguedadON:!!reg.primaAntiguedadON,
      indemnizacionON:!!reg.indemnizacionON,
      dias90ON:!!reg.dias90ON,
      manual:{primaAntiguedadON:true,indemnizacionON:true,dias90ON:true}
    });
    setTab('calc');
    window.scrollTo({top:0,behavior:'smooth'});
  };
  const deleteReg=reg=>{
    if(!window.confirm('¿Eliminar este registro?'))return;
    saveRecords(records.filter(r=>r.id!==reg.id));
    if(editingId===reg.id)resetCalc();
    setSelectedIds(prev=>{const next={...prev};delete next[String(reg.id)];return next;});
    setPaymentDrafts(prev=>{const next={...prev};delete next[String(reg.id)];return next;});
  };
  const patchPaymentDraft=(reg,field,value)=>{
    setPaymentDrafts(prev=>{
      const id=String(reg.id);
      const current=prev[id]||{fechaPagoReal:getPaidDate(reg),montoPagadoReal:String(getPaidAmount(reg))};
      return {...prev,[id]:{...current,[field]:value}};
    });
  };
  const savePaymentDraft=reg=>{
    const id=String(reg.id);
    const draft=paymentDrafts[id]||{fechaPagoReal:getPaidDate(reg),montoPagadoReal:String(getPaidAmount(reg))};
    const monto=parseFloat(draft.montoPagadoReal);
    if(!(monto>=0)){window.alert('Captura un monto realmente pagado valido.');return;}
    if(!draft.fechaPagoReal){window.alert('Captura la fecha del pago real.');return;}
    const next=records.map(r=>r.id===reg.id?normalizeFiniquitoRecord({...r,fechaPagoReal:draft.fechaPagoReal,montoPagadoReal:Math.round(monto*100)/100}):r);
    saveRecords(next);
    setPaymentDrafts(prev=>{const copy={...prev};delete copy[id];return copy;});
    flashSaved('Pago real guardado');
  };
  const toggleSelectRecord=reg=>setSelectedIds(prev=>({...prev,[String(reg.id)]:!prev[String(reg.id)]}));
  const toggleSelectAllFiltered=()=>setSelectedIds(prev=>{
    const next={...prev};
    if(allFilteredSelected)filtered.forEach(r=>{delete next[String(r.id)];});
    else filtered.forEach(r=>{next[String(r.id)]=true;});
    return next;
  });
  const exportHistoryText=()=>{
    if(!records.length){window.alert('No hay registros para exportar.');return;}
    let txt=`HISTORIAL GF DIVERSIONES\n${new Date().toLocaleString('es-MX')}\n${'='.repeat(50)}\n\n`;
    records.forEach(r=>{
      txt+=`${r.nombre} | ${r.suc} | ${String(r.tipo||'').toUpperCase()} | Baja: ${r.baja}\n`;
      (r.tramos||[]).forEach((t,i)=>{txt+=`  T${i+1}: ${getFiniquitoTurnoLabel(t.turno)} $${t.sal}/d · ${t.ini} -> ${t.fin} · ${t.def} dias ef.\n`;});
      Object.keys(r.agD||{}).sort().forEach(y=>{const a=r.agD[y];txt+=`  Ag.${y}${a.pag?' (pag.)':''}: ${a.pag?'—':fmt(a.mt)}\n`;});
      txt+=`  Vac: ${fmt(r.vacaciones)} · Prima: ${fmt(r.primaVac)}\n`;
      if(r.bono>0)txt+=`  Bono: ${fmt(r.bono)}\n`;
      if(r.tipo==='liquidacion')txt+=`  Prima ant: ${r.primaAntiguedadON?fmt(r.primaAntiguedad):'N/A'}  Indem: ${r.indemnizacionON?fmt(r.indemnizacion):'N/A'}  90d: ${r.dias90ON?fmt(r.dias90):'N/A'}\n`;
      txt+=`  ISR: ${r.ISR>0?`(${fmt(r.ISR)})`:'—'}  NETO: ${fmt(r.neto)}  PAGO REAL: ${fmt(getPaidAmount(r))} (${getPaidDate(r)||'sin fecha'})\n${'-'.repeat(45)}\n`;
    });
    navigator.clipboard.writeText(txt).then(()=>window.alert('Historial copiado al portapapeles.')).catch(()=>{
      const ta=document.createElement('textarea');
      ta.value=txt;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      window.alert('Historial copiado.');
    });
  };
  const downloadBackup=()=>{
    if(!records.length){window.alert('No hay registros para respaldar.');return;}
    const blob=new Blob([JSON.stringify({version:1,exportedAt:new Date().toISOString(),records},null,2)],{type:'application/json;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`gf-finiquitos-respaldo-${today()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1500);
  };
  const importBackup=e=>{
    const file=e.target.files&&e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const imported=normalizeImportedFiniquitoRegs(JSON.parse(ev.target.result));
        if(!imported.length){window.alert('El archivo no contiene registros validos para importar.');return;}
        let next=imported;
        if(records.length){
          next=window.confirm('Aceptar = reemplazar el historial actual. Cancelar = fusionar el respaldo con lo que ya tienes.')
            ?imported
            :imported.concat(records);
        }
        saveRecords(next);
        window.alert('Respaldo importado correctamente.');
      }catch{
        window.alert('No se pudo importar el archivo JSON. Verifica que sea un respaldo generado por esta app.');
      }
      if(fileRef.current)fileRef.current.value='';
    };
    reader.readAsText(file,'utf-8');
  };
  const exportSelectedExcel=()=>{
    const rows=selectedFiltered;
    if(!rows.length){window.alert('Selecciona al menos un registro del historial filtrado para exportar.');return;}
    const data=rows.map((r,idx)=>({
      '#':idx+1,
      'Fecha pago real':getPaidDate(r),
      'Fecha registro':String(r.fecha||'').slice(0,10),
      'Sucursal':r.suc||'',
      'Nombre':r.nombre||'',
      'Tipo':r.tipo==='liquidacion'?'Liquidacion':'Finiquito',
      'Tipo despido':r.tipoDespido||'',
      'Antiguedad':`${r.aniosC||0}a ${r.meses||0}m`,
      'Dias efectivos':r.diasEfT||0,
      'Total teorico':Math.round(((r.totalIngresos||r.totalP||0))*100)/100,
      'ISR':Math.round(((r.ISR||0))*100)/100,
      'Neto calculado':Math.round(((r.neto||0))*100)/100,
      'Monto realmente pagado':getPaidAmount(r)
    }));
    const ws=XLSX.utils.json_to_sheet(data);
    const summary=XLSX.utils.json_to_sheet([{
      'Registros exportados':rows.length,
      'Sucursal filtro':histSuc||'Todas',
      'Fecha desde':histDateFrom||'',
      'Fecha hasta':histDateTo||'',
      'Subtotal neto calculado':Math.round(rows.reduce((s,r)=>s+(r.neto||0),0)*100)/100,
      'Subtotal realmente pagado':Math.round(rows.reduce((s,r)=>s+getPaidAmount(r),0)*100)/100
    }]);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,summary,'Resumen');
    XLSX.utils.book_append_sheet(wb,ws,'Finiquitos');
    XLSX.writeFile(wb,`Finiquitos_filtrados_${today()}.xlsx`);
  };

  const renderResultRows=reg=>{
    if(!reg)return null;
    const vacByYear={};
    (reg.vacD||[]).forEach(v=>{if(!vacByYear[v.y])vacByYear[v.y]=[];vacByYear[v.y].push(v);});
    const rows=[];
    Object.keys(reg.agD||{}).sort().forEach(y=>{
      const a=reg.agD[y];
      if(a.pag){
        rows.push(<tr key={`ag-${y}-pag`}><td className="text-muted">Aguinaldo {y}</td><td style={{color:'var(--muted)'}}>Ya pagado</td></tr>);
      }else{
        rows.push(<tr key={`ag-${y}-hdr`}><td colSpan={2} style={{fontSize:11,fontWeight:600,color:'var(--muted)',background:'var(--panel2)'}}>Aguinaldo {y} · (dias ef. × 15 × salario) ÷ 365</td></tr>);
        a.items.forEach(x=>rows.push(<tr key={`ag-${y}-${x.tramo}`}><td className="text-muted">T{x.tramo} · {getFiniquitoTurnoLabel(x.turno)} · ${x.salario}/d · {x.de} dias ef.</td><td>{fmt(x.mo)}</td></tr>));
      }
    });
    Object.keys(vacByYear).sort().forEach(y=>{
      rows.push(<tr key={`vac-${y}-hdr`}><td colSpan={2} style={{fontSize:11,fontWeight:600,color:'var(--muted)',background:'var(--panel2)'}}>Vacaciones {y} · {reg.dv}d base · ÷ 365</td></tr>);
      vacByYear[y].forEach(v=>rows.push(<tr key={`vac-${y}-${v.tr}`}><td className="text-muted">T{v.tr} · {getFiniquitoTurnoLabel(v.turno)} · ${v.sal}/d · {v.de} dias ef.</td><td>{fmt(v.mo)}</td></tr>));
    });
    if((reg.vacD||[]).length>1)rows.push(<tr key="vac-sub"><td className="text-muted">Subtotal vacaciones</td><td>{fmt(reg.vacaciones)}</td></tr>);
    rows.push(<tr key="prima-vac"><td className="text-muted">Prima vacacional (25%)</td><td>{fmt(reg.primaVac)}</td></tr>);
    if(reg.bono>0)rows.push(<tr key="bono"><td className="text-muted">Bono adicional</td><td>{fmt(reg.bono)}</td></tr>);
    if(reg.tipo==='liquidacion'){
      rows.push(<tr key="pa"><td className="text-muted">Prima antiguedad (Art. 162)</td><td>{reg.primaAntiguedadON?fmt(reg.primaAntiguedad):'N/A'}</td></tr>);
      rows.push(<tr key="ind"><td className="text-muted">Indemnizacion (Art. 50 fr. II)</td><td>{reg.indemnizacionON?fmt(reg.indemnizacion):'N/A'}</td></tr>);
      rows.push(<tr key="90d"><td className="text-muted">90 dias salario (Art. 50 fr. III)</td><td>{reg.dias90ON?fmt(reg.dias90):'N/A'}</td></tr>);
      rows.push(<tr key="exento"><td className="text-muted">Total exento LISR</td><td>{fmt(reg.totalExento)}</td></tr>);
    }
    rows.push(<tr key="sub" style={{background:'var(--panel2)',fontWeight:700}}><td>{reg.tipo==='liquidacion'?'Total ingresos':'Total percepciones'}</td><td>{fmt(reg.totalIngresos||reg.totalP)}</td></tr>);
    rows.push(<tr key="isr"><td className="text-muted">(-) ISR · base: {fmt(reg.baseGravable)}</td><td style={{color:'var(--red)'}}>({fmt(reg.ISR)})</td></tr>);
    rows.push(<tr key="neto" style={{background:'rgba(16,185,129,.12)',fontWeight:700,color:'var(--green)'}}><td>Neto a pagar</td><td>{fmt(reg.neto)}</td></tr>);
    return rows;
  };

  return <div>
    <div className="section-title">🧾 Finiquitos y Liquidaciones</div>
    <p className="text-muted" style={{fontSize:12,marginTop:3}}>Mismo flujo de calculo, historial y respaldo, ahora integrado al sistema principal y sincronizable por nube.</p>

    <div className="card mt-4">
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        <button className={`tab ${tab==='calc'?'active':''}`} onClick={()=>setTab('calc')}>Nuevo calculo</button>
        <button className={`tab ${tab==='hist'?'active':''}`} onClick={()=>setTab('hist')}>Historial {records.length?`(${records.length})`:''}</button>
      </div>

      {tab==='calc'?<>
        <div style={{display:'grid',gridTemplateColumns:'1.2fr .8fr',gap:16,alignItems:'start'}}>
          <div>
            <div className="section-title mb-2" style={{fontSize:12}}>Tipo de terminacion</div>
            {editingId&&<div style={{fontSize:12,color:'var(--blue)',padding:'10px 12px',background:'rgba(59,130,246,.08)',border:'1px solid rgba(59,130,246,.2)',borderRadius:10,marginBottom:12}}>Editando registro guardado. <button className="btn btn-secondary" style={{marginLeft:8,padding:'6px 10px'}} onClick={resetCalc}>Cancelar edicion</button></div>}
            <div style={{display:'flex',gap:8,marginBottom:12}}>
              <button className={`btn ${tipo==='finiquito'?'btn-primary':'btn-secondary'}`} onClick={()=>{setTipo('finiquito');setTipoDespido('');setLiqState(createFiniquitoLiqState());}}>Separacion voluntaria (finiquito)</button>
              <button className={`btn ${tipo==='liquidacion'?'btn-danger':'btn-secondary'}`} onClick={()=>{setTipo('liquidacion');setTipoDespido('');setLiqState(createFiniquitoLiqState());}}>Despido (liquidacion)</button>
            </div>
            {tipo==='liquidacion'&&<div style={{display:'flex',gap:8,marginBottom:14}}>
              <button className={`btn ${tipoDespido==='injustificado'?'btn-danger':'btn-secondary'}`} onClick={()=>{setTipoDespido('injustificado');setLiqState(createFiniquitoLiqState());}}>Despido injustificado</button>
              <button className={`btn ${tipoDespido==='justificado'?'btn-primary':'btn-secondary'}`} onClick={()=>{setTipoDespido('justificado');setLiqState(createFiniquitoLiqState());}}>Despido justificado</button>
            </div>}

            <div className="section-title mb-2" style={{fontSize:12}}>Datos generales</div>
            <div className="form-row">
              <div className="form-group"><label>Nombre completo</label><input value={form.nombre} onChange={e=>patchForm('nombre',e.target.value)} placeholder="Ej. Jose Daniel Castañeda"/></div>
              <div className="form-group"><label>Sucursal</label><select value={form.suc} onChange={e=>patchForm('suc',e.target.value)}>{FINIQUITO_SUCURSALES.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
            </div>
            <div className="form-row">
              <div className="form-group"><label>Ultimo dia trabajado</label><input type="date" value={form.baja} onChange={e=>patchForm('baja',e.target.value)}/></div>
              <div className="form-group"><label>Bono adicional (MXN)</label><input type="number" step="0.01" value={form.bono} onChange={e=>patchForm('bono',e.target.value)}/></div>
            </div>
            {tipo==='liquidacion'&&<div className="form-row c1">
              <div className="form-group"><label>SMG diario vigente (MXN)</label><input type="number" step="0.01" value={form.smg} onChange={e=>patchForm('smg',e.target.value)}/><span style={{fontSize:10.5,color:'var(--muted)',marginTop:3}}>Zona general: $315.04 | Zona frontera norte: $473.45</span></div>
            </div>}

            <div className="section-title mb-2" style={{fontSize:12,marginTop:16}}>Tramos de trabajo</div>
            {tramos.map((t,i)=><div key={i} className="card" style={{padding:12,background:'var(--panel2)',border:'1px solid var(--border)',marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <strong style={{fontSize:12,color:'var(--muted)'}}>{i===0?'Tramo 1 - Ingreso inicial':`Tramo ${i+1} - Cambio ${i}`}</strong>
                {i>0&&<button className="btn btn-secondary" onClick={()=>removeTramo(i)}>Quitar</button>}
              </div>
              <div style={{display:'flex',gap:8,marginBottom:10}}>
                <button className={`btn ${t.turno==='lv'?'btn-primary':'btn-secondary'}`} onClick={()=>patchTramo(i,'turno','lv')}>Lunes a viernes</button>
                <button className={`btn ${t.turno==='sd'?'btn-primary':'btn-secondary'}`} onClick={()=>patchTramo(i,'turno','sd')}>Sabado y domingo</button>
                <button className={`btn ${t.turno==='td'?'btn-primary':'btn-secondary'}`} onClick={()=>patchTramo(i,'turno','td')}>Todos los dias</button>
              </div>
              <div className="form-row">
                <div className="form-group"><label>{i===0?'Fecha de ingreso':'Fecha de inicio del cambio'}</label><input type="date" value={t.fecha} onChange={e=>patchTramo(i,'fecha',e.target.value)}/></div>
                <div className="form-group"><label>Salario diario (MXN)</label><input type="number" step="0.01" value={t.salario} onChange={e=>patchTramo(i,'salario',e.target.value)}/></div>
              </div>
              {builtTramos&&builtTramos[i]&&<div style={{fontSize:11,color:'var(--muted)'}}>{builtTramos[i].def} dias efectivos</div>}
            </div>)}
            {tramos.length<4&&<button className="btn btn-secondary" onClick={addTramo}>+ Agregar cambio de turno / salario</button>}
          </div>

          <div>
            {agPreview.length>0&&<div className="card">
              <div className="section-title mb-2" style={{fontSize:12}}>Aguinaldo por año</div>
              <div style={{fontSize:12,color:'var(--muted)',padding:'8px 10px',background:'var(--panel2)',borderRadius:10,marginBottom:12}}>Dias efectivos totales: {diasEfT} -> {dv} dias base de vacaciones (Art. 76)</div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {agPreview.map(r=><div key={r.year} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 12px',border:'1px solid var(--border)',borderRadius:10,background:'var(--panel2)'}}>
                  <div><div style={{fontWeight:700,fontSize:13}}>Aguinaldo {r.year}</div><div style={{fontSize:11,color:'var(--muted)'}}>{r.dea} dias efectivos en este año</div></div>
                  <button className={`btn ${agStatus[r.year]==='pag'?'btn-danger':'btn-primary'}`} onClick={()=>setAgStatus(prev=>({...prev,[r.year]:prev[r.year]==='pag'?'pte':'pag'}))}>{agStatus[r.year]==='pag'?'Pagado - no incluir':'Pendiente - incluir'}</button>
                </div>)}
              </div>
            </div>}

            {tipo==='liquidacion'&&tipoDespido&&builtTramos&&<div className="card">
              <div className="section-title mb-2" style={{fontSize:12}}>Conceptos de liquidacion</div>
              {['primaAntiguedadON','indemnizacionON','dias90ON'].map(key=>{
                const labels={
                  primaAntiguedadON:{title:'Prima de antiguedad (Art. 162 LFT)',desc:'12 dias por año proporcional con tope maximo de 2 × SMG por dia.'},
                  indemnizacionON:{title:'Indemnizacion (Art. 50 fr. II LFT)',desc:'20 dias por año trabajado proporcional. Solo aplica por despido injustificado.'},
                  dias90ON:{title:'90 dias de salario (Art. 50 fr. III LFT)',desc:'Tres meses de salario constitucionales. Solo aplica por despido injustificado.'}
                }[key];
                const sugg=getFiniquitoConceptSuggestions(tipoDespido,diasEfT);
                const auto=key==='primaAntiguedadON'?sugg.primaAntiguedadON:(key==='indemnizacionON'?sugg.indemnizacionON:sugg.dias90ON);
                return <div key={key} style={{border:'1px solid var(--border)',borderRadius:10,padding:12,background:'var(--panel2)',marginBottom:10}}>
                  <div style={{display:'flex',justifyContent:'space-between',gap:12}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:13}}>{labels.title}</div>
                      <div style={{fontSize:11,color:'var(--muted)',marginTop:3}}>{labels.desc}</div>
                      <div style={{fontSize:10,color:'var(--muted)',marginTop:6}}>Sugerencia automatica: {auto?'incluir':'N/A'}</div>
                    </div>
                    <button className={`btn ${liqState[key]?'btn-primary':'btn-secondary'}`} onClick={()=>setLiqState(prev=>({...prev,[key]:!prev[key],manual:{...prev.manual,[key]:true}}))}>{liqState[key]?'ON':'OFF'}</button>
                  </div>
                </div>;
              })}
            </div>}

            <div className="card">
              <button className="btn btn-primary" style={{width:'100%'}} onClick={calcular}>Calcular</button>
              <button className="btn btn-secondary" style={{width:'100%',marginTop:8}} onClick={resetCalc}>+ Nuevo calculo</button>
            </div>
          </div>
        </div>

        {lastReg&&<div className="card mt-4">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,marginBottom:12}}>
            <div className="section-title" style={{margin:0,fontSize:12}}>Resultado <span className={`badge ${lastReg.tipo==='liquidacion'?'badge-red':'badge-gold'}`}>{lastReg.tipo==='liquidacion'?'Liquidacion':'Finiquito'}</span></div>
            {savedLabel&&<span style={{fontSize:11,color:'var(--green)',fontWeight:700}}>{savedLabel}</span>}
          </div>
          <div className="kpi-grid">
            <div className="kpi"><div className="kpi-label">Antiguedad</div><div className="kpi-value">{lastReg.aniosC}a {lastReg.meses}m</div></div>
            <div className="kpi"><div className="kpi-label">Dias ef. · base vac.</div><div className="kpi-value">{lastReg.diasEfT} · {lastReg.dv}d</div></div>
            <div className="kpi"><div className="kpi-label">{lastReg.tipo==='liquidacion'?'Total ingresos':'Total percepciones'}</div><div className="kpi-value text-green" style={{fontSize:15}}>{fmt(lastReg.totalIngresos||lastReg.totalP)}</div></div>
            <div className="kpi"><div className="kpi-label">ISR retenido</div><div className="kpi-value text-red">{fmt(lastReg.ISR)}</div></div>
            <div className="kpi"><div className="kpi-label">Neto a pagar</div><div className="kpi-value text-green" style={{fontSize:18}}>{fmt(lastReg.neto)}</div></div>
          </div>
          <div className="table-wrap" style={{marginTop:14}}>
            <table>
              <tbody>{renderResultRows(lastReg)}</tbody>
            </table>
          </div>
          <div className="form-actions" style={{marginTop:14}}>
            <button className="btn btn-primary" onClick={()=>printFiniquitoRecord(lastReg)}>Imprimir / Guardar PDF</button>
          </div>
        </div>}
      </>:<>
        <div className="kpi-grid">
          <div className="kpi"><div className="kpi-label">Registros visibles</div><div className="kpi-value">{filtered.length}</div></div>
          <div className="kpi"><div className="kpi-label">Fin. / Liq. visibles</div><div className="kpi-value">{stats.fin}/{stats.liq}</div></div>
          <div className="kpi"><div className="kpi-label">Neto calculado filtrado</div><div className="kpi-value text-blue" style={{fontSize:15}}>{fmt(stats.total)}</div></div>
          <div className="kpi"><div className="kpi-label">Subtotal realmente pagado</div><div className="kpi-value text-green" style={{fontSize:15}}>{fmt(stats.totalReal)}</div></div>
        </div>
        <div className="form-row c4" style={{marginTop:16}}>
          <div className="form-group"><label>Buscar registro</label><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Nombre, sucursal o tipo"/></div>
          <div className="form-group"><label>Filtrar sucursal</label><select value={histSuc} onChange={e=>setHistSuc(e.target.value)}><option value="">Todas</option>{FINIQUITO_SUCURSALES.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
          <div className="form-group"><label>Fecha pago real desde</label><input type="date" value={histDateFrom} onChange={e=>setHistDateFrom(e.target.value)}/></div>
          <div className="form-group"><label>Fecha pago real hasta</label><input type="date" value={histDateTo} onChange={e=>setHistDateTo(e.target.value)}/></div>
        </div>
        <div className="form-actions" style={{marginTop:8}}>
          <button className="btn btn-secondary" onClick={toggleSelectAllFiltered}>{allFilteredSelected?'Quitar visibles':'Seleccionar visibles'}</button>
          <button className="btn btn-primary" onClick={exportSelectedExcel}>📊 Excel seleccionados {selectedFiltered.length?`(${selectedFiltered.length})`:''}</button>
          <button className="btn btn-primary" onClick={exportHistoryText}>Copiar historial (texto)</button>
          <button className="btn btn-secondary" onClick={downloadBackup}>Descargar respaldo JSON</button>
          <button className="btn btn-secondary" onClick={()=>fileRef.current&&fileRef.current.click()}>Importar respaldo JSON</button>
          <input ref={fileRef} type="file" accept="application/json" style={{display:'none'}} onChange={importBackup}/>
        </div>
        <div style={{marginTop:16}}>
          {!filtered.length?<div style={{textAlign:'center',padding:48,color:'var(--muted)'}}>No hay registros guardados aun.</div>:filtered.map(reg=>{
            const opened=!!expanded[reg.id];
            const draft=paymentDrafts[String(reg.id)]||{fechaPagoReal:getPaidDate(reg),montoPagadoReal:String(getPaidAmount(reg))};
            return <div key={reg.id} className="card" style={{marginBottom:10,padding:14}}>
              <div style={{display:'flex',justifyContent:'space-between',gap:12,alignItems:'flex-start'}}>
                <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                  <label className="check-row" style={{paddingTop:2}}>
                    <input type="checkbox" checked={!!selectedIds[String(reg.id)]} onChange={()=>toggleSelectRecord(reg)}/>
                  </label>
                  <div>
                    <div style={{fontWeight:700,fontSize:14}}>{reg.nombre} <span className={`badge ${reg.tipo==='liquidacion'?'badge-red':'badge-gold'}`}>{reg.tipo==='liquidacion'?'Liquidacion':'Finiquito'}</span></div>
                    <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>{reg.suc} · {reg.aniosC}a {reg.meses}m · {reg.diasEfT} dias ef. · {new Date(reg.fecha).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'})}</div>
                    <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>{(reg.tramos||[]).map((t,i)=>`T${i+1}: ${getFiniquitoTurnoLabel(t.turno)} $${t.sal}/d`).join(' -> ')}</div>
                  </div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontWeight:700,color:'var(--green)',whiteSpace:'nowrap'}}>{fmt(reg.neto)}</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>Pagado real: <strong style={{color:'var(--text)'}}>{fmt(getPaidAmount(reg))}</strong></div>
                  <div style={{fontSize:11,color:'var(--muted)'}}>Fecha pago: {finiquitoFmtDate(getPaidDate(reg))||'—'}</div>
                </div>
              </div>
              <div className="form-row" style={{marginTop:12}}>
                <div className="form-group">
                  <label>Fecha de pago real</label>
                  <input type="date" value={draft.fechaPagoReal} onChange={e=>patchPaymentDraft(reg,'fechaPagoReal',e.target.value)}/>
                </div>
                <div className="form-group">
                  <label>Monto realmente pagado (MXN)</label>
                  <input type="number" step="0.01" min="0" value={draft.montoPagadoReal} onChange={e=>patchPaymentDraft(reg,'montoPagadoReal',e.target.value)}/>
                </div>
              </div>
              <div className="form-actions" style={{marginTop:6}}>
                <button className="btn btn-green" onClick={()=>savePaymentDraft(reg)}>💾 Guardar pago real</button>
                <button className="btn btn-secondary" onClick={()=>setExpanded(prev=>({...prev,[reg.id]:!prev[reg.id]}))}>{opened?'Ocultar desglose':'Ver desglose'}</button>
                <button className="btn btn-primary" onClick={()=>loadForEdit(reg)}>Editar</button>
                <button className="btn btn-primary" onClick={()=>printFiniquitoRecord(reg)}>Imprimir PDF</button>
                <button className="btn btn-danger" onClick={()=>deleteReg(reg)}>Eliminar</button>
              </div>
              {opened&&<div className="table-wrap" style={{marginTop:12}}>
                <table><tbody>{renderResultRows(reg)}</tbody></table>
              </div>}
            </div>;
          })}
        </div>
      </>}
    </div>
  </div>;
}

/* ══════════════════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════════════════ */
const NAV_GROUPS=[
  {id:'dashboard',icon:'🏠',label:'Dashboard',standalone:true},
  {id:'nominas',icon:'💼',label:'Nominas',children:[
    {id:'nomina',icon:'💰',label:'Nomina / Quincena'},
    {id:'historial',icon:'🗂️',label:'Historial'},
    {id:'empleados',icon:'👥',label:'Empleados'},
    {id:'vacaciones',icon:'🏖️',label:'Vacaciones'},
    {id:'diasdebidos',icon:'📅',label:'Dias Debidos'},
    {id:'incidencias',icon:'📋',label:'Incidencias'},
    {id:'prestamos',icon:'💳',label:'Prestamos y Adelantos'},
  ]},
  {id:'finiquitosGroup',icon:'🧾',label:'Finiquitos y Liquidaciones',children:[
    {id:'finiquitos',icon:'📄',label:'Calculos e Historial'},
  ]},
];
const TITLES={dashboard:'Dashboard',nomina:'Nómina — Quincena Activa',empleados:'Empleados',incidencias:'Incidencias',prestamos:'Préstamos y Adelantos',historial:'Historial de Quincenas',diasdebidos:'Días Debidos a Empleados',vacaciones:'Control de Vacaciones',finiquitos:'Finiquitos y Liquidaciones'};

function App(){
  const [ready,setReady]=useState(false);
  const [cloudOk,setCloudOk]=useState(null);
  const [view,setView]=useState('dashboard');
  const [sidebarOpen,setSidebarOpen]=useState(true);
  const [syncing,setSyncing]=useState(false);
  const [openGroups,setOpenGroups]=useState({nominas:true,finiquitosGroup:true});

  useEffect(()=>{
    GFStore.init().then(online=>{
      initData();
      setCloudOk(online);
      setReady(true);
    });
  },[]);

  const syncNow=()=>{
    setSyncing(true);
    setTimeout(()=>window.location.reload(),300);
  };
  const currentTitle=TITLES[view];

  if(!ready)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:16,background:'var(--bg)'}}>
      <div style={{width:54,height:54,borderRadius:18,background:'linear-gradient(135deg,#34a853,#4285f4)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:24,boxShadow:'0 16px 28px rgba(66,133,244,.22)'}}>✦</div>
      <div style={{color:'var(--blue)',fontSize:18,fontWeight:700,letterSpacing:'.2px'}}>GF Diversiones — RH &amp; Nóminas</div>
      <div style={{color:'var(--muted)',fontSize:12}}>Sincronizando con la nube...</div>
      <div className="gf-loading-bar" style={{marginTop:6}}/>
    </div>
  );

  const renderView=()=>{switch(view){case'dashboard':return<Dashboard/>;case'nomina':return<Nomina/>;case'empleados':return<Empleados/>;case'incidencias':return<Incidencias/>;case'prestamos':return<Prestamos/>;case'historial':return<Historial/>;case'diasdebidos':return<DiasDebidos/>;case'vacaciones':return<Vacaciones/>;case'finiquitos':return<Finiquitos/>;default:return<Dashboard/>;}};
  return <>
    <div className={`sidebar${sidebarOpen?'':' collapsed'}`}>
      <div className="sidebar-logo">
        <div className="brand-row">
          <div className="brand-mark"/>
          <div>
            <h1>GF Diversiones</h1>
            <p>Centro de nominas y RH</p>
          </div>
        </div>
        <button className="sidebar-create" onClick={()=>setView('nomina')}>＋ Nuevo movimiento</button>
      </div>
      <nav className="sidebar-nav">
        {NAV_GROUPS.map(group=>group.standalone
          ?<button key={group.id} className={`nav-item ${view===group.id?'active':''}`} onClick={()=>setView(group.id)}><span className="nav-icon">{group.icon}</span>{group.label}</button>
          :<div key={group.id} className="nav-group">
            <button className="nav-group-btn" onClick={()=>setOpenGroups(prev=>({...prev,[group.id]:!prev[group.id]}))}>
              <span className="nav-group-label"><span className="nav-icon">{group.icon}</span>{group.label}</span>
              <span className={`nav-chevron ${openGroups[group.id]?'open':''}`}>⌄</span>
            </button>
            {openGroups[group.id]&&<div className="nav-children">
              {group.children.map(child=><button key={child.id} className={`nav-child ${view===child.id?'active':''}`} onClick={()=>setView(child.id)}><span className="nav-icon">{child.icon}</span>{child.label}</button>)}
            </div>}
          </div>
        )}
      </nav>
      <div className="sidebar-footer">
        <div>Grupo Rokma © 2026</div>
        <div className="sidebar-note">Modulo en nube con sincronizacion local</div>
      </div>
    </div>
    <div className="main">
      <div className="topbar">
        <div className="topbar-shell">
          <div className="topbar-left">
            <button className="btn-toggle-sidebar" onClick={()=>setSidebarOpen(o=>!o)} title={sidebarOpen?'Ocultar menú':'Mostrar menú'}>
              {sidebarOpen?'☰':'☷'}
            </button>
            <div className="view-title">
              <h2>{currentTitle}</h2>
              <p>Espacio de trabajo administrativo</p>
            </div>
          </div>
          <div className="topbar-center">
            <div className="topbar-search">
              <span style={{fontSize:16}}>🔎</span>
              <div>
                <strong>Centro operativo</strong>
                <div style={{fontSize:11}}>Gestiona personal, nominas, finiquitos e historial desde un solo lugar</div>
              </div>
            </div>
          </div>
          <div className="topbar-right">
            {cloudOk===true&&<span className="status-chip"><span className="status-dot" style={{background:'var(--green)',boxShadow:'0 0 0 4px rgba(23,139,91,.12)'}}/>Nube activa</span>}
            {cloudOk===false&&<span className="status-chip"><span className="status-dot" style={{background:'#9aa8bb'}}/>Sin conexion</span>}
            <span className="status-chip">{todayLong()}</span>
          </div>
        </div>
      </div>
      <div className="content"><div className="content-inner">{renderView()}</div></div>
    </div>
    <button className="fab-sync" onClick={syncNow} title="Sincronizar datos de la nube">
      <span>{syncing?'⏳':'🔄'}</span>
      <span>{syncing?'Sincronizando':'Sync'}</span>
    </button>
  </>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
